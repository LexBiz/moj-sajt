<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>O&L Master Dom · Databáze ceníku</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* ── O&L Master Dom · Databáze ceníku ── */
      :root {
        --bg: #020C18;
        --s:  #071626;
        --c:  #0C1E38;
        --c2: #0F2442;
        --b:  rgba(255,255,255,.06);
        --b2: rgba(255,255,255,.11);
        --b3: rgba(255,255,255,.18);
        --ink:  #E6F0FF;
        --ink2: #7AA2C4;
        --ink3: #3D618A;
        --blue:  #1A6AE8;
        --blue2: #3D87F8;
        --blue3: #60A5FF;
        --green: #14C98A;
        --orange:#E8921A;
        --red:   #E83A3A;
        --r:  10px;  --r-md: 14px;  --r-lg: 18px;
        --sh: 0 8px 32px rgba(0,0,0,.45);
      }
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
      body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.55;
        background-image:radial-gradient(ellipse 160% 40% at 50% -4%,rgba(26,106,232,.12) 0%,transparent 55%)}

      /* ── HEADER ── */
      .header{position:sticky;top:0;z-index:40;background:rgba(2,12,24,.94);border-bottom:1px solid var(--b2);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
      .header-inner{max-width:1800px;margin:0 auto;padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
      .logo{display:flex;align-items:center;gap:12px}
      .logo-mark{width:36px;height:36px;border-radius:9px;background:linear-gradient(145deg,#1A4EA0,#0F3070);border:1px solid rgba(61,135,248,.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 10px rgba(26,106,232,.3)}
      .logo-name{font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.3px}
      .logo-sub{font-size:10px;color:var(--ink3);letter-spacing:.4px;text-transform:uppercase;margin-top:2px}
      .header-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
      .header-info{font-size:12px;color:var(--ink2);max-width:400px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .btn{border:1px solid var(--b2);border-radius:var(--r);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;padding:9px 16px;transition:all .18s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;background:var(--c);color:var(--ink);text-decoration:none}
      .btn:hover{background:var(--c2);border-color:var(--b3)}
      .btn.primary{background:linear-gradient(135deg,#1A6AE8,#2D80F8);color:#fff;border:none;box-shadow:0 3px 14px rgba(26,106,232,.4)}
      .btn.primary:hover{background:linear-gradient(135deg,#2070F0,#3A8CFF)}

      /* ── PAGE LAYOUT ── */
      .page{max-width:1800px;margin:0 auto;display:grid;grid-template-columns:260px minmax(0,1fr);min-height:calc(100vh - 60px)}

      /* ── LEFT SIDEBAR ── */
      .sidebar{background:var(--s);border-right:1px solid var(--b2);padding:24px 0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;display:flex;flex-direction:column;gap:0}
      .sidebar-search{padding:12px 16px 0;flex-shrink:0}
      .sidebar-search input{width:100%;background:var(--c);border:1px solid var(--b2);border-radius:var(--r);color:var(--ink);font-family:inherit;padding:10px 12px;font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s}
      .sidebar-search input::placeholder{color:var(--ink3)}
      .sidebar-search input:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(26,106,232,.12)}
      .sidebar-filter{padding:10px 16px 0;flex-shrink:0}
      .sidebar-filter select{width:100%;background:var(--c);border:1px solid var(--b2);border-radius:var(--r);color:var(--ink);font-family:inherit;padding:9px 12px;font-size:13px;outline:none;cursor:pointer}
      .sidebar-nav{flex:1;padding:14px 0;overflow-y:auto}
      .sidebar-nav-head{padding:8px 16px 6px;font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px}
      .nav-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 16px;color:var(--ink2);text-decoration:none;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border-left:3px solid transparent;background:transparent;border-top:none;border-right:none;border-bottom:none;font-family:inherit;width:100%;text-align:left}
      .nav-item:hover{background:rgba(26,106,232,.08);color:var(--ink);border-left-color:var(--b3)}
      .nav-item.active{background:rgba(26,106,232,.12);color:var(--blue3);border-left-color:var(--blue);font-weight:700}
      .nav-count{font-size:11px;color:var(--ink3);background:rgba(255,255,255,.06);padding:2px 7px;border-radius:999px;flex-shrink:0}
      .nav-item.active .nav-count{color:var(--blue3);background:rgba(26,106,232,.16)}

      /* ── MAIN AREA ── */
      .main{padding:0 0 100px;overflow-y:auto}
      .main-top{padding:20px 28px 16px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;background:var(--s);position:sticky;top:0;z-index:20;backdrop-filter:blur(12px)}
      .main-title{font-size:20px;font-weight:800;letter-spacing:-.4px}
      .main-count{font-size:12px;color:var(--ink2);margin-top:3px}

      /* ── CATEGORY SECTION ── */
      .cat-section{border-bottom:1px solid var(--b)}
      .cat-section-head{padding:18px 28px 14px;background:rgba(255,255,255,.015)}
      .cat-section-title{font-size:17px;font-weight:800;letter-spacing:-.3px;color:var(--ink)}
      .cat-section-sub{font-size:12px;color:var(--ink3);margin-top:3px}

      /* ── ITEM ROW ── (key design element — like cenikyremesel.cz) */
      .item-row{display:grid;grid-template-columns:52px minmax(0,1fr) 140px 130px 100px;gap:0;align-items:center;border-top:1px solid var(--b);transition:background .12s;padding:0}
      .item-row:hover{background:rgba(26,106,232,.04)}
      .item-row.in-cart{background:rgba(26,106,232,.06)}
      .item-icon{width:52px;height:60px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--ink3)}
      .item-icon svg{opacity:.4;transition:opacity .15s}
      .item-row.in-cart .item-icon svg{opacity:.8;color:var(--blue3)}
      .item-body{padding:13px 16px 13px 0}
      .item-name{font-size:14px;font-weight:500;color:var(--ink);line-height:1.4}
      .item-code{font-size:11px;color:var(--ink3);margin-top:3px;font-family:monospace}
      .item-price-col{padding:0 16px;text-align:right;border-left:1px solid var(--b)}
      .item-price{font-size:15px;font-weight:700;color:var(--ink)}
      .item-unit{font-size:11px;color:var(--ink3);margin-top:2px}
      .item-qty-col{padding:0 12px;border-left:1px solid var(--b);display:flex;align-items:center;justify-content:center;gap:10px}
      .qty-btn{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;cursor:pointer;border:none;flex-shrink:0;transition:all .15s;line-height:1}
      .qty-minus{background:rgba(232,58,58,.15);color:var(--red)}
      .qty-minus:hover{background:rgba(232,58,58,.35);color:#fff}
      .qty-plus{background:rgba(26,106,232,.15);color:var(--blue3)}
      .qty-plus:hover{background:rgba(26,106,232,.4);color:#fff}
      .qty-val{min-width:32px;text-align:center;font-size:16px;font-weight:700;color:var(--ink)}
      .qty-val.nonzero{color:var(--blue3)}
      .item-total-col{padding:0 16px;text-align:right;border-left:1px solid var(--b)}
      .item-total{font-size:15px;font-weight:700;color:var(--ink3)}
      .item-total.nonzero{color:var(--green)}
      .item-total-unit{font-size:11px;color:var(--ink3);margin-top:2px}

      /* ── FLOATING CART BOTTOM ── */
      .cart-bar{position:fixed;bottom:0;left:260px;right:0;z-index:30;background:rgba(4,14,28,.96);border-top:1px solid var(--b2);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:none;align-items:center;justify-content:space-between;gap:16px;padding:14px 28px;flex-wrap:wrap}
      .cart-bar.show{display:flex}
      .cart-summary{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
      .cart-stat{display:flex;flex-direction:column;align-items:center}
      .cart-stat .k{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
      .cart-stat .v{font-size:18px;font-weight:800;color:var(--ink)}
      .cart-stat .v.green{color:var(--green)}
      .cart-divider{width:1px;height:36px;background:var(--b2)}
      .cart-actions{display:flex;gap:10px;flex-wrap:wrap}

      /* ── ESTIMATE PANEL (hidden, toggled) ── */
      .estimate-panel{position:fixed;top:60px;right:0;bottom:0;z-index:35;width:420px;background:var(--s);border-left:1px solid var(--b2);box-shadow:-8px 0 40px rgba(0,0,0,.5);display:none;flex-direction:column;overflow:hidden}
      .estimate-panel.show{display:flex}
      .estimate-head{padding:18px 20px;border-bottom:1px solid var(--b2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
      .estimate-head-title{font-size:16px;font-weight:800}
      .estimate-body{flex:1;overflow-y:auto;padding:16px 20px}
      .estimate-foot{padding:16px 20px;border-top:1px solid var(--b2);display:grid;gap:8px;flex-shrink:0}
      .est-line{display:flex;align-items:start;justify-content:space-between;gap:10px;padding:10px 0;border-top:1px solid var(--b)}
      .est-line:first-child{border-top:none}
      .est-line-name{font-size:13px;font-weight:500;flex:1;line-height:1.4}
      .est-line-qty{font-size:12px;color:var(--ink2);margin-top:2px}
      .est-line-price{font-size:14px;font-weight:700;color:var(--ink);flex-shrink:0}
      .est-sum-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:14px}
      .est-sum-row:last-child{font-size:16px;font-weight:800;border-top:1px solid var(--b2);padding-top:10px;margin-top:4px}
      .manual-add-section{padding:16px 20px;border-top:1px solid var(--b)}
      .manual-grid{display:grid;grid-template-columns:1fr 60px 90px auto;gap:8px;align-items:end}
      .mini-input{background:var(--c);border:1px solid var(--b2);border-radius:8px;color:var(--ink);font-family:inherit;padding:8px 10px;font-size:13px;outline:none;width:100%}
      .mini-input:focus{border-color:var(--blue2)}

      /* ── EMPTY / LOADING ── */
      .empty{padding:48px 28px;text-align:center;color:var(--ink2);font-size:14px}

      @media(max-width:1100px){.page{grid-template-columns:220px minmax(0,1fr)}.cart-bar{left:220px}.estimate-panel{width:380px}}
      @media(max-width:800px){.page{grid-template-columns:1fr}.sidebar{display:none}.cart-bar{left:0}.estimate-panel{width:100%}.item-row{grid-template-columns:0 minmax(0,1fr) 110px 110px 80px}}
      @media(max-width:600px){.item-row{grid-template-columns:1fr auto auto}.item-icon{display:none}.item-price-col,.item-total-col,.item-qty-col{border-left:none;padding:0 6px}}
    </style>
  </head>
  <body>

    <!-- STICKY HEADER -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-mark">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M3 10.5L12 3l9 7.5V21a1 1 0 01-1 1H4a1 1 0 01-1-1V10.5z" stroke="rgba(180,215,255,.9)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9 22V14h6v8" stroke="rgba(180,215,255,.9)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div>
            <div class="logo-name">O&amp;L Master Dom</div>
            <div class="logo-sub">Databáze ceníku</div>
          </div>
        </div>
        <div class="header-info" id="leadSub">Načítání...</div>
        <div class="header-actions">
          <a class="btn" id="backClient" href="./client-card.html">← Ke kartě</a>
          <button class="btn" id="toggleEstimate">Zobrazit rozpočet (<span id="cartCount">0</span>)</button>
          <button class="btn primary" id="saveEstimate">Uložit rozpočet</button>
        </div>
      </div>
    </header>

    <!-- TWO-COLUMN LAYOUT -->
    <div class="page">

      <!-- LEFT SIDEBAR: NAVIGATION -->
      <aside class="sidebar">
        <div class="sidebar-filter">
          <select id="tradeType">
            <option value="electro">Elektrika</option>
            <option value="construction">Stavba</option>
          </select>
        </div>
        <div class="sidebar-search">
          <input id="catalogSearch" placeholder="Vyhledat položku česky..." />
        </div>
        <nav class="sidebar-nav">
          <div class="sidebar-nav-head">Kategorie prací</div>
          <div id="navItems"></div>
        </nav>
      </aside>

      <!-- RIGHT: CATALOG -->
      <main class="main">
        <div class="main-top">
          <div>
            <div class="main-title" id="mainTitle">Vyberte kategorii</div>
            <div class="main-count" id="mainCount"></div>
          </div>
        </div>
        <div id="catalogBody">
          <div class="empty">Načítání katalogu…</div>
        </div>
      </main>
    </div>

    <!-- FLOATING CART BAR (bottom) -->
    <div class="cart-bar" id="cartBar">
      <div class="cart-summary">
        <div class="cart-stat">
          <div class="k">Položek</div>
          <div class="v" id="cartCount2">0</div>
        </div>
        <div class="cart-divider"></div>
        <div class="cart-stat">
          <div class="k">Bez DPH</div>
          <div class="v green" id="cartNoVat">0,00 Kč</div>
        </div>
        <div class="cart-divider"></div>
        <div class="cart-stat">
          <div class="k">Celkem s DPH</div>
          <div class="v green" id="cartTotal">0,00 Kč</div>
        </div>
      </div>
      <div class="cart-actions">
        <button class="btn" id="toggleEstimate2">Zobrazit rozpočet →</button>
      </div>
    </div>

    <!-- SLIDE-IN ESTIMATE PANEL -->
    <div class="estimate-panel" id="estimatePanel">
      <div class="estimate-head">
        <div class="estimate-head-title">Aktuální rozpočet</div>
        <button class="btn" id="closeEstimate">✕</button>
      </div>
      <div class="estimate-body">
        <div style="margin-bottom:12px">
          <input class="mini-input" style="width:100%" id="estimateTitle" placeholder="Název rozpočtu" />
        </div>
        <div id="estimateLines">
          <div class="empty" style="padding:24px 0">Zatím žádné položky</div>
        </div>
      </div>
      <div class="manual-add-section">
        <div style="font-size:12px;color:var(--ink3);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Přidat ručně</div>
        <div class="manual-grid">
          <input class="mini-input" id="manualName" placeholder="Název" />
          <input class="mini-input" id="manualUnit" value="ks" placeholder="MJ" />
          <input class="mini-input" type="number" id="manualBase" value="0" placeholder="Cena" />
          <button class="btn primary" id="addManualLine">+</button>
        </div>
        <input class="mini-input" type="hidden" id="manualQty" value="1" />
      </div>
      <div class="estimate-foot" id="estimateTotals"></div>
    </div>

    <script>
      const params = new URLSearchParams(location.search)
      const leadId = Number(params.get('leadId') || 0)
      const jobId = Number(params.get('jobId') || 0)
      const estimateIdFromUrl = Number(params.get('estimateId') || 0)
      const pathModeBase = location.pathname.startsWith('/demo-crm') ? '/demo-crm' : ''
      const apiUrl = (p) => `${pathModeBase}${p}`
      const esc = (s) => String(s || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
      const fmt = (n) => Number(n || 0).toFixed(2).replace('.',',') + ' Kč'
      async function json(resp) { try { return await resp.json() } catch { return null } }

      let lead = null
      let job = null
      let estimate = null
      let catalog = []
      let activeNavKey = null

      const NAV_LABELS = {
        grooves:     'Sekání šliců (drážek) a kapes',
        boxes:       'Krabice',
        cables:      'Tahání kabelů',
        switchboards:'Rozvaděče',
        outlets:     'Zapojení zásuvek, vypínačů',
        other:       'Ostatní',
        completion:  'Kompletace',
        revision:    'Revize',
        demolition:  'Demontáže',
        hourly:      'Hodinové sazby',
        systems:     'Elektrikářské celky',
      }
      const NAV_ORDER = ['grooves','boxes','cables','switchboards','outlets','other','completion','revision','demolition','hourly','systems']

      function uiCategoryKey(item) {
        const name = String(item?.itemName || '').toLowerCase()
        const category = String(item?.categoryKey || '')
        const phase = String(item?.phaseKey || '')
        const unit = String(item?.unit || '').toLowerCase()
        if (unit === 'hod' || name.includes('hodin')) return 'hourly'
        if (phase === 'demolition' || category === 'cutting_and_grooves' || name.includes('sekání') || name.includes('dráž') || name.includes('kaps') || name.includes('výřez') || name.includes('vykrouž')) return 'grooves'
        if (category === 'boxes_and_junctions' || name.includes('krabice') || name.includes('rozvodka')) return 'boxes'
        if (category === 'cables_and_wires' || category === 'pipes_and_channels' || name.includes('kabel') || name.includes('vodič') || name.includes('trubka') || name.includes('lišta') || name.includes('kanál') || name.includes('hadice')) return 'cables'
        if (category === 'switchboard' || name.includes('rozvaděč') || name.includes('jistič') || name.includes('chránič') || name.includes('svodič') || name.includes('relé')) return 'switchboards'
        if (category === 'devices_and_outlets' || name.includes('zásuv') || name.includes('vypína') || name.includes('spínač') || name.includes('ovladač') || name.includes('stmíva')) return 'outlets'
        if (category === 'finishing' || name.includes('rámeček') || name.includes('kryt') || name.includes('komplet')) return 'completion'
        if (category === 'testing_and_revision' || name.includes('revize') || name.includes('měření') || name.includes('oživení')) return 'revision'
        if (name.includes('demont')) return 'demolition'
        if (name.includes('soubor') || name.includes('sestava') || name.includes('celek')) return 'systems'
        return 'other'
      }

      function grouped(items) {
        const map = new Map()
        for (const item of items) {
          const key = uiCategoryKey(item)
          if (!map.has(key)) map.set(key, [])
          map.get(key).push(item)
        }
        return map
      }

      function catalogLine(item) {
        return (estimate?.lines || []).find((x) => Number(x.catalogItemId || 0) === Number(item.id)) || null
      }

      function totals() {
        const lines = estimate?.lines || []
        const client = lines.reduce((s, x) => s + Number(x.totalClient || 0), 0)
        const vat = client * ((Number(estimate?.vatRate || 21)) / 100)
        return { count: lines.length, client, vat, total: client + vat }
      }

      function upsert(item, delta) {
        if (!estimate) return
        const existing = catalogLine(item)
        if (!existing && delta <= 0) return
        if (!existing) {
          estimate.lines.push({
            catalogItemId: item.id,
            phaseKey: item.phaseKey,
            categoryKey: item.categoryKey,
            itemName: item.itemName,
            unit: item.unit || 'ks',
            quantity: 1,
            basePrice: Number(item.basePrice || 0),
            clientPrice: Number(item.basePrice || 0),
            totalBase: Number(item.basePrice || 0),
            totalClient: Number(item.basePrice || 0),
            positionOrder: estimate.lines.length + 1,
          })
        } else {
          existing.quantity = Math.max(0, Number(existing.quantity || 0) + delta)
          if (existing.quantity <= 0) {
            estimate.lines = estimate.lines.filter((x) => Number(x.catalogItemId || 0) !== Number(item.id))
          } else {
            existing.totalBase  = existing.quantity * Number(existing.basePrice  || 0)
            existing.totalClient = existing.quantity * Number(existing.clientPrice || 0)
          }
        }
        renderCartBar()
        renderItemRows()
        renderEstimatePanel()
      }

      /* ── RENDER NAV ── */
      function renderNav() {
        const groups = grouped(catalog)
        const ordered = NAV_ORDER.filter((k) => groups.has(k)).concat(Array.from(groups.keys()).filter((k) => !NAV_ORDER.includes(k)))
        document.getElementById('navItems').innerHTML = ordered.map((key) => {
          const count = (groups.get(key) || []).length
          const inCartCount = (estimate?.lines || []).filter((l) => uiCategoryKey(l) === key).length
          const isActive = key === activeNavKey
          return `<button class="nav-item${isActive ? ' active' : ''}" data-nav="${esc(key)}">
            <span>${esc(NAV_LABELS[key] || key)}</span>
            <span class="nav-count">${inCartCount > 0 ? inCartCount + ' / ' : ''}${count}</span>
          </button>`
        }).join('')
        document.getElementById('navItems').querySelectorAll('[data-nav]').forEach((btn) => {
          btn.addEventListener('click', () => {
            activeNavKey = btn.getAttribute('data-nav')
            renderNav()
            renderItemRows()
            const groups2 = grouped(catalog)
            document.getElementById('mainTitle').textContent = NAV_LABELS[activeNavKey] || activeNavKey
            document.getElementById('mainCount').textContent = `${(groups2.get(activeNavKey) || []).length} položek`
          })
        })
      }

      /* ── RENDER CATALOG ITEMS ── */
      function renderItemRows() {
        const body = document.getElementById('catalogBody')
        if (!catalog.length) {
          body.innerHTML = '<div class="empty">Katalog je prázdný nebo nebyla nalezena žádná položka.</div>'
          return
        }
        const groups = grouped(catalog)
        const ordered = NAV_ORDER.filter((k) => groups.has(k)).concat(Array.from(groups.keys()).filter((k) => !NAV_ORDER.includes(k)))
        const toRender = activeNavKey ? (groups.get(activeNavKey) ? [activeNavKey] : ordered) : ordered
        if (!toRender.length || (activeNavKey && !groups.has(activeNavKey))) {
          body.innerHTML = '<div class="empty">V této kategorii nejsou žádné položky.</div>'
          return
        }
        body.innerHTML = toRender.map((key) => {
          const items = groups.get(key) || []
          return `
            <div class="cat-section" id="cat-${key}">
              <div class="cat-section-head">
                <div class="cat-section-title">${esc(NAV_LABELS[key] || key)}</div>
                <div class="cat-section-sub">${items.length} položek</div>
              </div>
              ${items.map((item) => {
                const line = catalogLine(item)
                const qty = Number(line?.quantity || 0)
                const rowTotal = qty * Number(item.basePrice || 0)
                const inCart = qty > 0
                return `
                  <div class="item-row${inCart ? ' in-cart' : ''}">
                    <div class="item-icon">
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/>
                      </svg>
                    </div>
                    <div class="item-body">
                      <div class="item-name">${esc(item.itemName)}</div>
                      ${item.sourceCode ? `<div class="item-code">${esc(item.sourceCode)}</div>` : ''}
                    </div>
                    <div class="item-price-col">
                      <div class="item-price">${esc(String(item.basePrice || 0))} Kč</div>
                      <div class="item-unit">/ ${esc(item.unit || 'ks')}</div>
                    </div>
                    <div class="item-qty-col">
                      <button class="qty-btn qty-minus" data-minus="${esc(String(item.id))}">−</button>
                      <span class="qty-val${qty > 0 ? ' nonzero' : ''}">${qty}</span>
                      <button class="qty-btn qty-plus" data-plus="${esc(String(item.id))}">+</button>
                    </div>
                    <div class="item-total-col">
                      <div class="item-total${qty > 0 ? ' nonzero' : ''}">${qty > 0 ? rowTotal.toFixed(0) + ' Kč' : '0 Kč'}</div>
                      <div class="item-total-unit">${qty > 0 ? qty + ' ' + esc(item.unit || 'ks') : '—'}</div>
                    </div>
                  </div>
                `
              }).join('')}
            </div>
          `
        }).join('')
        body.querySelectorAll('[data-plus]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const id = Number(btn.getAttribute('data-plus'))
            const item = catalog.find((x) => Number(x.id) === id)
            if (item) upsert(item, 1)
          })
        })
        body.querySelectorAll('[data-minus]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const id = Number(btn.getAttribute('data-minus'))
            const item = catalog.find((x) => Number(x.id) === id)
            if (item) upsert(item, -1)
          })
        })
      }

      /* ── RENDER CART BAR ── */
      function renderCartBar() {
        const t = totals()
        const bar = document.getElementById('cartBar')
        bar.classList.toggle('show', t.count > 0)
        document.getElementById('cartCount').textContent = String(t.count)
        document.getElementById('cartCount2').textContent = String(t.count)
        document.getElementById('cartNoVat').textContent = fmt(t.client)
        document.getElementById('cartTotal').textContent = fmt(t.total)
      }

      /* ── RENDER ESTIMATE PANEL ── */
      function renderEstimatePanel() {
        const lines = estimate?.lines || []
        const host = document.getElementById('estimateLines')
        document.getElementById('estimateTitle').value = estimate?.title || ''
        if (!lines.length) {
          host.innerHTML = '<div style="padding:16px 0;text-align:center;color:var(--ink3);font-size:13px">Zatím žádné položky</div>'
        } else {
          host.innerHTML = lines.map((line, idx) => `
            <div class="est-line">
              <div>
                <div class="est-line-name">${esc(line.itemName)}</div>
                <div class="est-line-qty">${line.quantity} ${esc(line.unit || 'ks')} × ${esc(String(line.clientPrice || 0))} Kč</div>
              </div>
              <div style="display:flex;align-items:center;gap:8px">
                <div class="est-line-price">${(Number(line.totalClient||0)).toFixed(0)} Kč</div>
                <button style="background:rgba(232,58,58,.15);border:none;color:var(--red);border-radius:6px;width:24px;height:24px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center" data-remove="${idx}">✕</button>
              </div>
            </div>
          `).join('')
        }
        host.querySelectorAll('[data-remove]').forEach((btn) => {
          btn.addEventListener('click', () => {
            estimate.lines.splice(Number(btn.getAttribute('data-remove')), 1)
            renderCartBar()
            renderItemRows()
            renderEstimatePanel()
          })
        })
        const t = totals()
        document.getElementById('estimateTotals').innerHTML = `
          <div class="est-sum-row"><span style="color:var(--ink2)">Bez DPH</span><strong>${fmt(t.client)}</strong></div>
          <div class="est-sum-row"><span style="color:var(--ink2)">DPH ${estimate?.vatRate || 21} %</span><strong>${fmt(t.vat)}</strong></div>
          <div class="est-sum-row"><span>Celkem s DPH</span><strong style="color:var(--green)">${fmt(t.total)}</strong></div>
        `
      }

      /* ── LOAD ── */
      async function loadCatalog() {
        const p = new URLSearchParams()
        const trade = document.getElementById('tradeType').value
        const search = document.getElementById('catalogSearch').value.trim()
        if (trade) p.set('tradeType', trade)
        if (search) p.set('search', search)
        const r = await fetch(apiUrl(`/api/crm/catalog/items?${p.toString()}`))
        const d = await json(r)
        catalog = (r.ok && d?.ok) ? (d.items || []) : []
        renderNav()
        if (!activeNavKey && catalog.length) {
          const groups = grouped(catalog)
          const ordered = NAV_ORDER.filter((k) => groups.has(k))
          activeNavKey = ordered[0] || null
          if (activeNavKey) {
            document.getElementById('mainTitle').textContent = NAV_LABELS[activeNavKey] || activeNavKey
            document.getElementById('mainCount').textContent = `${(groups.get(activeNavKey) || []).length} položek`
          }
        }
        renderItemRows()
      }
      async function ensureEstimate() {
        if (!lead?.id) throw new Error('lead_missing_for_estimate')
        if (estimateIdFromUrl) {
          const r = await fetch(apiUrl(`/api/crm/estimates/${estimateIdFromUrl}`))
          const d = await json(r)
          if (r.ok && d?.ok) { estimate = d.estimate; return }
        }
        const existing = await fetch(apiUrl(`/api/crm/estimates?leadId=${encodeURIComponent(String(leadId))}`))
        const existingJson = await json(existing)
        if (existing.ok && existingJson?.ok && existingJson.estimates?.length) {
          estimate = existingJson.estimates[0]; return
        }
        const create = await fetch(apiUrl('/api/crm/estimates/from-lead'), {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ leadId }),
        })
        const createJson = await json(create)
        if (!create.ok || !createJson?.ok) throw new Error(createJson?.error || 'estimate_create_failed')
        estimate = createJson.estimate
      }
      async function loadLead() {
        if (Number.isFinite(jobId) && jobId > 0) {
          const jr = await fetch(apiUrl(`/api/crm/jobs/${jobId}`))
          const jd = await json(jr)
          if (jr.ok && jd?.ok) {
            job = jd.job
            if (Number.isFinite(Number(job?.leadId)) && Number(job.leadId) > 0) {
              const lr = await fetch(apiUrl(`/api/leads/${job.leadId}`))
              const ld = await json(lr)
              if (lr.ok && ld?.ok) lead = ld.lead
            }
            if (!lead && jd?.customer) {
              lead = { id: job.leadId || null, fullName: jd.customer.name || jd.customer.companyName || 'Klient', name: jd.customer.name || jd.customer.companyName || 'Klient', clientNumber: jd.customer.internalNumber || job.clientNumberSnapshot || null }
            }
            document.getElementById('leadSub').textContent = `${lead?.fullName || lead?.name || job.title || 'Zakázka'} · č. ${lead?.clientNumber || job.clientNumberSnapshot || '—'}`
            document.getElementById('backClient').href = `./job-detail.html?jobId=${encodeURIComponent(String(job.id))}`
            return
          }
        }
        if (Number.isFinite(leadId) && leadId > 0) {
          const r = await fetch(apiUrl(`/api/leads/${leadId}`))
          const d = await json(r)
          if (!r.ok || !d?.ok) throw new Error('lead_failed')
          lead = d.lead
          const jr = await fetch(apiUrl(`/api/crm/jobs?leadId=${encodeURIComponent(String(lead.id))}`))
          const jd = await json(jr)
          if (jr.ok && jd?.ok && jd.jobs?.length) job = jd.jobs[0]
          document.getElementById('leadSub').textContent = `${lead.fullName || lead.name || ''} · č. ${lead.clientNumber || '—'}`
          document.getElementById('backClient').href = job ? `./job-detail.html?jobId=${encodeURIComponent(String(job.id))}` : `./client-card.html?leadId=${encodeURIComponent(String(lead.id))}`
          return
        }
        throw new Error('missing_job_or_lead_id')
      }
      async function saveEstimate() {
        if (!estimate) return
        estimate.title = document.getElementById('estimateTitle').value.trim() || estimate.title
        const r = await fetch(apiUrl(`/api/crm/estimates/${estimate.id}`), {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: estimate.title, tradeType: document.getElementById('tradeType').value, clientNumberSnapshot: lead?.clientNumber || job?.clientNumberSnapshot || null, lines: estimate.lines }),
        })
        const d = await json(r)
        if (!r.ok || !d?.ok) { alert(d?.error || 'Nelze uložit'); return }
        estimate = d.estimate
        alert('Uloženo ✓')
      }

      /* ── EVENTS ── */
      document.getElementById('addManualLine').addEventListener('click', () => {
        const name = document.getElementById('manualName').value.trim() || 'Nová položka'
        const unit = document.getElementById('manualUnit').value.trim() || 'ks'
        const price = Number(document.getElementById('manualBase').value || 0)
        estimate.lines.push({ itemName: name, unit, quantity: 1, basePrice: price, clientPrice: price, totalBase: price, totalClient: price, phaseKey: 'service', categoryKey: 'manual', positionOrder: estimate.lines.length + 1 })
        document.getElementById('manualName').value = ''
        renderCartBar(); renderItemRows(); renderEstimatePanel()
      })
      document.getElementById('saveEstimate').addEventListener('click', saveEstimate)
      const togglePanel = () => {
        const p = document.getElementById('estimatePanel')
        p.classList.toggle('show')
        renderEstimatePanel()
      }
      document.getElementById('toggleEstimate').addEventListener('click', togglePanel)
      document.getElementById('toggleEstimate2').addEventListener('click', togglePanel)
      document.getElementById('closeEstimate').addEventListener('click', () => document.getElementById('estimatePanel').classList.remove('show'))
      document.getElementById('tradeType').addEventListener('change', () => { activeNavKey = null; loadCatalog() })
      let searchTimer
      document.getElementById('catalogSearch').addEventListener('input', () => {
        clearTimeout(searchTimer)
        searchTimer = setTimeout(() => { activeNavKey = null; loadCatalog() }, 300)
      })

      ;(async () => {
        try {
          await loadLead()
          await ensureEstimate()
          document.getElementById('tradeType').value = estimate.tradeType || 'electro'
          renderCartBar()
          renderEstimatePanel()
          await loadCatalog()
        } catch (e) {
          document.getElementById('leadSub').textContent = 'Tuto stránku otevřete ze zakázky nebo z pipeline.'
          document.getElementById('catalogBody').innerHTML = `<div class=\"empty\">Chyba: ${String(e?.message || e)}<br><br><a class=\"btn primary\" href=\"./index.html\">Otevřít CRM pipeline</a></div>`
        }
      })()
    </script>
  </body>
</html>
