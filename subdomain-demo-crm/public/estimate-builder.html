<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O&L Master Dom · Кошторис</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    ;(function(){
      const tok = localStorage.getItem('crmToken')
      if (!tok) { location.replace('./login.html?next=' + encodeURIComponent(location.href)); return }
      try {
        const p = JSON.parse(atob(tok.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')))
        if (p.exp && Date.now() / 1000 > p.exp) { localStorage.removeItem('crmToken'); location.replace('./login.html?next=' + encodeURIComponent(location.href)) }
      } catch { localStorage.removeItem('crmToken'); location.replace('./login.html') }
    })()
  </script>
  <style>
    :root{
      --bg:#020C18;--s:#071626;--s2:#091B30;--c:#0C1E38;--c2:#0F2442;
      --b:rgba(255,255,255,.06);--b2:rgba(255,255,255,.11);
      --ink:#E6F0FF;--ink2:#7AA2C4;--ink3:#3D618A;
      --blue:#1A6AE8;--blue2:#3D87F8;--blue3:#60A5FF;
      --green:#14C98A;--red:#E83A3A;--r:10px;
      --sh:0 8px 32px rgba(0,0,0,.45);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;font-size:14px}

    /* HEADER */
    .hdr{position:fixed;top:0;left:0;right:0;z-index:50;height:56px;background:rgba(2,12,24,.96);border-bottom:1px solid var(--b2);backdrop-filter:blur(16px);display:flex;align-items:center;padding:0 20px;gap:12px}
    .hdr-logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .hdr-logo img{height:40px;width:auto;max-width:130px;object-fit:contain;border-radius:8px;border:1px solid rgba(61,135,248,.3)}
    .hdr-logo-name{font-size:14px;font-weight:800;color:var(--ink)}
    .hdr-ctx{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
    .hdr-ctx-title{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hdr-ctx-sub{font-size:11px;color:var(--ink3)}
    .hdr-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);font:inherit;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--b2);background:var(--c);color:var(--ink);text-decoration:none;white-space:nowrap;transition:all .15s}
    .btn:hover{background:var(--c2)}
    .btn.primary{background:linear-gradient(135deg,#1A6AE8,#2D80F8);color:#fff;border:none}
    .btn.green{background:linear-gradient(135deg,#0EA574,#14C98A);color:#fff;border:none}
    .btn.orange{background:linear-gradient(135deg,#D97706,#F59E0B);color:#fff;border:none}
    .btn.sm{padding:6px 10px;font-size:12px}
    .user-chip{display:flex;align-items:center;gap:7px;background:var(--c);border:1px solid var(--b2);border-radius:999px;padding:4px 12px 4px 6px;font-size:12px;font-weight:600;flex-shrink:0}
    .user-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#1A6AE8,#14C98A);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff}
    .btn-logout{border:1px solid rgba(232,58,58,.25);background:rgba(232,58,58,.06);color:#F07070;border-radius:999px;padding:5px 12px;font:inherit;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}

    /* LAYOUT — catalog takes full screen */
    .layout{position:fixed;top:56px;left:0;right:0;bottom:0}
    .cat-panel{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden}

    /* CART DRAWER */
    .drawer-backdrop{position:fixed;inset:0;top:56px;background:rgba(0,0,0,.45);z-index:79;display:none;cursor:pointer}
    .drawer-backdrop.show{display:block}
    .cart-drawer{position:fixed;top:56px;bottom:0;right:0;width:500px;max-width:calc(100vw - 40px);background:var(--s);border-left:2px solid var(--b2);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1);z-index:80;box-shadow:-12px 0 60px rgba(0,0,0,.55)}
    .cart-drawer.open{transform:translateX(0)}
    .cart-badge{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:10px;background:var(--green);color:#fff;font-size:11px;font-weight:800;padding:0 5px;margin-left:4px}
    .cat-search{padding:12px 16px;border-bottom:1px solid var(--b2);background:rgba(7,22,38,.95);flex-shrink:0;display:flex;gap:10px}
    .cat-search input{flex:1;background:var(--c);border:1px solid var(--b2);border-radius:var(--r);color:var(--ink);padding:10px 14px;font:inherit;font-size:14px;outline:none}
    .cat-search input:focus{border-color:var(--blue);background:var(--c2)}
    .cat-search input::placeholder{color:var(--ink3)}
    .cat-filters{padding:10px 16px;border-bottom:1px solid var(--b2);background:rgba(7,22,38,.9);flex-shrink:0;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .cat-chip{border:1px solid var(--b2);background:var(--c);color:var(--ink2);padding:6px 12px;border-radius:999px;font:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
    .cat-chip.active{background:rgba(26,106,232,.18);color:var(--blue3);border-color:rgba(61,135,248,.4)}
    .cat-list{flex:1;overflow-y:auto;padding-bottom:16px}
    .cat-group-head{position:sticky;top:0;z-index:2;padding:10px 20px 8px;background:rgba(9,27,48,.97);border-bottom:1px solid var(--b2);display:flex;justify-content:space-between;align-items:center}
    .cat-group-name{font-size:12px;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px}
    .cat-group-count{font-size:11px;color:var(--ink3)}
    .cat-item{display:grid;grid-template-columns:minmax(0,1fr) 100px 130px;align-items:center;padding:10px 20px;border-bottom:1px solid var(--b2);gap:12px;transition:background .12s}
    .cat-item:hover{background:rgba(26,106,232,.05)}
    .cat-item.in-cart{background:rgba(20,201,138,.05);border-left:3px solid var(--green)}
    .cat-item-name{font-size:13px;font-weight:500;line-height:1.35;color:var(--ink)}
    .cat-item-code{font-size:10px;color:var(--ink3);font-family:monospace;margin-top:2px}
    .cat-item-price{text-align:right}
    .cat-item-price-main{font-size:13px;font-weight:700;color:var(--ink)}
    .cat-item-price-sub{font-size:10px;color:var(--ink3);margin-top:1px}
    .cat-item-ctrl{display:flex;align-items:center;justify-content:flex-end;gap:6px}
    .q-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
    .q-minus{background:rgba(232,58,58,.15);color:var(--red)}
    .q-minus:hover{background:rgba(232,58,58,.28)}
    .q-plus{background:rgba(26,106,232,.18);color:var(--blue3)}
    .q-plus:hover{background:rgba(26,106,232,.32)}
    .q-val{min-width:28px;text-align:center;font-size:15px;font-weight:800;color:var(--ink)}
    .q-val.has{color:var(--green)}
    .cat-empty{padding:48px 24px;text-align:center;color:var(--ink3);font-size:14px}

    /* (cart is now in a drawer) */
    .cart-head{padding:14px 18px;border-bottom:1px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;background:rgba(7,22,38,.95)}
    .cart-head-title{font-size:16px;font-weight:800}
    .cart-head-count{font-size:12px;color:var(--ink2)}
    .cart-body{flex:1;overflow-y:auto;padding:0}
    .cart-empty{padding:40px 20px;text-align:center;color:var(--ink3);font-size:13px}
    .cart-cat-head{padding:10px 16px 8px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);background:rgba(255,255,255,.02);border-bottom:1px solid var(--b2)}
    .cart-line{display:grid;grid-template-columns:minmax(0,1fr) 90px 32px;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--b2)}
    .cart-line:hover{background:rgba(255,255,255,.02)}
    .cart-line-name{font-size:12px;font-weight:500;line-height:1.3;color:var(--ink)}
    .cart-line-price{text-align:right}
    .cart-line-total{font-size:13px;font-weight:700;color:var(--green)}
    .cart-line-unit{font-size:10px;color:var(--ink3);margin-top:1px}
    .cart-line-qty{display:flex;align-items:center;gap:4px;justify-content:center}
    .cq-btn{width:24px;height:24px;border-radius:50%;border:none;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center}
    .cq-m{background:rgba(232,58,58,.12);color:var(--red)}
    .cq-p{background:rgba(26,106,232,.14);color:var(--blue3)}
    .cq-val{width:28px;text-align:center;background:transparent;border:none;color:var(--ink);font:inherit;font-size:12px;font-weight:700}
    .cart-del{background:transparent;border:none;color:var(--ink3);cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px}
    .cart-del:hover{color:var(--red)}
    .cart-subrow{padding:8px 14px;display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--ink2);background:rgba(255,255,255,.025);border-bottom:2px solid var(--b2)}
    .cart-footer{flex-shrink:0;border-top:2px solid var(--b2);background:var(--s)}
    .cart-totals{padding:14px 16px 0;display:flex;flex-direction:column;gap:6px}
    .tot-row{display:flex;justify-content:space-between;align-items:center;font-size:13px}
    .tot-row.sub{font-size:12px;color:var(--ink2)}
    .tot-row.final-row{background:linear-gradient(135deg,#0E4A2B,#0D5C35);border-radius:10px;padding:12px 14px;margin-top:4px;font-size:16px;font-weight:800}
    .tot-row.final-row strong{font-size:18px;color:var(--green)}
    .dph-input{width:52px;background:var(--c);border:1px solid var(--b2);border-radius:6px;color:var(--ink);padding:3px 6px;font:inherit;font-size:13px;text-align:center}
    .cart-btns{padding:12px 16px 16px;display:flex;flex-direction:column;gap:8px}

    /* PREVIEW OVERLAY */
    .preview-overlay{position:fixed;top:56px;left:0;right:0;bottom:0;background:#D6DBE3;overflow-y:auto;z-index:100;display:none}
    .preview-overlay.show{display:block}
    .preview-topbar{position:sticky;top:0;z-index:10;padding:12px 24px;background:rgba(2,12,24,.95);border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px;backdrop-filter:blur(12px)}
    .preview-topbar-title{font-size:14px;font-weight:700;color:#E6F0FF;flex:1}

    /* PDF PAPER */
    .pdf-wrap{padding:32px 24px 60px}
    .pdf-paper{background:#fff;max-width:1280px;margin:0 auto;padding:36px 44px 44px;box-shadow:0 8px 40px rgba(0,0,0,.18);border-radius:3px;color:#1A1A1A;font-family:'Inter',sans-serif}
    .pdf-paper h1.doc-title{font-size:22px;font-weight:800;color:#111;margin-bottom:16px}
    .pdf-title-label{font-size:13px;color:#6B7280;margin-bottom:4px}
    .pdf-info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
    .pdf-info-box{background:#F9FAFB;border:1px solid #E5E7EB;border-radius:5px;padding:10px 14px}
    .pdf-info-box .lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#9CA3AF;margin-bottom:4px}
    .pdf-info-box .val{font-size:14px;font-weight:600;color:#111}
    .pdf-editable{border:1px dashed #BFD3F0;border-radius:3px;padding:2px 6px;min-width:40px;outline:none;background:transparent;cursor:text;font:inherit;color:inherit}
    .pdf-editable:focus{border-color:#1A6AE8;background:#EEF4FF;border-style:solid}
    .pdf-table-wrap{overflow-x:auto;margin-top:6px;border:1.5px solid #666}
    .pdf-table{width:100%;border-collapse:collapse;font-size:11px}
    .pdf-table th,.pdf-table td{border:1px solid #999;padding:5px 7px;vertical-align:middle}
    .pdf-table thead tr.th1 th{background:#E5E7EB;font-weight:800;font-size:10px;text-align:center;color:#1A1A1A;border-bottom:2px solid #888}
    .pdf-table thead tr.th2 th{font-weight:700;font-size:10px;text-align:center;font-style:italic;color:#555;border-bottom:2px solid #888}
    .pdf-totals-box{border:1.5px solid #B0BAC8;border-radius:6px;overflow:hidden;min-width:340px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
    .pdf-tot-row{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;border-top:1px solid #E0E6F0;font-size:13px}
    .pdf-tot-row:first-child{border-top:none}
    .pdf-tot-row.final{background:linear-gradient(135deg,#1845B8,#1A6AE8);color:#fff;font-weight:800;font-size:16px;padding:12px 16px}
    .pdf-footer{margin-top:28px;padding-top:14px;border-top:1.5px solid #E0E6F0;display:flex;justify-content:space-between;font-size:11px;color:#9CA3AF}

    /* Ostatní inline section in cart */
    .ostatni-section{border-top:2px solid var(--b2);margin-top:0}
    .ostatni-add{padding:10px 14px;display:flex;gap:8px}
    .ostatni-add input{flex:1;background:var(--c);border:1px solid var(--b2);border-radius:8px;color:var(--ink);padding:8px 10px;font:inherit;font-size:12px}
    .ostatni-add input::placeholder{color:var(--ink3)}
    .ostatni-add .amt{width:90px;text-align:right}

    /* material row below each cart work-line */
    .cart-mat-row{padding:4px 14px 8px;border-bottom:1px solid var(--b2);background:rgba(255,255,255,.01);display:flex;align-items:center;gap:6px;min-height:26px}
    .mat-add-btn{flex:1;background:rgba(251,191,36,.07);border:1px dashed rgba(251,191,36,.28);color:#FBB624;border-radius:6px;padding:4px 10px;font:inherit;font-size:11px;font-weight:600;cursor:pointer;text-align:left;transition:all .15s}
    .mat-add-btn:hover{background:rgba(251,191,36,.15);border-color:rgba(251,191,36,.55)}
    .mat-badge{flex:1;font-size:11px;color:#FBBF24;display:flex;align-items:center;gap:5px;overflow:hidden}
    .mat-badge-icon{flex-shrink:0}
    .mat-badge-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink)}
    .mat-badge-price{color:var(--ink3);font-size:10px;flex-shrink:0;white-space:nowrap}
    .mat-change-btn{background:transparent;border:none;color:var(--ink3);cursor:pointer;font-size:11px;padding:2px 5px;border-radius:4px;flex-shrink:0;transition:all .12s}
    .mat-change-btn:hover{color:var(--ink);background:var(--c)}
    .mat-clear-btn{background:transparent;border:none;color:rgba(232,58,58,.5);cursor:pointer;font-size:11px;padding:2px 5px;border-radius:4px;flex-shrink:0;transition:all .12s}
    .mat-clear-btn:hover{color:var(--red)}

    /* MATERIAL PICKER MODAL */
    .mat-modal-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;padding:20px}
    .mat-modal{background:var(--s);border:1.5px solid var(--b2);border-radius:16px;width:580px;max-width:100%;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 28px 80px rgba(0,0,0,.7)}
    .mat-modal-head{padding:15px 18px;border-bottom:1px solid var(--b2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .mat-modal-head h3{font-size:15px;font-weight:800;color:var(--ink)}
    .mat-modal-for{font-size:11px;color:var(--ink3);margin-top:2px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .mat-modal-search{padding:12px 18px 8px;flex-shrink:0}
    .mat-modal-search input{width:100%;background:var(--c);border:1px solid var(--b2);border-radius:8px;color:var(--ink);padding:10px 14px;font:inherit;font-size:13px;outline:none;transition:border-color .15s}
    .mat-modal-search input:focus{border-color:var(--blue)}
    .mat-modal-search input::placeholder{color:var(--ink3)}
    .mat-modal-results{flex:1;overflow-y:auto;padding:4px 8px}
    .mat-item{padding:9px 12px;border-radius:8px;cursor:pointer;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;transition:background .1s;border:1px solid transparent}
    .mat-item:hover{background:var(--c);border-color:var(--b2)}
    .mat-item.selected{background:rgba(20,201,138,.1);border-color:rgba(20,201,138,.35)}
    .mat-item-name{font-size:13px;font-weight:500;color:var(--ink);line-height:1.3}
    .mat-item-code{font-size:10px;color:var(--ink3);font-family:monospace;margin-top:2px}
    .mat-item-price{font-size:13px;font-weight:700;color:var(--ink);text-align:right}
    .mat-item-unit{font-size:10px;color:var(--ink3);text-align:right}
    .mat-modal-footer{padding:12px 18px;border-top:1px solid var(--b2);display:flex;gap:8px;flex-shrink:0}
    .mat-modal-empty{padding:36px 20px;text-align:center;color:var(--ink3);font-size:13px;line-height:1.6}
    .mat-modal-empty a{color:var(--blue3)}

    @media(max-width:600px){.cart-drawer{width:100%;max-width:100%}.mat-modal{width:100%;max-width:100%;border-radius:16px 16px 0 0;max-height:90vh}.mat-modal-bg{align-items:flex-end;padding:0}}
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-logo">
      <img src="./logo.jpg" alt="O&L" />
      <div class="hdr-logo-name">O&amp;L Master Dom</div>
    </div>
    <div class="hdr-ctx">
      <div class="hdr-ctx-title" id="ctxTitle">Кошторис</div>
      <div class="hdr-ctx-sub" id="ctxSub">Завантаження...</div>
    </div>
    <div class="hdr-actions">
      <a href="./index.html" id="backLink" class="btn">← Pipeline</a>
      <button id="btnSave" class="btn">💾 Зберегти</button>
      <button id="btnGenerate" class="btn orange">⚡ Excel / PDF</button>
      <button id="btnPreview" class="btn">👁 Перегляд</button>
      <button id="cartToggle" class="btn green" style="font-weight:800">🧾 Кошик<span class="cart-badge" id="cartCountBadge">0</span></button>
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">?</div>
        <div>
          <div id="userName" style="font-size:12px;line-height:1.2">—</div>
          <div id="userRole" style="font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.3px">—</div>
        </div>
      </div>
      <button class="btn-logout" id="logoutBtn">↩</button>
    </div>
  </header>

  <!-- BACKDROP -->
  <div class="drawer-backdrop" id="drawerBackdrop"></div>

  <!-- MAIN LAYOUT: fullscreen catalog -->
  <div class="layout">
    <div class="cat-panel">
      <div class="cat-search">
        <input id="searchInput" type="search" placeholder="🔍  Hledat pozici v katalogu..." autocomplete="off" />
      </div>
      <div class="cat-filters" id="catFilters">
        <button class="cat-chip active" data-group="all">Vše</button>
        <button class="cat-chip" data-group="grooves">Sekání šliců</button>
        <button class="cat-chip" data-group="boxes">Krabice</button>
        <button class="cat-chip" data-group="cables">Tahání kabelů</button>
        <button class="cat-chip" data-group="switchboards">Rozvaděče</button>
        <button class="cat-chip" data-group="outlets">Zásuvky</button>
        <button class="cat-chip" data-group="completion">Kompletace</button>
        <button class="cat-chip" data-group="revision">Revize</button>
        <button class="cat-chip" data-group="other">Ostatní</button>
      </div>
      <div class="cat-list" id="catList">
        <div class="cat-empty">Načítání katalogu...</div>
      </div>
    </div>
  </div>

  <!-- CART DRAWER (slide-out from right) -->
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-head">
      <div>
        <div class="cart-head-title">🧾 Кошторис</div>
        <div class="cart-head-count" id="cartCount">0 položek</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn sm" id="btnAddOstatni" title="Ostatní rozpočtové náklady">+ Ostatní</button>
        <button class="btn sm" id="drawerClose" style="font-size:16px;padding:6px 10px">✕</button>
      </div>
    </div>
    <div class="cart-body" id="cartBody">
      <div class="cart-empty">Vyberte položky z katalogu.</div>
    </div>
    <div class="cart-footer">
      <div class="cart-totals" id="cartTotals"></div>
      <div class="cart-btns">
        <button class="btn green" id="cartPreviewBtn" style="justify-content:center;font-size:14px;padding:12px">👁 Попередній перегляд</button>
        <button class="btn primary" id="cartSaveBtn" style="justify-content:center;font-size:13px;padding:10px">💾 Зберегти кошторис</button>
      </div>
    </div>
  </div>

  <!-- PREVIEW OVERLAY -->
  <div class="preview-overlay" id="previewOverlay">
    <div class="preview-topbar">
      <button class="btn" id="closePreview">← Назад до редактора</button>
      <div class="preview-topbar-title" id="previewTopTitle">Попередній перегляд документу</div>
      <button id="pvSaveEdits" class="btn orange">💾 Зберегти зміни</button>
      <button id="pvGenerate" class="btn orange">⚡ Excel / PDF</button>
      <button id="pvSend" class="btn green">✉ Надіслати клієнту</button>
    </div>
    <div class="pdf-wrap" id="previewContent"></div>
  </div>

  <!-- SEND POPOVER -->
  <div id="sendPopover" style="display:none;position:fixed;bottom:80px;right:24px;width:360px;background:rgba(7,22,42,.98);border:1px solid var(--b2);border-radius:18px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.6);z-index:200">
    <div style="font-size:14px;font-weight:800;margin-bottom:12px">Відправити кошторис PDF</div>
    <div style="margin-bottom:8px"><div style="font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">Email клієнта</div><input id="sendEmail" class="btn" style="width:100%;background:var(--c)" placeholder="email@example.com" /></div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button id="sendDoIt" class="btn primary" style="flex:1;justify-content:center">Відправити PDF →</button>
      <button id="sendCancel" class="btn">✕</button>
    </div>
    <div id="sendLinks" style="margin-top:10px;display:flex;gap:8px">
      <a id="xlsxLink" href="#" class="btn sm" style="display:none" download>⬇ Excel</a>
      <a id="pdfLink" href="#" class="btn sm" style="display:none" download>⬇ PDF</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search)
    const leadId = Number(params.get('leadId') || 0)
    const jobId = Number(params.get('jobId') || 0)
    const estimateIdFromUrl = Number(params.get('estimateId') || 0)
    const base = location.pathname.startsWith('/demo-crm') ? '/demo-crm' : ''
    const apiUrl = (p) => `${base}${p}`
    const crmToken = () => localStorage.getItem('crmToken') || ''
    const apiFetch = (url, opts = {}) => {
      const h = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + crmToken(), ...(opts.headers || {}) }
      return fetch(url, { ...opts, headers: h })
    }
    const esc = (s) => String(s || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
    const fmtMoney = (n) => `${Number(n || 0).toLocaleString('cs-CZ', { minimumFractionDigits: 0, maximumFractionDigits: 0 })} Kč`
    const fmtDate = (iso) => { try { return new Date(iso).toLocaleDateString('cs-CZ', { day:'2-digit', month:'2-digit', year:'numeric' }) } catch { return '—' } }
    async function jParse(resp) { try { return await resp.json() } catch { return null } }

    let lead = null, job = null, estimate = null, catalog = [], customPriceOverrides = new Map()
    let activeGroup = 'all', searchQ = '', cartOpen = false

    function openCart() {
      cartOpen = true
      document.getElementById('cartDrawer').classList.add('open')
      document.getElementById('drawerBackdrop').classList.add('show')
    }
    function closeCart() {
      cartOpen = false
      document.getElementById('cartDrawer').classList.remove('open')
      document.getElementById('drawerBackdrop').classList.remove('show')
    }
    function toggleCart() { cartOpen ? closeCart() : openCart() }

    // ── LABELS ──
    const NAV_LABELS = { grooves:'Sekání šliců a kapes', boxes:'Krabice', cables:'Tahání kabelů', switchboards:'Rozvaděče', outlets:'Zásuvky a vypínače', other:'Ostatní', completion:'Kompletace', revision:'Revize', demolition:'Demontáže', hourly:'Hodinové sazby', systems:'Elektrikářské celky' }
    const NAV_ORDER = ['grooves','boxes','cables','switchboards','outlets','completion','other','revision','demolition','hourly','systems']

    function uiGroupKey(item) {
      const name = String(item?.itemName || item?.workDescription || '').toLowerCase()
      if (item?.unit === 'hod' || name.includes('hodin')) return 'hourly'
      if (name.includes('sekání') || name.includes('dráž') || name.includes('kaps') || name.includes('výřez') || name.includes('vykrouž')) return 'grooves'
      if (name.includes('krabice') || name.includes('rozvodka')) return 'boxes'
      if (name.includes('kabel') || name.includes('vodič') || name.includes('trubka') || name.includes('lišta') || name.includes('kanál')) return 'cables'
      if (name.includes('rozvaděč') || name.includes('jistič') || name.includes('chránič') || name.includes('svodič')) return 'switchboards'
      if (name.includes('zásuv') || name.includes('vypína') || name.includes('spínač') || name.includes('stmíva')) return 'outlets'
      if (name.includes('rámeček') || name.includes('kryt') || name.includes('komplet')) return 'completion'
      if (name.includes('revize') || name.includes('měření') || name.includes('oživení')) return 'revision'
      if (name.includes('demont')) return 'demolition'
      return 'other'
    }

    function estimateCategory(line) {
      const raw = String(line?.category || line?.sectionType || '').toLowerCase()
      if (raw === 'stavba' || raw === 'construction') return 'stavba'
      if (raw === 'ostatni' || raw === 'ostatni_naklady') return 'ostatni_naklady'
      return 'elektro'
    }

    function lineCode(line, idx) {
      if (line?.sourceCatalogCode) return line.sourceCatalogCode
      const cat = estimateCategory(line)
      const prefix = cat === 'stavba' ? 'STV' : cat === 'ostatni_naklady' ? 'OST' : 'ELE'
      return `${prefix}-${String(idx + 1).padStart(3, '0')}`
    }

    function normalizeLines(lines) {
      return (lines || []).map((line, idx) => {
        const cat = estimateCategory(line)
        const qty = Number(line.quantity || 0)
        const lU = Number(line.laborUnitPrice ?? line.clientPrice ?? 0)
        const mU = Number(line.materialUnitPrice || 0)
        const lT = +(qty * lU).toFixed(2)
        const mT = +(qty * mU).toFixed(2)
        const tot = +(lT + mT).toFixed(2)
        return { ...line, lineCode: lineCode(line, idx), sectionType: cat, category: cat,
          workDescription: line.workDescription || line.itemName || '',
          materialDescription: line.materialDescription || '', unit: line.unit || 'ks',
          quantity: qty, laborUnitPrice: lU, materialUnitPrice: mU,
          laborTotal: lT, materialTotal: mT, lineTotal: tot, positionOrder: idx + 1 }
      })
    }

    function groupedEstimate(lines) {
      const map = new Map()
      for (const l of normalizeLines(lines)) {
        const key = estimateCategory(l)
        if (!map.has(key)) map.set(key, [])
        map.get(key).push(l)
      }
      return map
    }

    function totals(lines) {
      const norm = normalizeLines(lines || [])
      const mainLines = norm.filter(l => l.sectionType !== 'ostatni_naklady')
      const labor = mainLines.reduce((s, l) => s + l.laborTotal, 0)
      const material = mainLines.reduce((s, l) => s + l.materialTotal, 0)
      const ostatni = norm.filter(l => l.sectionType === 'ostatni_naklady').reduce((s,l)=>s+l.lineTotal,0)
      const bezDph = labor + material + ostatni
      const vr = Number(estimate?.vatRate || 21)
      const dph = +(bezDph * vr / 100).toFixed(2)
      const total = +(bezDph + dph).toFixed(2)
      return { labor, material, ostatni, bezDph, dph, total, vr }
    }

    function catalogLine(item) {
      return (estimate?.lines || []).find(x => Number(x.catalogItemId || 0) === Number(item.id)) || null
    }

    function effectivePrice(item) {
      const override = customPriceOverrides.get(Number(item.id))
      return Number.isFinite(override) ? override : Number(item.basePrice || 0)
    }

    function addItem(item, delta) {
      if (!estimate) return
      const existing = catalogLine(item)
      if (!existing && delta <= 0) return
      if (!existing) {
        estimate.lines.push({
          catalogItemId: item.id,
          sourceCatalogCode: item.sourceCode || null,
          category: 'elektro', sectionType: 'elektro',
          itemName: item.itemName,
          workDescription: item.itemName,
          materialDescription: '',
          unit: item.unit || 'ks',
          quantity: 1,
          laborUnitPrice: effectivePrice(item),
          materialUnitPrice: 0,
        })
      } else {
        existing.quantity = Math.max(0, Number(existing.quantity || 0) + delta)
        existing.laborUnitPrice = effectivePrice(item)
        if (existing.quantity <= 0) {
          estimate.lines = estimate.lines.filter(x => Number(x.catalogItemId || 0) !== Number(item.id))
        }
      }
      estimate.lines = normalizeLines(estimate.lines)
      renderAll()
      // Flash the cart badge to signal item was added
      const badge = document.getElementById('cartCountBadge')
      if (badge) { badge.style.transform = 'scale(1.4)'; setTimeout(() => badge.style.transform = '', 200) }
    }

    // ── RENDER CATALOG ──
    function renderCatalog() {
      const list = document.getElementById('catList')
      let items = catalog
      if (searchQ) {
        const q = searchQ.toLowerCase()
        items = items.filter(i => (i.itemName || '').toLowerCase().includes(q) || (i.sourceCode || '').toLowerCase().includes(q))
      }
      if (activeGroup !== 'all') {
        items = items.filter(i => uiGroupKey(i) === activeGroup)
      }
      if (!items.length) {
        list.innerHTML = `<div class="cat-empty">${searchQ ? 'Nic nebylo nalezeno pro „' + esc(searchQ) + '"' : 'Katalog je prázdný.'}</div>`
        return
      }
      // Group items
      const groups = new Map()
      for (const item of items) {
        const key = uiGroupKey(item)
        if (!groups.has(key)) groups.set(key, [])
        groups.get(key).push(item)
      }
      const orderedKeys = NAV_ORDER.filter(k => groups.has(k)).concat([...groups.keys()].filter(k => !NAV_ORDER.includes(k)))
      const showGroupHead = activeGroup === 'all' && !searchQ

      list.innerHTML = orderedKeys.map(key => {
        const grpItems = groups.get(key) || []
        return (showGroupHead ? `<div class="cat-group-head"><span class="cat-group-name">${esc(NAV_LABELS[key] || key)}</span><span class="cat-group-count">${grpItems.length} položek</span></div>` : '') +
          grpItems.map(item => {
            const line = catalogLine(item)
            const qty = Number(line?.quantity || 0)
            const price = effectivePrice(item)
            return `<div class="cat-item${qty > 0 ? ' in-cart' : ''}" data-id="${item.id}">
              <div>
                <div class="cat-item-name">${esc(item.itemName)}</div>
                ${item.sourceCode ? `<div class="cat-item-code">${esc(item.sourceCode)}</div>` : ''}
              </div>
              <div class="cat-item-price">
                <div class="cat-item-price-main">${price} Kč</div>
                <div class="cat-item-price-sub">/ ${esc(item.unit || 'ks')}</div>
              </div>
              <div class="cat-item-ctrl">
                <button class="q-btn q-minus" data-minus="${item.id}">−</button>
                <span class="q-val${qty > 0 ? ' has' : ''}">${qty || ''}</span>
                <button class="q-btn q-plus" data-plus="${item.id}">+</button>
              </div>
            </div>`
          }).join('')
      }).join('')

      list.querySelectorAll('[data-plus]').forEach(btn => {
        btn.addEventListener('click', e => { e.stopPropagation(); const item = catalog.find(x => Number(x.id) === Number(btn.getAttribute('data-plus'))); if (item) addItem(item, 1) })
      })
      list.querySelectorAll('[data-minus]').forEach(btn => {
        btn.addEventListener('click', e => { e.stopPropagation(); const item = catalog.find(x => Number(x.id) === Number(btn.getAttribute('data-minus'))); if (item) addItem(item, -1) })
      })
    }

    // ── RENDER CART ──
    function renderCart() {
      const body = document.getElementById('cartBody')
      const lines = normalizeLines(estimate?.lines || [])
      estimate.lines = lines
      const mainLines = lines.filter(l => l.sectionType !== 'ostatni_naklady')
      const ostatniLines = lines.filter(l => l.sectionType === 'ostatni_naklady')

      document.getElementById('cartCount').textContent = `${lines.length} položek`
      document.getElementById('cartCountBadge').textContent = lines.length
      document.getElementById('cartCountBadge').style.background = lines.length > 0 ? 'var(--green)' : 'var(--ink3)'

      if (!mainLines.length && !ostatniLines.length) {
        body.innerHTML = '<div class="cart-empty">Vyberte položky z katalogu vlevo.</div>'
      } else {
        const groups = groupedEstimate(mainLines)
        const ORDER = ['elektro', 'stavba']
        const allCats = [...ORDER.filter(k => groups.has(k)), ...[...groups.keys()].filter(k => !ORDER.includes(k))]
        const CAT_LABELS = { elektro:'⚡ Elektro', stavba:'🧱 Stavba' }

        let html = allCats.map(cat => {
          const rows = groups.get(cat) || []
          const subTotal = rows.reduce((s, l) => s + l.lineTotal, 0)
          return `<div class="cart-cat-head">${esc(CAT_LABELS[cat] || cat)}</div>` +
            rows.map(line => {
              const hasMat = !!(line.materialDescription && line.materialDescription.trim())
              const matRow = hasMat
                ? `<div class="cart-mat-row">
                    <span class="mat-badge">
                      <span class="mat-badge-icon">📦</span>
                      <span class="mat-badge-text">${esc(line.materialDescription)}</span>
                      <span class="mat-badge-price">&nbsp;·&nbsp;${line.materialUnitPrice} Kč/${esc(line.unit||'ks')}</span>
                    </span>
                    <button class="mat-change-btn" title="Změnit materiál" data-mat-open="${line.positionOrder}">✏️</button>
                    <button class="mat-clear-btn" title="Odstranit materiál" data-mat-clear="${line.positionOrder}">✕</button>
                  </div>`
                : `<div class="cart-mat-row">
                    <button class="mat-add-btn" data-mat-open="${line.positionOrder}">+ Přidat materiál k položce</button>
                  </div>`
              return `<div class="cart-line">
                <div class="cart-line-name">${esc(line.workDescription || line.itemName || '—')}</div>
                <div class="cart-line-price">
                  <div class="cart-line-total">${fmtMoney(line.lineTotal)}</div>
                  <div class="cart-line-unit">${line.quantity} × ${line.laborUnitPrice} Kč</div>
                </div>
                <div class="cart-line-qty">
                  <button class="cq-btn cq-m" data-cart-minus="${line.positionOrder}">−</button>
                  <input class="cq-val" type="number" min="0" step="1" value="${line.quantity}" data-qty-pos="${line.positionOrder}" />
                  <button class="cq-btn cq-p" data-cart-plus="${line.positionOrder}">+</button>
                </div>
              </div>${matRow}`
            }).join('') +
            `<div class="cart-subrow"><span>Celkem ${CAT_LABELS[cat] || cat}</span><strong>${fmtMoney(subTotal)}</strong></div>`
        }).join('')

        // Ostatní section
        if (ostatniLines.length) {
          const ostTotal = ostatniLines.reduce((s,l)=>s+l.lineTotal,0)
          html += `<div class="ostatni-section">
            <div class="cart-cat-head">📋 Ostatní náklady</div>
            ${ostatniLines.map(line => `<div class="cart-line">
              <div class="cart-line-name">${esc(line.workDescription||'')}</div>
              <div class="cart-line-price"><div class="cart-line-total">${fmtMoney(line.lineTotal)}</div></div>
              <button class="cart-del" data-del-pos="${line.positionOrder}">✕</button>
            </div>`).join('')}
            <div class="cart-subrow"><span>Celkem ostatní</span><strong>${fmtMoney(ostTotal)}</strong></div>
          </div>`
        }
        body.innerHTML = html

        // Wire events
        body.querySelectorAll('[data-cart-minus]').forEach(btn => {
          btn.addEventListener('click', () => {
            const pos = Number(btn.getAttribute('data-cart-minus'))
            const line = estimate.lines.find(x => x.positionOrder === pos)
            if (line) { line.quantity = Math.max(0, line.quantity - 1); if (line.quantity <= 0) estimate.lines = estimate.lines.filter(x => x.positionOrder !== pos) }
            estimate.lines = normalizeLines(estimate.lines); renderAll()
          })
        })
        body.querySelectorAll('[data-cart-plus]').forEach(btn => {
          btn.addEventListener('click', () => {
            const pos = Number(btn.getAttribute('data-cart-plus'))
            const line = estimate.lines.find(x => x.positionOrder === pos)
            if (line) line.quantity = Number(line.quantity || 0) + 1
            estimate.lines = normalizeLines(estimate.lines); renderAll()
          })
        })
        body.querySelectorAll('[data-qty-pos]').forEach(input => {
          input.addEventListener('change', () => {
            const pos = Number(input.getAttribute('data-qty-pos'))
            const line = estimate.lines.find(x => x.positionOrder === pos)
            if (line) { line.quantity = Math.max(0, Number(input.value || 0)); if (line.quantity <= 0) estimate.lines = estimate.lines.filter(x => x.positionOrder !== pos) }
            estimate.lines = normalizeLines(estimate.lines); renderAll()
          })
        })
        body.querySelectorAll('[data-mat-open]').forEach(btn => {
          btn.addEventListener('click', () => openMatModal(Number(btn.getAttribute('data-mat-open'))))
        })
        body.querySelectorAll('[data-mat-clear]').forEach(btn => {
          btn.addEventListener('click', () => {
            const pos = Number(btn.getAttribute('data-mat-clear'))
            const line = estimate.lines.find(x => x.positionOrder === pos)
            if (line) { line.materialDescription = ''; line.materialUnitPrice = 0 }
            estimate.lines = normalizeLines(estimate.lines); renderAll(); saveEstimate()
          })
        })
        body.querySelectorAll('[data-del-pos]').forEach(btn => {
          btn.addEventListener('click', () => {
            const pos = Number(btn.getAttribute('data-del-pos'))
            estimate.lines = estimate.lines.filter(x => x.positionOrder !== pos)
            estimate.lines = normalizeLines(estimate.lines); renderAll()
          })
        })
      }

      // Totals
      const t = totals(estimate?.lines || [])
      document.getElementById('cartTotals').innerHTML = `
        <div class="tot-row sub"><span>⚡ Práce</span><strong>${fmtMoney(t.labor)}</strong></div>
        <div class="tot-row sub"><span>📦 Materiál</span><strong>${fmtMoney(t.material)}</strong></div>
        ${t.ostatni > 0 ? `<div class="tot-row sub"><span>📋 Ostatní</span><strong>${fmtMoney(t.ostatni)}</strong></div>` : ''}
        <div class="tot-row sub"><span style="display:flex;align-items:center;gap:5px">DPH <input id="dphInput" type="number" class="dph-input" min="0" max="99" value="${t.vr}" /> %</span><strong>${fmtMoney(t.dph)}</strong></div>
        <div class="tot-row final-row"><span>Celkem s DPH</span><strong>${fmtMoney(t.total)}</strong></div>`

      document.getElementById('dphInput')?.addEventListener('input', e => {
        if (estimate) { estimate.vatRate = Number(e.target.value || 21); renderCart() }
      })
    }

    // ── RENDER ALL ──
    function renderAll() { renderCatalog(); renderCart(); updateCtxHeader() }

    function updateCtxHeader() {
      const name = estimate?.clientNameSnapshot || lead?.fullName || lead?.name || '—'
      const jobNum = job?.internalNumber || estimate?.jobNumberSnapshot || '—'
      document.getElementById('ctxTitle').textContent = `Клієнт: ${name}`
      document.getElementById('ctxSub').textContent = `Кошторис · заказка ${jobNum} · ${(estimate?.lines||[]).length} позицій`
    }

    // ── PREVIEW ──
    function renderPreview() {
      const overlay = document.getElementById('previewOverlay')
      overlay.classList.add('show')
      const pvLines = normalizeLines(estimate?.lines || [])
      const mainLines = pvLines.filter(l => l.sectionType !== 'ostatni_naklady')
      const ostatniLines = pvLines.filter(l => l.sectionType === 'ostatni_naklady')
      const pvGroups = groupedEstimate(mainLines)
      const vr = Number(estimate?.vatRate || 21)

      const catBg = { elektro:'#A9D08E', stavba:'#F4B183' }
      const catFg = { elektro:'#1A3A12', stavba:'#5A210C' }
      const catCode = { elektro:'ele', stavba:'stv' }
      const catName = { elektro:'Elektrikářské práce', stavba:'Stavební práce' }
      const catCelkem = { elektro:'Elektrikářské práce celkem', stavba:'Stavební práce celkem' }
      const ordered = ['elektro','stavba'].filter(k => pvGroups.has(k)).concat([...pvGroups.keys()].filter(k => !['elektro','stavba'].includes(k)))

      let tableRows = ''
      let rowNum = 1, globalLabor = 0, globalMat = 0

      for (const cat of ordered) {
        const rows = pvGroups.get(cat) || []
        if (!rows.length) continue
        const bg = catBg[cat] || '#D9E2F3', fg = catFg[cat] || '#21324B'
        const code = catCode[cat] || cat.slice(0,3)
        tableRows += `<tr><td colspan="11" style="background:${bg};color:${fg};font-weight:800;padding:8px 10px;font-size:12px;letter-spacing:.3px">${esc(catName[cat] || rows[0]?.groupLabel || cat)}</td></tr>`
        let catL = 0, catM = 0
        for (const line of rows) {
          const lU = Number(line.laborUnitPrice || 0), mU = Number(line.materialUnitPrice || 0)
          const lT = Number(line.laborTotal || 0), mT = Number(line.materialTotal || 0)
          const lineT = Number(line.lineTotal || 0)
          catL += lT; catM += mT
          const noMat = !line.materialDescription
          tableRows += `<tr>
            <td style="background:${bg};color:${fg};font-weight:700;text-align:center;font-size:11px;width:36px">${esc(code)}</td>
            <td style="text-align:center;font-weight:600;font-size:11px;width:40px">${rowNum++}</td>
            <td style="background:#D9E1F2;padding:5px 7px;min-width:200px;font-size:11px"><span class="pdf-editable" contenteditable="true" data-field="workDescription" data-lid="${esc(String(line.id||''))}">${esc(line.workDescription||'')}</span></td>
            <td style="background:${noMat?'#FECACA':'#C6E0B4'};padding:5px 7px;min-width:140px;font-size:11px;${noMat?'color:#991B1B;font-style:italic':''}">${noMat?`<span class="pdf-editable" contenteditable="true" data-field="materialDescription" data-lid="${esc(String(line.id||''))}">(položka neobsahuje materiál)</span>`:`<span class="pdf-editable" contenteditable="true" data-field="materialDescription" data-lid="${esc(String(line.id||''))}">${esc(line.materialDescription)}</span>`}</td>
            <td style="text-align:center;white-space:nowrap;font-size:11px">${line.quantity} ${esc(line.unit||'ks')}</td>
            <td style="text-align:right;background:#BDD7EE;font-size:11px">${fmtMoney(lU)}</td>
            <td style="text-align:right;background:#BDD7EE;font-weight:600;font-size:11px">${fmtMoney(lT)}</td>
            <td style="text-align:right;background:#F8CBAD;font-size:11px">${mU>0?fmtMoney(mU):''}</td>
            <td style="text-align:right;background:#F8CBAD;font-weight:600;font-size:11px">${mT>0?fmtMoney(mT):''}</td>
            <td style="text-align:right;background:#D9D9D9;font-size:11px">${fmtMoney(lU+mU)}</td>
            <td style="text-align:right;background:#D9D9D9;font-weight:700;font-size:11px">${fmtMoney(lineT)}</td>
          </tr>`

    // ── API: loadContext, ensureEstimate, loadCatalog, saveEstimate, buildDocs ──
    async function loadContext() {
      if (jobId > 0) {
        const jr = await apiFetch(apiUrl(`/api/crm/jobs/${jobId}`))
        const jd = await jParse(jr)
        if (!jr.ok || !jd?.ok) throw new Error('Не вдалося завантажити закаску')
        job = jd.job
        if (job?.leadId) {
          const lr = await apiFetch(apiUrl(`/api/leads/${job.leadId}`))
          const ld = await jParse(lr)
          if (lr.ok && ld?.ok) lead = ld.lead
        }
        document.getElementById('backLink').href = `./job-detail.html?jobId=${encodeURIComponent(String(job.id))}`
        return
      }
      if (leadId > 0) {
        const lr = await apiFetch(apiUrl(`/api/leads/${leadId}`))
        const ld = await jParse(lr)
        if (!lr.ok || !ld?.ok) throw new Error('Не вдалося завантажити клієнта')
        lead = ld.lead
        const jr = await apiFetch(apiUrl(`/api/crm/jobs?leadId=${encodeURIComponent(String(lead.id))}`))
        const jd = await jParse(jr)
        if (jr.ok && jd?.ok && jd.jobs?.length) job = jd.jobs[0]
        document.getElementById('backLink').href = job ? `./job-detail.html?jobId=${encodeURIComponent(String(job.id))}` : './index.html'
        return
      }
      throw new Error('Відкрийте редактор з картки закаски')
    }

    async function ensureEstimate() {
      if (estimateIdFromUrl) {
        const r = await apiFetch(apiUrl(`/api/crm/estimates/${estimateIdFromUrl}`))
        const d = await jParse(r)
        if (r.ok && d?.ok) { estimate = d.estimate; return }
      }
      if (job?.id) {
        const ex = await apiFetch(apiUrl(`/api/crm/estimates?jobId=${encodeURIComponent(String(job.id))}`))
        const dx = await jParse(ex)
        if (ex.ok && dx?.ok && dx.estimates?.length) { estimate = dx.estimates[0]; return }
        const cr = await apiFetch(apiUrl('/api/crm/estimates/from-job'), { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ jobId: job.id }) })
        const cd = await jParse(cr)
        if (!cr.ok || !cd?.ok) throw new Error(cd?.error || 'Не вдалося створити кошторис')
        estimate = cd.estimate; return
      }
      if (lead?.id) {
        const ex = await apiFetch(apiUrl(`/api/crm/estimates?leadId=${encodeURIComponent(String(lead.id))}`))
        const dx = await jParse(ex)
        if (ex.ok && dx?.ok && dx.estimates?.length) { estimate = dx.estimates[0]; return }
        const cr = await apiFetch(apiUrl('/api/crm/estimates/from-lead'), { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ leadId: lead.id }) })
        const cd = await jParse(cr)
        if (!cr.ok || !cd?.ok) throw new Error(cd?.error || 'Не вдалося створити кошторис')
        estimate = cd.estimate; return
      }
      throw new Error('Немає контексту для кошторису')
    }

    async function loadCatalog() {
      const p = new URLSearchParams({ tradeType: 'electro', itemKind: 'work' })
      if (searchQ) p.set('search', searchQ)
      const r = await apiFetch(apiUrl(`/api/crm/catalog/items?${p.toString()}`))
      const d = await jParse(r)
      catalog = (r.ok && d?.ok) ? (d.items || []) : []
      renderCatalog()
    }

    async function saveEstimate() {
      if (!estimate) return
      estimate.lines = normalizeLines(estimate.lines || [])
      const payload = {
        title: estimate.title || `Rozpočet ze dne ${new Date().toLocaleDateString('cs-CZ')}`,
        tradeType: 'electro',
        note: estimate.note || '',
        estimateDate: estimate.estimateDate || new Date().toISOString().slice(0,10),
        jobNumberSnapshot: estimate.jobNumberSnapshot || job?.internalNumber || null,
        clientNumberSnapshot: estimate.clientNumberSnapshot || lead?.clientNumber || null,
        clientNameSnapshot: estimate.clientNameSnapshot || lead?.fullName || lead?.name || null,
        companyNameSnapshot: estimate.companyNameSnapshot || null,
        customerAddressSnapshot: estimate.customerAddressSnapshot || null,
        customerIcoSnapshot: estimate.customerIcoSnapshot || null,
        versionNo: estimate.versionNo || 1,
        projectManagerSnapshot: estimate.projectManagerSnapshot || job?.responsiblePerson || null,
        vatRate: estimate.vatRate || 21,
        lines: estimate.lines,
      }
      const r = await apiFetch(apiUrl(`/api/crm/estimates/${estimate.id}`), { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) })
      const d = await jParse(r)
      if (!r.ok || !d?.ok) { alert(d?.error || 'Помилка збереження'); return }
      estimate = d.estimate
      estimate.lines = normalizeLines(estimate.lines || [])
      renderAll()
      alert('✓ Кошторис збережено')
    }

    async function buildEstimateDocs() {
      if (!estimate?.id) return
      document.getElementById('btnGenerate').disabled = true
      document.getElementById('btnGenerate').textContent = '...'
      try {
        await saveEstimate()
        const r = await apiFetch(apiUrl(`/api/crm/estimates/${estimate.id}/build-documents`), { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({}) })
        const d = await jParse(r)
        if (!r.ok || !d?.ok) { alert(d?.error || 'Помилка генерації'); return }
        const xlsxUrl = apiUrl(`/api/crm/estimates/${estimate.id}/file/xlsx`)
        const pdfUrl = apiUrl(`/api/crm/estimates/${estimate.id}/file/pdf`)
        document.getElementById('xlsxLink').href = xlsxUrl; document.getElementById('xlsxLink').style.display = 'inline'
        document.getElementById('pdfLink').href = pdfUrl; document.getElementById('pdfLink').style.display = 'inline'
        document.getElementById('sendPopover').style.display = 'block'
        const emailEl = document.getElementById('sendEmail'); if (emailEl && !emailEl.value) emailEl.value = lead?.email || ''
        alert(d?.pdf?.ok ? '✓ Excel і PDF згенеровано' : '✓ Excel згенеровано (PDF не вдалось)')
      } finally {
        document.getElementById('btnGenerate').disabled = false
        document.getElementById('btnGenerate').textContent = '⚡ Excel / PDF'
      }
    }

    async function sendEstimate() {
      const email = (document.getElementById('sendEmail').value || '').trim() || lead?.email || ''
      if (!email) { alert('Вкажіть email клієнта'); return }
      document.getElementById('sendDoIt').disabled = true; document.getElementById('sendDoIt').textContent = '...'
      try {
        await saveEstimate()
        const r1 = await apiFetch(apiUrl(`/api/crm/estimates/${estimate.id}/build-documents`), { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({}) })
        const d1 = await jParse(r1)
        if (!r1.ok || !d1?.ok) throw new Error(d1?.error || 'Помилка PDF')
        const r2 = await apiFetch(apiUrl(`/api/crm/estimates/${estimate.id}/send-to-client`), {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ email, subject:`Rozpočet ${estimate.estimateNo||''}`, text:`Dobrý den,\nv příloze zasíláme rozpočet k zakázce ${job?.internalNumber||'—'}.\n\nS pozdravem,\nO&L Master Dom` })
        })
        const d2 = await jParse(r2)
        if (r2.ok && d2?.ok) { alert(`✓ PDF відправлено на ${email}`); document.getElementById('sendPopover').style.display='none' }
        else throw new Error(d2?.error || 'Помилка відправки')
      } catch(e) { alert(String(e?.message||e)) }
      finally { document.getElementById('sendDoIt').disabled=false; document.getElementById('sendDoIt').textContent='Відправити PDF →' }
    }

    // ── EVENTS ──
    document.getElementById('cartToggle').addEventListener('click', toggleCart)
    document.getElementById('drawerClose').addEventListener('click', closeCart)
    document.getElementById('drawerBackdrop').addEventListener('click', closeCart)
    document.getElementById('cartSaveBtn').addEventListener('click', saveEstimate)
    document.getElementById('btnSave').addEventListener('click', saveEstimate)

    document.getElementById('btnPreview').addEventListener('click', renderPreview)
    document.getElementById('cartPreviewBtn').addEventListener('click', () => { closeCart(); renderPreview() })
    document.getElementById('pvGenerate').addEventListener('click', buildEstimateDocs)
    document.getElementById('pvSend').addEventListener('click', () => { document.getElementById('sendPopover').style.display='block'; const e=document.getElementById('sendEmail'); if(e&&!e.value) e.value=lead?.email||'' })
    document.getElementById('closePreview').addEventListener('click', () => {
      document.getElementById('previewOverlay').classList.remove('show')
      renderAll()
    })
    document.getElementById('sendDoIt').addEventListener('click', sendEstimate)
    document.getElementById('sendCancel').addEventListener('click', () => { document.getElementById('sendPopover').style.display='none' })
    document.addEventListener('click', e => { if (!e.target.closest('#sendPopover') && !e.target.closest('#pvSend') && !e.target.closest('#btnGenerate')) document.getElementById('sendPopover').style.display='none' })

    // Search
    let searchTimer
    document.getElementById('searchInput').addEventListener('input', e => {
      clearTimeout(searchTimer)
      searchTimer = setTimeout(() => {
        searchQ = e.target.value.trim()
        if (searchQ) {
          // If searching, show all groups
          document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'))
          document.querySelector('[data-group="all"]').classList.add('active')

    })

    document.getElementById('catFilters').addEventListener('click', e => {
      const chip = e.target.closest('[data-group]')

      activeGroup = chip.getAttribute('data-group')

      renderCatalog()

    // Ostatní quick-add
    document.getElementById('btnAddOstatni').addEventListener('click', () => {
      const desc = prompt('Пізіція (опис витрати):')
      if (!desc) return
      const amtStr = prompt('Сума (Kč):', '0')
      const amt = Number(amtStr || 0)
      estimate.lines.push({
        sectionType: 'ostatni_naklady', category: 'ostatni_naklady',
        workDescription: desc, materialDescription: '',
        unit: 'pau', quantity: 1, laborUnitPrice: amt, materialUnitPrice: 0,
      })
      estimate.lines = normalizeLines(estimate.lines)
      renderAll()
    })

    // User display
    ;(function(){
      try {
        const u = JSON.parse(localStorage.getItem('crmUser') || '{}')
        const roleMap = { owner:'Vlastník', manager:'Manažer', pm:'Proj.manažer', viewer:'Zobrazení' }
        document.getElementById('userName').textContent = u.name || u.email || '—'
        document.getElementById('userRole').textContent = roleMap[u.role] || u.role || '—'
        const initials = (u.name||u.email||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()
        document.getElementById('userAvatar').textContent = initials
      } catch {}
    })()

      location.replace('./login.html')
    })

    // ── MATERIAL MODAL ──
    let materialCache = null
    let matModalPos = null
    let matSelected = null

    function closeMatModal() {
      document.getElementById('matModal').style.display = 'none'
      matModalPos = null
      matSelected = null
    }

    function renderMatResults(q) {
      const items = (materialCache || []).filter(it => {
        if (!q) return true
        const ql = q.toLowerCase()
        return (it.itemName||'').toLowerCase().includes(ql) || (it.sourceCode||'').toLowerCase().includes(ql)
      })
      const el = document.getElementById('matResults')
      if (!items.length) {
        el.innerHTML = materialCache === null
          ? '<div class="mat-modal-empty">Завантаження...</div>'
          : `<div class="mat-modal-empty">${q ? `Nic nenalezeno pro „<b>${esc(q)}</b>"` : 'Katalog materiálů je prázdný.<br>Nahrajte ceník přes <a href="./catalog-import.html" target="_blank" style="color:var(--blue3)">Správu katalogu</a>.'}</div>`
        return
      }
      el.innerHTML = items.slice(0, 80).map(it => `
        <div class="mat-item${matSelected?.id === it.id ? ' selected':''}" data-mat-pick="${it.id}">
          <div>
            <div class="mat-item-name">${esc(it.itemName)}</div>
            ${it.sourceCode ? `<div class="mat-item-code">${esc(it.sourceCode)}</div>` : ''}
          </div>
          <div>
            <div class="mat-item-price">${fmtMoney(Number(it.basePrice||0))}</div>
            <div class="mat-item-unit">/ ${esc(it.unit||'ks')}</div>
          </div>
        </div>`).join('')
      el.querySelectorAll('[data-mat-pick]').forEach(el2 => {
        el2.addEventListener('click', () => {
          const id = Number(el2.getAttribute('data-mat-pick'))
          matSelected = (materialCache||[]).find(x => x.id === id) || null
          document.getElementById('matConfirmBtn').disabled = !matSelected
          renderMatResults(document.getElementById('matSearchInput').value.trim())
        })
      })
    }

    async function openMatModal(pos) {
      matModalPos = pos
      matSelected = null
      document.getElementById('matModal').style.display = ''
      document.getElementById('matConfirmBtn').disabled = true
      document.getElementById('matSearchInput').value = ''
      const line = estimate?.lines?.find(x => x.positionOrder === pos)
      document.getElementById('matModalForLine').textContent = line ? (line.workDescription || line.itemName || '') : ''
      renderMatResults('')
      if (!materialCache) {
        try {
          const r = await apiFetch(apiUrl('/api/crm/catalog/items?itemKind=material&limit=500'))
          const d = await jParse(r)
          materialCache = (r.ok && d?.ok) ? (d.items || []) : []
        } catch { materialCache = [] }
      }
      renderMatResults('')
      document.getElementById('matSearchInput').focus()
    }

    document.getElementById('matModalBg').addEventListener('click', e => {
      if (e.target === document.getElementById('matModalBg')) closeMatModal()
    })
    document.getElementById('matModalClose').addEventListener('click', closeMatModal)
    document.getElementById('matSkipBtn').addEventListener('click', () => {
      if (matModalPos != null) {
        const line = estimate?.lines?.find(x => x.positionOrder === matModalPos)
        if (line) { line.materialDescription = ''; line.materialUnitPrice = 0 }
        renderAll(); saveEstimate()
      }
      closeMatModal()
    })
    document.getElementById('matConfirmBtn').addEventListener('click', () => {
      if (matModalPos != null && matSelected) {
        const line = estimate?.lines?.find(x => x.positionOrder === matModalPos)
        if (line) {
          line.materialDescription = matSelected.itemName
          line.materialUnitPrice = Number(matSelected.basePrice || 0)
        }
        renderAll(); saveEstimate()
      }
      closeMatModal()
    })
    document.getElementById('matSearchInput').addEventListener('input', e => {
      renderMatResults(e.target.value.trim())
    })

    // ── INIT ──
    ;(async () => {

        renderAll()
        await loadCatalog()
      } catch (e) {
        document.getElementById('ctxSub').textContent = 'Помилка: ' + String(e?.message || e)
        document.getElementById('catList').innerHTML = `<div class="cat-empty">Помилка завантаження.<br>${esc(String(e?.message||e))}<br><br><a class="btn primary" href="./index.html" style="margin:0 auto">← Повернутись</a></div>`
      }
    })()
