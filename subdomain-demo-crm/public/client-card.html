<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>O&L Master Dom · Karta klienta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg:#05101E; --bg2:#081526; --surface:#0C1B31; --card:#101F3A; --card2:#142548;
        --line:#1A3258; --line2:#254A80;
        --txt:#E8F1FF; --muted:#6E92BC; --muted2:#47648C;
        --blue:#4490EE; --cyan:#46C8DE; --green:#30CC8E; --orange:#EE8C3A; --red:#E85858;
        --r:14px; --r2:10px; --shadow:0 8px 40px rgba(0,4,20,.55);
      }
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;
        background-image:radial-gradient(ellipse 1400px 600px at -5% -15%,rgba(20,50,130,.22) 0%,transparent 58%)}
      .wrap{max-width:1440px;margin:0 auto;padding:36px 28px 72px}
      .top{display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:36px;
        padding-bottom:26px;border-bottom:1px solid var(--line)}
      .page-logo{display:flex;align-items:center;gap:14px}
      .page-logo-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(145deg,#1C4090,#112C68);
        border:1px solid rgba(68,144,238,.3);display:flex;align-items:center;justify-content:center;
        box-shadow:0 4px 18px rgba(28,64,144,.35);flex-shrink:0}
      .title{font-size:28px;font-weight:700;letter-spacing:-.4px}
      .sub{color:var(--muted);font-size:13px;margin-top:4px}
      .actions{display:flex;gap:10px;flex-wrap:wrap}
      .btn{border:1px solid var(--line2);background:var(--card);color:var(--txt);padding:11px 18px;
        border-radius:var(--r2);font-weight:600;cursor:pointer;text-decoration:none;
        display:inline-flex;align-items:center;gap:8px;font-family:inherit;font-size:14px;transition:all .18s}
      .btn:hover{background:var(--card2);border-color:var(--line2)}
      .btn.primary{background:linear-gradient(135deg,#2558BC,#3670D8);color:#fff;border:none;
        box-shadow:0 4px 20px rgba(37,88,188,.4)}
      .btn.primary:hover{background:linear-gradient(135deg,#2C64CC,#3E7CEE);box-shadow:0 6px 26px rgba(37,88,188,.52)}
      .grid{display:grid;grid-template-columns:1.4fr .9fr;gap:20px}
      .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
        padding:24px;box-shadow:var(--shadow)}
      .kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
      .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;
        transition:border-color .18s}
      .stat:hover{border-color:var(--line2)}
      .stat .k{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
      .stat .v{font-size:24px;font-weight:700;letter-spacing:-.5px}
      .section-title{font-size:17px;font-weight:700;margin-bottom:16px;letter-spacing:-.2px}
      .meta-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
      .meta{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:14px}
      .meta b{display:block;color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
      .meta div{font-size:14px;line-height:1.4}
      .timeline{display:grid;gap:14px}
      .timeline-item{display:grid;grid-template-columns:20px 1fr;gap:12px;align-items:start}
      .dot{width:12px;height:12px;border-radius:999px;background:var(--blue);margin-top:5px;
        box-shadow:0 0 0 4px rgba(68,144,238,.14)}
      .timeline-item .t{font-weight:700;font-size:14px}
      .timeline-item .d{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4}
      .brief{display:grid;gap:10px}
      .brief-row{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:14px}
      .brief-row b{display:block;color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
      .brief-row div{font-size:14px;line-height:1.5}
      .estimate-list{display:grid;gap:12px}
      .estimate{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;transition:border-color .18s}
      .estimate:hover{border-color:var(--line2)}
      .estimate .sub{margin-top:6px;color:var(--muted);font-size:13px}
      .empty{padding:24px;border:1px dashed var(--line);border-radius:var(--r);color:var(--muted);font-size:14px}
      @media(max-width:1060px){.grid{grid-template-columns:1fr}.kpi{grid-template-columns:repeat(2,1fr)}}
      @media(max-width:680px){.meta-grid,.kpi{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div class="page-logo">
          <div class="page-logo-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z" stroke="rgba(160,200,255,.9)" stroke-width="1.5"/>
              <path d="M16 3H8a2 2 0 00-2 2v2h12V5a2 2 0 00-2-2z" stroke="rgba(160,200,255,.9)" stroke-width="1.5"/>
            </svg>
          </div>
          <div>
            <div class="title" id="pageTitle">Kartka klienta</div>
            <div class="sub" id="pageSub">Načítání...</div>
          </div>
        </div>
        <div class="actions">
          <a class="btn" href="./index.html">← Zpět do CRM</a>
          <a class="btn primary" id="goEstimate" href="./estimate-builder.html">Přejít do rozpočtu →</a>
        </div>
      </div>

      <div class="kpi" id="kpis"></div>

      <div class="grid" style="margin-top:16px;">
        <div style="display:grid;gap:16px;">
          <section class="card">
            <div class="section-title">Повна інформація про клієнта</div>
            <div class="meta-grid" id="clientMeta"></div>
          </section>
          <section class="card">
            <div class="section-title">Формуляр клієнта</div>
            <div class="brief" id="briefBox"></div>
          </section>
          <section class="card">
            <div class="section-title">Розрахунки та повʼязані записи</div>
            <div class="estimate-list" id="estimateList"></div>
          </section>
        </div>
        <div style="display:grid;gap:16px;">
          <section class="card">
            <div class="section-title">Шлях клієнта</div>
            <div class="timeline" id="timeline"></div>
          </section>
        </div>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(location.search)
      const leadId = Number(params.get('leadId') || 0)
      const pathModeBase = location.pathname.startsWith('/demo-crm') ? '/demo-crm' : ''
      const apiUrl = (p) => `${pathModeBase}${p}`
      const esc = (s) => String(s || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
      const fmt = (iso) => {
        try { return new Date(iso).toLocaleString('uk-UA', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }) } catch { return String(iso || '—') }
      }
      async function json(resp) { try { return await resp.json() } catch { return null } }
      function renderMeta(lead) {
        const items = [
          ['Клієнт', lead.fullName || lead.name || '—'],
          ['Номер клієнта', lead.clientNumber || '—'],
          ['Статус', lead.status || '—'],
          ['Хвиля', String(lead.wave || 1)],
          ['Телефон', lead.phone || '—'],
          ['Email', lead.email || '—'],
          ['Послуга', lead.serviceType || '—'],
          ['Коментар', lead.comment || '—'],
          ['IČO', lead.brief?.companyIco || '—'],
          ['Компанія', lead.brief?.companyRegistry?.name || '—'],
          ['Адреса', [lead.brief?.companyRegistry?.address, lead.brief?.companyRegistry?.city, lead.brief?.companyRegistry?.zip].filter(Boolean).join(', ') || lead.brief?.realizationAddress || '—'],
          ['Отримання формуляра', lead.briefReceivedAt ? fmt(lead.briefReceivedAt) : '—'],
        ]
        document.getElementById('clientMeta').innerHTML = items.map(([k,v]) => `<div class="meta"><b>${esc(k)}</b><div>${esc(v)}</div></div>`).join('')
      }
      function renderBrief(lead) {
        const brief = lead.brief || {}
        const rows = [
          ['Що потрібно', brief.goal || brief.workType || '—'],
          ['Тип обʼєкта', brief.objectType || '—'],
          ['Площа / обсяг', brief.area || '—'],
          ['Термін', brief.timeline || brief.requestedTerm || '—'],
          ['Бюджет', brief.budget || '—'],
          ['Додаткові деталі', brief.summaryText || brief.details || brief.note || '—'],
        ]
        document.getElementById('briefBox').innerHTML = rows.map(([k,v]) => `<div class="brief-row"><b>${esc(k)}</b><div>${esc(v)}</div></div>`).join('')
      }
      function renderTimeline(items) {
        document.getElementById('timeline').innerHTML = items.length
          ? items.map((x) => `<div class="timeline-item"><div class="dot"></div><div><div class="t">${esc(x.title)}</div><div class="d">${esc(fmt(x.at))}${x.note ? ` · ${esc(x.note)}` : ''}</div></div></div>`).join('')
          : '<div class="empty">Подій поки немає</div>'
      }
      function renderEstimates(estimates, cases) {
        const rows = []
        for (const est of estimates || []) {
          rows.push(`<div class="estimate"><div><b>Розрахунок</b> ${esc(est.estimateNo || '')}</div><div class="sub">Статус: ${esc(est.status || 'draft')} · Сума: ${esc(String(est.totalWithVat || 0))} CZK</div><div style="margin-top:8px;"><a class="btn primary" href="./estimate-builder.html?leadId=${encodeURIComponent(String(est.leadId || leadId))}&estimateId=${encodeURIComponent(String(est.id))}">Відкрити розрахунок</a></div></div>`)
        }
        for (const c of cases || []) {
          rows.push(`<div class="estimate"><div><b>Комерційний випадок</b> ${esc(c.internal_order_id || c.internalOrderId || '')}</div><div class="sub">Статус: ${esc(c.status || '—')} · Етап: ${esc(c.stage || '—')}</div></div>`)
        }
        document.getElementById('estimateList').innerHTML = rows.length ? rows.join('') : '<div class="empty">Розрахунок ще не створено. Переходьте в базу розрахунку.</div>'
      }
      function renderKpis(lead, timeline, estimates) {
        const data = [
          ['Хвиля', String(lead.wave || 1)],
          ['Подій', String((timeline || []).length)],
          ['Розрахунків', String((estimates || []).length)],
          ['Номер клієнта', lead.clientNumber || '—'],
        ]
        document.getElementById('kpis').innerHTML = data.map(([k,v]) => `<div class="stat"><div class="k">${esc(k)}</div><div class="v">${esc(v)}</div></div>`).join('')
      }
      async function load() {
        if (!leadId) {
          document.getElementById('pageSub').textContent = 'Не передано leadId'
          return
        }
        const r = await fetch(apiUrl(`/api/crm/client-workspace/${leadId}`))
        const d = await json(r)
        if (!r.ok || !d?.ok) {
          document.getElementById('pageSub').textContent = 'Помилка завантаження картки'
          return
        }
        const w = d.workspace
        const lead = w.lead
        document.getElementById('pageTitle').textContent = lead.fullName || lead.name || 'Клієнт'
        document.getElementById('pageSub').textContent = `Клієнт № ${lead.clientNumber || '—'} · хвиля ${lead.wave || 1}`
        document.getElementById('goEstimate').href = `./estimate-builder.html?leadId=${encodeURIComponent(String(lead.id))}`
        renderKpis(lead, w.timeline || [], w.estimates || [])
        renderMeta(lead)
        renderBrief(lead)
        renderTimeline(w.timeline || [])
        renderEstimates(w.estimates || [], w.cases || [])
      }
      load()
    </script>
  </body>
  </html>
