<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>O&L Master Dom · Přesměrování zakázky</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root{--bg:#020C18;--s:#071626;--c:#0C1E38;--b:rgba(255,255,255,.08);--ink:#E6F0FF;--ink2:#7AA2C4;--blue:#1A6AE8;--blue2:#3D87F8;--r:12px;--sh:0 8px 32px rgba(0,0,0,.45)}
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:Inter,-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background-image:radial-gradient(ellipse 140% 40% at 50% -5%,rgba(26,106,232,.12) 0%,transparent 55%)}
      .card{width:min(620px,100%);background:var(--s);border:1px solid var(--b);border-radius:18px;box-shadow:var(--sh);padding:28px}
      .logo{display:flex;align-items:center;gap:12px;margin-bottom:18px}
      .mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(145deg,#1A4EA0,#0F3070);display:flex;align-items:center;justify-content:center;flex-shrink:0}
      .name{font-size:16px;font-weight:800;letter-spacing:-.3px}.sub{font-size:11px;color:var(--ink2);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
      .title{font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:8px}
      .text{font-size:14px;color:var(--ink2);line-height:1.6;margin-bottom:16px}
      .btns{display:flex;gap:10px;flex-wrap:wrap}
      .btn{border:1px solid var(--b);background:var(--c);color:var(--ink);padding:10px 16px;border-radius:10px;font-weight:600;font-size:14px;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
      .btn.primary{background:linear-gradient(135deg,#1A6AE8,#2D80F8);border:none;color:#fff}
      .meta{margin-top:16px;font-size:12px;color:var(--ink2)}
      .ok{color:#78cfff}.err{color:#ff8f8f}
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <div class="mark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 3l9 7.5V21a1 1 0 01-1 1H4a1 1 0 01-1-1V10.5z" stroke="rgba(220,235,255,.92)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 22V14h6v8" stroke="rgba(220,235,255,.92)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div><div class="name">O&L Master Dom</div><div class="sub">Enterprise CRM</div></div>
      </div>
      <div class="title" id="title">Hledáme správnou zakázku…</div>
      <div class="text" id="text">Tato stránka slouží jako kompatibilní přesměrování ze starého odkazu na novou detailní kartu zakázky.</div>
      <div class="btns">
        <a class="btn" href="./index.html">← Zpět do CRM</a>
        <a class="btn primary" id="goBtn" href="./index.html">Otevřít pipeline</a>
      </div>
      <div class="meta" id="meta">Kontrola parametrů…</div>
    </div>
    <script>
      const params = new URLSearchParams(location.search)
      const leadId = Number(params.get('leadId') || 0)
      const jobId = Number(params.get('jobId') || 0)
      const base = location.pathname.startsWith('/demo-crm') ? '/demo-crm' : ''
      const api = (p) => `${base}${p}`
      async function json(r){ try { return await r.json() } catch { return null } }
      function setState(title, text, meta, href){
        document.getElementById('title').textContent = title
        document.getElementById('text').textContent = text
        document.getElementById('meta').innerHTML = meta
        if (href) document.getElementById('goBtn').href = href
      }
      async function run(){
        if (Number.isFinite(jobId) && jobId > 0) {
          const href = `./job-detail.html?jobId=${encodeURIComponent(String(jobId))}`
          setState('Přesměrování na detail zakázky', 'Našli jsme konkrétní zakázku. Otevřeme novou detailní kartu.', '<span class="ok">jobId je platný</span>', href)
          location.replace(href)
          return
        }
        if (Number.isFinite(leadId) && leadId > 0) {
          const r = await fetch(api(`/api/crm/jobs?leadId=${encodeURIComponent(String(leadId))}`))
          const d = await json(r)
          const jobs = d?.jobs || []
          if (r.ok && jobs.length) {
            const href = `./job-detail.html?jobId=${encodeURIComponent(String(jobs[0].id))}`
            setState('Zakázka nalezena', 'Starý odkaz s leadId jsme úspěšně spárovali s novou zakázkou.', `<span class="ok">leadId ${leadId} → jobId ${jobs[0].id}</span>`, href)
            location.replace(href)
            return
          }
          setState('Zakázka pro lead nebyla nalezena', 'Lead existuje, ale zatím k němu není navázaná zakázka. Vraťte se do CRM a otevřete zakázku z pipeline.', `<span class="err">leadId ${leadId} bez job vazby</span>`, './index.html')
          return
        }
        setState('Chybí parametr leadId nebo jobId', 'Tento starý odkaz neobsahuje potřebný identifikátor. Otevřete prosím zakázku z hlavní pipeline.', '<span class="err">Neplatný nebo chybějící parametr v URL</span>', './index.html')
      }
      run()
    </script>
  </body>
</html>
