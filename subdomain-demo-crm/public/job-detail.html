<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>O&L Master Dom · Zakázka</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root{--bg:#020C18;--s:#071626;--s2:#091B30;--c:#0C1E38;--c2:#0F2442;--b:rgba(255,255,255,.06);--b2:rgba(255,255,255,.11);--b3:rgba(255,255,255,.18);--ink:#E6F0FF;--ink2:#7AA2C4;--ink3:#3D618A;--blue:#1A6AE8;--blue2:#3D87F8;--blue3:#60A5FF;--green:#14C98A;--orange:#E8921A;--red:#E83A3A;--purple:#7A5EE8;--r:10px;--r-md:14px;--r-lg:18px;--sh:0 8px 32px rgba(0,0,0,.45)}
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
      body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.55;background-image:radial-gradient(ellipse 160% 40% at 50% -4%,rgba(26,106,232,.12) 0%,transparent 55%)}
      .hdr{position:sticky;top:0;z-index:40;background:rgba(2,12,24,.94);border-bottom:1px solid var(--b2);backdrop-filter:blur(16px)}
      .hdr-in{max-width:1600px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:16px}
      .logo{display:flex;align-items:center;gap:10px}
      .logo-m{height:44px;min-width:44px;border-radius:10px;overflow:hidden;border:1px solid rgba(61,135,248,.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 10px rgba(26,106,232,.3);background:#0B1730}
      .logo-m img{height:44px;width:auto;max-width:160px;object-fit:contain;display:block}
      .logo-n{font-size:15px;font-weight:800;letter-spacing:-.3px}.logo-s{font-size:10px;color:var(--ink3);letter-spacing:.4px;text-transform:uppercase;margin-top:2px}
      .hdr-acts{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
      .lang-switch{display:flex;gap:6px;align-items:center;margin-right:4px}
      .lang-btn{border:1px solid var(--b2);background:var(--c);color:var(--ink2);padding:7px 10px;border-radius:999px;font:inherit;font-size:11px;font-weight:800;cursor:pointer}
      .lang-btn.active{background:rgba(26,106,232,.18);color:var(--blue3);border-color:rgba(61,135,248,.35)}
      .btn{border:1px solid var(--b2);border-radius:var(--r);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;padding:9px 16px;transition:all .15s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;background:var(--c);color:var(--ink);text-decoration:none}
      .btn:hover{background:var(--c2)}.btn-p{background:linear-gradient(135deg,#1A6AE8,#2D80F8);color:#fff;border:none;box-shadow:0 3px 14px rgba(26,106,232,.4)}.btn-p:hover{background:linear-gradient(135deg,#2070F0,#3A8CFF)}
      .badge{display:inline-flex;align-items:center;border-radius:999px;padding:3px 9px;font-size:10px;font-weight:700;letter-spacing:.2px;border:1px solid}
      .b-blue{color:#80B8F8;border-color:rgba(80,184,248,.25);background:rgba(80,184,248,.1)}.b-green{color:#50D8A0;border-color:rgba(80,216,160,.25);background:rgba(80,216,160,.1)}.b-orange{color:#F0A850;border-color:rgba(240,168,80,.25);background:rgba(240,168,80,.1)}.b-red{color:#F07070;border-color:rgba(240,112,112,.25);background:rgba(240,112,112,.1)}.b-purple{color:#A080F0;border-color:rgba(160,128,240,.25);background:rgba(160,128,240,.1)}.b-cyan{color:#60D8EC;border-color:rgba(96,216,236,.25);background:rgba(96,216,236,.1)}.b-grey{color:var(--ink2);border-color:var(--b2);background:rgba(255,255,255,.04)}
      .wrap{max-width:1600px;margin:0 auto;padding:24px 24px 60px}
      .job-top{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--b2)}
      .job-num{font-size:12px;color:var(--ink3);margin-bottom:4px;font-weight:600;letter-spacing:.4px}
      .job-title{font-size:24px;font-weight:800;letter-spacing:-.4px;margin-bottom:4px}
      .job-sub{font-size:13px;color:var(--ink2)}
      .job-actions{display:flex;gap:8px;flex-wrap:wrap}
      .ctrl{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px}
      .ctrl-card{background:var(--c);border:1px solid var(--b);border-top:2px solid transparent;border-radius:var(--r-md);padding:14px 16px;transition:all .15s}
      .ctrl-card:hover{border-color:var(--b2)}.ctrl-card .k{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}.ctrl-card .v{font-size:16px;font-weight:700}
      .ctrl-card.blue{border-top-color:var(--blue2)}.ctrl-card.blue .v{color:var(--blue3)}
      .ctrl-card.green{border-top-color:var(--green)}.ctrl-card.green .v{color:var(--green)}
      .ctrl-card.orange{border-top-color:var(--orange)}.ctrl-card.orange .v{color:var(--orange)}
      .ctrl-card.red{border-top-color:var(--red)}.ctrl-card.red .v{color:var(--red)}
      .stage-bar{display:flex;gap:0;margin-bottom:24px;overflow-x:auto}
      .stage-step{flex:1;min-width:0;padding:10px 8px;text-align:center;font-size:11px;font-weight:600;color:var(--ink3);border-bottom:3px solid var(--b);white-space:nowrap;transition:all .15s}
      .stage-step.done{color:var(--green);border-bottom-color:var(--green);background:rgba(20,201,138,.04)}
      .stage-step.current{color:var(--blue3);border-bottom-color:var(--blue);background:rgba(26,106,232,.06);font-weight:800}
      .stage-step.future{color:var(--ink3)}
      .tabs{display:flex;gap:0;border-bottom:1px solid var(--b);margin-bottom:20px}
      .mtab{border:none;background:transparent;color:var(--ink3);border-bottom:2px solid transparent;padding:11px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;margin-bottom:-1px}
      .mtab:hover{color:var(--ink2)}.mtab.active{color:var(--blue3);border-bottom-color:var(--blue)}
      .module{display:none}.module.show{display:block}
      .card-s{background:var(--s);border:1px solid var(--b2);border-radius:var(--r-lg);padding:20px;box-shadow:var(--sh);margin-bottom:16px}
      .card-s-t{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
      .card-s-t::before{content:'';width:3px;height:14px;border-radius:2px;background:var(--blue);flex-shrink:0}
      .meta-g{display:grid;grid-template-columns:1fr 1fr;gap:10px}
      .meta-i{background:var(--c);border:1px solid var(--b);border-radius:var(--r);padding:12px 14px;transition:border-color .15s}
      .meta-i:hover{border-color:var(--b2)}.meta-i b{display:block;color:var(--ink3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}.meta-i .val{font-size:14px;color:var(--ink);line-height:1.4}
      .ev-list{display:grid;gap:10px}.ev-item{display:grid;grid-template-columns:32px 1fr;gap:10px;align-items:start}
      .ev-dot{width:10px;height:10px;border-radius:50%;background:var(--blue);margin-top:4px;box-shadow:0 0 0 3px rgba(26,106,232,.14);justify-self:center}
      .ev-title{font-size:13px;font-weight:600}.ev-meta{font-size:12px;color:var(--ink2);margin-top:2px}
      .doc-list{display:grid;gap:8px}.doc-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--c);border:1px solid var(--b);border-radius:var(--r);padding:10px 14px}
      .doc-item-name{font-size:13px;font-weight:600}.doc-item-type{font-size:11px;color:var(--ink3)}
      .estimate-hero{background:linear-gradient(135deg,rgba(26,106,232,.18),rgba(10,27,48,.9));border:1px solid rgba(96,165,255,.24);border-radius:18px;padding:18px 20px;margin-bottom:16px;box-shadow:0 10px 34px rgba(0,0,0,.26)}
      .estimate-hero-top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap;margin-bottom:14px}
      .estimate-hero-title{font-size:18px;font-weight:800;letter-spacing:-.3px}
      .estimate-hero-sub{font-size:12px;color:#B7D2F1;margin-top:4px}
      .estimate-hero-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
      .estimate-box{background:rgba(7,22,38,.64);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 14px}
      .estimate-box b{display:block;font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
      .estimate-box .val{font-size:15px;font-weight:700}
      .estimate-actions{display:flex;gap:8px;flex-wrap:wrap}
      .inline-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
      .inline-form textarea,.inline-form input{background:rgba(7,22,38,.7);border:1px solid var(--b2);border-radius:10px;color:var(--ink);font-family:inherit;padding:10px 12px;font-size:13px;outline:none}
      .inline-form textarea{grid-column:1 / -1;min-height:96px;resize:vertical}
      .estimate-links{display:flex;gap:8px;flex-wrap:wrap}
      .fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
      .invoice-list{display:grid;gap:8px;margin-top:14px}
      .invoice-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--c);border:1px solid var(--b);border-radius:var(--r);padding:10px 14px}
      .fin-item{background:var(--c);border:1px solid var(--b);border-radius:var(--r);padding:12px 14px}
      .fin-item b{display:block;color:var(--ink3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
      .fin-item .val{font-size:16px;font-weight:700}
      .task-list{display:grid;gap:8px}.task-item{display:flex;align-items:center;gap:10px;background:var(--c);border:1px solid var(--b);border-radius:var(--r);padding:10px 14px}
      .task-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--b3);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:11px;color:transparent}
      .task-check.done{background:var(--green);border-color:var(--green);color:#fff}
      .task-title{font-size:13px;flex:1}.task-title.done{text-decoration:line-through;color:var(--ink3)}
      .task-due{font-size:11px;color:var(--ink3)}
      .empty{padding:24px;text-align:center;color:var(--ink2);border:1px dashed var(--b2);border-radius:var(--r-lg);font-size:13px}
      .loading{padding:32px;text-align:center;color:var(--ink2)}
      .add-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
      .add-row input,.add-row textarea{background:var(--c);border:1px solid var(--b2);border-radius:var(--r);color:var(--ink);font-family:inherit;padding:8px 12px;font-size:13px;outline:none;flex:1;min-width:200px}
      .add-row input:focus,.add-row textarea:focus{border-color:var(--blue2);box-shadow:0 0 0 2px rgba(26,106,232,.12)}
      select{background:var(--c);border:1px solid var(--b2);border-radius:var(--r);color:var(--ink);font-family:inherit;padding:8px 12px;font-size:13px;outline:none}
      @media(max-width:1100px){.ctrl{grid-template-columns:repeat(3,1fr)}.meta-g,.fin-grid,.estimate-hero-grid,.inline-form{grid-template-columns:1fr}}
      @media(max-width:700px){.ctrl{grid-template-columns:1fr}.job-top{grid-template-columns:1fr}.wrap{padding-left:14px;padding-right:14px}}
    </style>
  </head>
  <body>
    <header class="hdr"><div class="hdr-in">
      <div class="logo"><div class="logo-m"><img src="./logo1.jpg" alt="O&L Master Dom logo" /></div><div><div class="logo-n">O&amp;L Master Dom</div><div class="logo-s">Detail zakázky</div></div></div>
      <div class="hdr-acts">
        <div class="lang-switch">
          <button class="lang-btn" data-lang="cs">CZ</button>
          <button class="lang-btn" data-lang="uk">UA</button>
        </div>
        <a class="btn" id="backPipeline" href="./index.html">← Pipeline</a>
        <select id="moveStage" style="min-width:180px;padding:8px 10px"></select>
        <button class="btn btn-p" id="moveBtn">Změnit etapu</button>
      </div>
    </div></header>

    <div class="wrap">
      <div class="job-top">
        <div>
          <div class="job-num" id="jobNum">—</div>
          <div class="job-title" id="jobTitle">Načítání...</div>
          <div class="job-sub" id="jobSub"></div>
        </div>
        <div class="job-actions">
          <a class="btn" id="goEstimate" href="./estimate-builder.html">Otevřít kalkulaci</a>
          <button class="btn" id="buildEstimateDocsTop">Excel / PDF</button>
          <button class="btn btn-p" id="sendEstimateTop">Odeslat klientovi</button>
        </div>
      </div>

      <div class="stage-bar" id="stageBar"></div>

      <div class="ctrl" id="ctrlPanel"></div>

      <div class="tabs">
        <button class="mtab active" data-m="prehled">Přehled</button>
        <button class="mtab" data-m="komunikace">Komunikace</button>
        <button class="mtab" data-m="dokumenty">Dokumenty</button>
        <button class="mtab" data-m="finance">Finance</button>
        <button class="mtab" data-m="realizace">Realizace</button>
      </div>

      <div class="module show" id="m-prehled"></div>
      <div class="module" id="m-komunikace"></div>
      <div class="module" id="m-dokumenty"></div>
      <div class="module" id="m-finance"></div>
      <div class="module" id="m-realizace"></div>
    </div>

    <script>
      const params = new URLSearchParams(location.search)
      const jobId = Number(params.get('jobId') || 0)
      const base = location.pathname.startsWith('/demo-crm') ? '/demo-crm' : ''
      const api = (p) => `${base}${p}`
      const esc = (s) => String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
      async function j(r) { try { return await r.json() } catch { return null } }
      const fmt = (iso) => { try { return new Date(iso).toLocaleDateString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric'}) } catch { return '—' } }
      const fmtFull = (iso) => { try { return new Date(iso).toLocaleString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) } catch { return '—' } }
      const fmtMoney = (n) => `${Number(n || 0).toLocaleString('cs-CZ', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} Kč`

      const STAGES = ['nova_poptavka','podklady','zpracovani_nabidky','nabidka_odeslana','schvaleni_objednavka','zaloha_priprava','realizace','predani_fakturace','dokonceno']
      const SL = {nova_poptavka:'Nová poptávka',podklady:'Podklady od klienta',zpracovani_nabidky:'Zpracování nabídky',nabidka_odeslana:'Nabídka odeslána',schvaleni_objednavka:'Schválení / objednávka',zaloha_priprava:'Záloha / příprava',realizace:'Realizace zakázky',predani_fakturace:'Předání / fakturace',dokonceno:'Dokončeno / uzavřeno'}
      const WAITING = {client:'Klient',internal_sales:'Obchodník',accountant:'Účetní',realization_team:'Realizace',signature:'Podpis',payment:'Platba',none:'Nikdo'}
      const BLOCKING = {missing_form:'Chybí formulář',waiting_offer_response:'Bez reakce na nabídku',waiting_signature:'Čeká na podpis',waiting_advance_payment:'Čeká na zálohu',missing_contract:'Chybí objednávka',missing_material:'Chybí materiál',missing_protocol:'Chybí protokol',overdue_invoice:'Faktura po splatnosti',none:'Bez blokace'}
      const UI_TEXT = {
        cs: {
          backPipeline: '← Pipeline',
          moveBtn: 'Změnit etapu',
          goEstimate: 'Otevřít kalkulaci',
          buildDocs: 'Excel / PDF',
          sendClient: 'Odeslat klientovi',
          tabs: ['Přehled','Komunikace','Dokumenty','Finance','Realizace'],
          moved: 'Etapa byla změněna',
          moveError: 'Etapu se nepodařilo změnit',
        },
        uk: {
          backPipeline: '← До pipeline',
          moveBtn: 'Змінити етап',
          goEstimate: 'Відкрити кошторис',
          buildDocs: 'Excel / PDF',
          sendClient: 'Надіслати клієнту',
          tabs: ['Огляд','Комунікація','Документи','Фінанси','Реалізація'],
          moved: 'Етап змінено',
          moveError: 'Не вдалося змінити етап',
        },
      }

      let data = null
      let activeEstimate = null
      let uiLang = localStorage.getItem('crmUiLang') || 'uk'

      function applyUiLang() {
        const t = UI_TEXT[uiLang] || UI_TEXT.cs
        document.querySelectorAll('.lang-btn').forEach((btn) => btn.classList.toggle('active', btn.getAttribute('data-lang') === uiLang))
        document.getElementById('backPipeline').textContent = t.backPipeline
        document.getElementById('moveBtn').textContent = t.moveBtn
        document.getElementById('goEstimate').textContent = t.goEstimate
        document.getElementById('buildEstimateDocsTop').textContent = t.buildDocs
        document.getElementById('sendEstimateTop').textContent = t.sendClient
        document.querySelectorAll('.mtab').forEach((btn, idx) => { btn.textContent = t.tabs[idx] || btn.textContent })
      }

      document.querySelectorAll('.mtab').forEach(b => {
        b.addEventListener('click', () => {
          document.querySelectorAll('.mtab').forEach(x => x.classList.remove('active')); b.classList.add('active')
          document.querySelectorAll('.module').forEach(m => m.classList.remove('show'))
          document.getElementById(`m-${b.getAttribute('data-m')}`).classList.add('show')
        })
      })

      function renderStageBar(stage) {
        const idx = STAGES.indexOf(stage)
        document.getElementById('stageBar').innerHTML = STAGES.map((s, i) => {
          const cls = i < idx ? 'done' : i === idx ? 'current' : 'future'
          return `<div class="stage-step ${cls}">${esc(SL[s] || s)}</div>`
        }).join('')
      }

      function renderCtrl(job) {
        const items = [
          { k: 'Pipeline stage', v: SL[job.pipelineStage || job.stage] || job.pipelineStage || job.stage, cls: 'blue' },
          { k: 'Čekáme na', v: WAITING[job.waitingFor] || job.waitingFor || 'Nikdo', cls: job.waitingFor && job.waitingFor !== 'none' ? 'orange' : 'green' },
          { k: 'Blokující faktor', v: BLOCKING[job.computedBlocking || job.blockingFactor] || job.computedBlocking || job.blockingFactor || 'Bez blokace', cls: (job.computedBlocking || job.blockingFactor) && (job.computedBlocking || job.blockingFactor) !== 'none' ? 'red' : 'green' },
          { k: 'Riziko', v: job.computedRisk === 'none' ? 'Bez rizika' : job.computedRisk === 'approaching' ? 'Blíží se termín' : job.computedRisk === 'overdue' ? 'Po termínu' : 'Faktura po splatnosti', cls: job.computedRisk === 'none' ? 'green' : 'red' },
          { k: 'Další krok', v: job.nextAction || '—', cls: 'purple' },
          { k: 'Termín další akce', v: job.nextActionDueAt ? fmtFull(job.nextActionDueAt) : '—', cls: 'blue' },
        ]
        document.getElementById('ctrlPanel').innerHTML = items.map(x => `<div class="ctrl-card ${x.cls}"><div class="k">${esc(x.k)}</div><div class="v">${esc(x.v)}</div></div>`).join('')
      }

      function renderPrehled(job, customer, lead) {
        const c = customer || {}
        const brief = lead?.brief || {}
        const isFirma = c.clientType === 'firma' || !!c.ico
        const typeBadge = isFirma
          ? `<span class="badge b-blue" style="margin-left:8px">Firma</span>`
          : `<span class="badge b-green" style="margin-left:8px">Fyzická osoba</span>`

        const contactFields = [
          ['Jméno / Název', c.name || c.companyName || '—'],
          ['Email', c.email || '—'],
          ['Telefon', c.phone || '—'],
          ['Adresa / Sídlo', c.address || '—'],
        ].filter(([,v]) => v && v !== '—')

        const icoBlock = isFirma ? `
          <div class="card-s" style="border-left:3px solid var(--blue)">
            <div class="card-s-t">Firemní údaje (IČO)
              ${c.ico ? `<button class="btn" id="fetchAresBtn" style="margin-left:auto;font-size:11px;padding:5px 12px">↻ Aktualizovat z ARES</button>` : ''}
            </div>
            <div class="meta-g">
              <div class="meta-i"><b>IČO</b><div class="val" style="font-size:18px;font-weight:800">${esc(c.ico || '—')}</div></div>
              <div class="meta-i"><b>DIČ</b><div class="val">${esc(c.dic || '—')}</div></div>
              <div class="meta-i"><b>Název firmy</b><div class="val">${esc(c.companyName || c.name || '—')}</div></div>
              <div class="meta-i"><b>Sídlo</b><div class="val">${esc(c.address || '—')}</div></div>
            </div>
          </div>` : ''

        const briefFields = []
        if (brief.objectType) briefFields.push(['Typ objektu', brief.objectType])
        if (brief.realizationAddress) briefFields.push(['Adresa realizace', brief.realizationAddress])
        if ((brief.requestTypes || []).length) briefFields.push(['Požadované práce', brief.requestTypes.join(', ')])
        if (brief.requestOther) briefFields.push(['Jiné práce', brief.requestOther])
        if (brief.scopeType) briefFields.push(['Rozsah zakázky', brief.scopeType])
        if (brief.area) briefFields.push(['Plocha / rozsah (m²)', brief.area])

      async function ensureEstimateForJob() {
        if (activeEstimate?.id) return activeEstimate
        const r = await fetch(api(`/api/crm/estimates/from-job`), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ jobId }) })
        const d = await j(r)
        if (!r.ok || !d?.ok) throw new Error(d?.error || 'Nelze vytvořit rozpočet')
        activeEstimate = d.estimate
        return activeEstimate
      }

      async function buildEstimateDocs() {
        const estimate = await ensureEstimateForJob()
        const r = await fetch(api(`/api/crm/estimates/${estimate.id}/build-documents`), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) })
        const d = await j(r)
        if (!r.ok || !d?.ok) throw new Error(d?.error || 'Nelze vygenerovat dokumenty')
        alert(d?.pdf?.ok ? 'Excel i PDF byly vygenerovány' : 'Excel byl vygenerován, ale PDF se nepodařilo vytvořit')
        await loadJob()
      }

      async function sendEstimateToClient() {
        const estimate = await ensureEstimateForJob()
        const email = (document.getElementById('estimateEmail')?.value || data?.customer?.email || '').trim()
        const subject = (document.getElementById('estimateSubject')?.value || '').trim()
        const text = (document.getElementById('estimateText')?.value || '').trim()
        const r = await fetch(api(`/api/crm/estimates/${estimate.id}/send-to-client`), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, subject, text }),
        })
        const d = await j(r)
        if (!r.ok || !d?.ok) throw new Error(d?.error || 'Nelze odeslat email')
        alert(`Rozpočet byl odeslán na ${email}`)
        await loadJob()

      async function loadJob() {
        if (!jobId) { document.getElementById('jobTitle').textContent = 'jobId chybí'; return }
        const [r, er] = await Promise.all([
          fetch(api(`/api/crm/jobs/${jobId}`)),
          fetch(api(`/api/crm/estimates?jobId=${jobId}`)),
        ])
        const d = await j(r)
        const ed = await j(er)
        if (!r.ok || !d?.ok) { document.getElementById('jobTitle').textContent = 'Chyba načítání'; return }
        data = d
        d.estimates = er.ok && ed?.ok ? (ed.estimates || []) : []
        const job = d.job; const customer = d.customer; const lead = d.lead
        document.getElementById('jobNum').textContent = job.internalNumber || '—'
        document.getElementById('jobTitle').textContent = job.title || 'Zakázka'
        document.getElementById('jobSub').textContent = `${customer?.name || '—'} · ${SL[job.stage] || job.stage} · Priorita: ${job.priority}`
        document.getElementById('goEstimate').href = `./estimate-builder.html?jobId=${job.id}`
        const sel = document.getElementById('moveStage')
        sel.innerHTML = STAGES.map(s => `<option value="${s}" ${s === job.stage ? 'selected' : ''}>${esc(SL[s])}</option>`).join('')
        renderStageBar(job.stage)
        renderCtrl(job)
        renderPrehled(job, customer, lead)
        renderKomunikace(d.events || [])
        renderDokumenty(d.documents || [], d.estimates || [], customer, job)
        renderFinance(job, d.invoices || [])
        renderRealizace(job, d.tasks || [])
      }

      document.getElementById('moveBtn').addEventListener('click', async () => {
        const stage = document.getElementById('moveStage').value
        const r = await fetch(api(`/api/crm/jobs/${jobId}/move`), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ stage }) })
        const d = await j(r)
        if (r.ok && d?.ok) { alert((UI_TEXT[uiLang] || UI_TEXT.cs).moved); loadJob() }
        else alert(d?.error || (UI_TEXT[uiLang] || UI_TEXT.cs).moveError)
      })

      document.querySelectorAll('.lang-btn').forEach((btn) => btn.addEventListener('click', () => {
        uiLang = btn.getAttribute('data-lang') || 'cs'
        localStorage.setItem('crmUiLang', uiLang)
        applyUiLang()
      }))

      document.getElementById('buildEstimateDocsTop').addEventListener('click', async () => {
        try { await buildEstimateDocs() } catch (e) { alert(String(e?.message || e)) }
      })

      document.getElementById('sendEstimateTop').addEventListener('click', async () => {
        try { await sendEstimateToClient() } catch (e) { alert(String(e?.message || e)) }
      })

      applyUiLang()
      loadJob()
    </script>
  </body>
</html>
