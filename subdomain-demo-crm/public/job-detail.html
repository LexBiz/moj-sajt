<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>O&L Master Dom · Zakázka</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root{--bg:#0B1929;--s:#112338;--s2:#142B44;--c:#1A3254;--c2:#213C64;--b:rgba(255,255,255,.11);--b2:rgba(255,255,255,.19);--b3:rgba(255,255,255,.29);--ink:#F2F8FF;--ink2:#AACCE8;--ink3:#6A9AC0;--blue:#2478F2;--blue2:#4A96FA;--blue3:#7BBEFF;--green:#12D494;--orange:#F09820;--red:#F04444;--purple:#8A6EF0;--r:10px;--r-md:14px;--r-lg:18px;--sh:0 8px 32px rgba(0,0,0,.35)}
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
      body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.55;background-image:radial-gradient(ellipse 220% 55% at 50% -6%,rgba(36,120,242,.22) 0%,transparent 60%),radial-gradient(ellipse 80% 30% at 90% 100%,rgba(18,212,148,.06) 0%,transparent 50%)}
      .hdr{position:sticky;top:0;z-index:40;background:rgba(11,25,41,.92);border-bottom:1px solid rgba(74,150,250,.22);backdrop-filter:blur(20px);box-shadow:0 2px 24px rgba(0,0,0,.35)}
      .hdr-in{max-width:1600px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:16px}
      .logo{display:flex;align-items:center;gap:10px}
      .logo-m{height:44px;min-width:44px;border-radius:10px;overflow:hidden;border:1px solid rgba(61,135,248,.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 10px rgba(26,106,232,.3);background:#0B1730}
      .logo-m img{height:44px;width:auto;max-width:160px;object-fit:contain;display:block}
      .logo-n{font-size:15px;font-weight:800;letter-spacing:-.3px}.logo-s{font-size:10px;color:var(--ink3);letter-spacing:.4px;text-transform:uppercase;margin-top:2px}
      .hdr-acts{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
      .lang-switch{display:flex;gap:6px;align-items:center;margin-right:4px}
      .lang-btn{border:1px solid var(--b2);background:var(--c);color:var(--ink2);padding:7px 10px;border-radius:999px;font:inherit;font-size:11px;font-weight:800;cursor:pointer}
      .lang-btn.active{background:rgba(26,106,232,.18);color:var(--blue3);border-color:rgba(61,135,248,.35)}
      .btn{border:1px solid var(--b2);border-radius:var(--r);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;padding:9px 18px;transition:all .18s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;background:rgba(26,50,84,.7);color:var(--ink);text-decoration:none;backdrop-filter:blur(4px)}
      .btn:hover{background:var(--c2);border-color:var(--b3);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.2)}.btn-p{background:linear-gradient(135deg,#2070F0,#4A96FA);color:#fff;border:none;box-shadow:0 4px 18px rgba(36,120,242,.5);font-weight:700}.btn-p:hover{background:linear-gradient(135deg,#2878F8,#58A4FF);box-shadow:0 6px 24px rgba(36,120,242,.6);transform:translateY(-1px)}
      .badge{display:inline-flex;align-items:center;border-radius:999px;padding:3px 9px;font-size:10px;font-weight:700;letter-spacing:.2px;border:1px solid}
      .b-blue{color:#80B8F8;border-color:rgba(80,184,248,.25);background:rgba(80,184,248,.1)}.b-green{color:#50D8A0;border-color:rgba(80,216,160,.25);background:rgba(80,216,160,.1)}.b-orange{color:#F0A850;border-color:rgba(240,168,80,.25);background:rgba(240,168,80,.1)}.b-red{color:#F07070;border-color:rgba(240,112,112,.25);background:rgba(240,112,112,.1)}.b-purple{color:#A080F0;border-color:rgba(160,128,240,.25);background:rgba(160,128,240,.1)}.b-cyan{color:#60D8EC;border-color:rgba(96,216,236,.25);background:rgba(96,216,236,.1)}.b-grey{color:var(--ink2);border-color:var(--b2);background:rgba(255,255,255,.04)}
      .wrap{max-width:1600px;margin:0 auto;padding:24px 24px 60px}
      .job-top{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--b2)}
      .job-num{font-size:12px;color:var(--ink3);margin-bottom:4px;font-weight:600;letter-spacing:.4px}
      .job-title{font-size:24px;font-weight:800;letter-spacing:-.4px;margin-bottom:4px}
      .job-sub{font-size:13px;color:var(--ink2)}
      .job-actions{display:flex;gap:8px;flex-wrap:wrap}
      .ctrl{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px}
      .ctrl-card{background:linear-gradient(145deg,rgba(26,50,84,.8),rgba(17,35,56,.9));border:1px solid var(--b2);border-top:2px solid transparent;border-radius:var(--r-md);padding:14px 16px;transition:all .18s;box-shadow:0 2px 12px rgba(0,0,0,.2)}
      .ctrl-card:hover{border-color:var(--b3);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.25)}.ctrl-card .k{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}.ctrl-card .v{font-size:16px;font-weight:700}
      .ctrl-card.blue{border-top-color:var(--blue2)}.ctrl-card.blue .v{color:var(--blue3)}
      .ctrl-card.green{border-top-color:var(--green)}.ctrl-card.green .v{color:var(--green)}
      .ctrl-card.orange{border-top-color:var(--orange)}.ctrl-card.orange .v{color:var(--orange)}
      .ctrl-card.red{border-top-color:var(--red)}.ctrl-card.red .v{color:var(--red)}
      .stage-bar{display:flex;gap:0;margin-bottom:24px;overflow-x:auto}
      .stage-step{flex:1;min-width:0;padding:10px 8px;text-align:center;font-size:11px;font-weight:600;color:rgba(106,154,192,.7);border-bottom:3px solid rgba(255,255,255,.07);white-space:nowrap;transition:all .18s;cursor:pointer}
      .stage-step:hover{color:var(--ink2)}
      .stage-step.done{color:var(--green);border-bottom-color:var(--green);background:rgba(18,212,148,.05)}
      .stage-step.current{color:#fff;border-bottom-color:var(--blue2);background:rgba(36,120,242,.12);font-weight:800;text-shadow:0 0 20px rgba(74,150,250,.5)}
      .stage-step.future{color:rgba(106,154,192,.6)}
      .tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:20px}
      .mtab{border:none;background:transparent;color:var(--ink3);border-bottom:2px solid transparent;padding:11px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .18s;margin-bottom:-1px}
      .mtab:hover{color:var(--ink2)}.mtab.active{color:#fff;border-bottom-color:var(--blue2);text-shadow:0 0 16px rgba(74,150,250,.6)}
      .module{display:none}.module.show{display:block}
      #m-komunikace.show{display:flex}
      /* ── Poznámky tab — iPhone Notes style ── */
      #m-poznamky.show{display:flex;flex-direction:column;gap:0}
      .poz-shell{display:flex;flex-direction:column;flex:1;min-height:0}
      .poz-compose{background:var(--s);border:1px solid var(--b2);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:18px;box-shadow:0 2px 12px rgba(0,0,0,.25)}
      .poz-compose-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
      .poz-compose-icon{width:34px;height:34px;border-radius:50%;background:rgba(232,146,26,.18);border:1px solid rgba(232,146,26,.3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
      .poz-compose-label{font-size:13px;font-weight:700;color:var(--ink)}
      .poz-compose-sub{font-size:11px;color:var(--ink3);margin-top:1px}
      .poz-compose textarea{width:100%;background:var(--c);border:1px solid var(--b2);border-radius:12px;color:var(--ink);font-family:inherit;padding:12px 14px;font-size:14px;outline:none;resize:none;min-height:88px;box-sizing:border-box;line-height:1.6;transition:border-color .15s,box-shadow .15s}
      .poz-compose textarea:focus{border-color:rgba(232,146,26,.6);box-shadow:0 0 0 3px rgba(232,146,26,.1)}
      .poz-compose-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:10px}
      .poz-list{display:flex;flex-direction:column;gap:12px;overflow-y:auto;flex:1;padding-bottom:8px}
      .poz-list::-webkit-scrollbar{width:5px}.poz-list::-webkit-scrollbar-track{background:transparent}.poz-list::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
      .poz-note{background:linear-gradient(145deg,rgba(18,30,50,.9),rgba(12,22,40,.95));border:1px solid rgba(232,146,26,.18);border-radius:var(--r-lg);padding:14px 16px;transition:border-color .15s,box-shadow .15s}
      .poz-note:hover{border-color:rgba(232,146,26,.4);box-shadow:0 4px 18px rgba(232,146,26,.07)}
      .poz-note-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
      .poz-note-meta{display:flex;flex-direction:column;gap:2px;min-width:0}
      .poz-note-date{font-size:11px;font-weight:700;color:rgba(232,146,26,.9);letter-spacing:.3px}
      .poz-note-time{font-size:10px;color:var(--ink3)}
      .poz-note-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
      .poz-note-author{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink3)}
      .poz-note-avatar{width:20px;height:20px;border-radius:50%;background:rgba(232,146,26,.2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:rgba(232,146,26,.9)}
      .poz-note-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s}
      .poz-note:hover .poz-note-actions{opacity:1}
      .poz-note.editing .poz-note-actions{opacity:0;pointer-events:none}
      .poz-note-del,.poz-note-edit{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:15px;line-height:1;padding:4px 6px;border-radius:6px;transition:all .15s}
      .poz-note-del:hover{color:var(--red);background:rgba(232,58,58,.12)}
      .poz-note-edit:hover{color:var(--blue3);background:rgba(26,106,232,.12)}
      .poz-note-text{font-size:14px;color:var(--ink);white-space:pre-wrap;line-height:1.65}
      .poz-note.editing .poz-note-text{display:none}
      .poz-edit-area{display:none;margin-top:6px}
      .poz-note.editing .poz-edit-area{display:block}
      .poz-edit-area textarea{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(232,146,26,.35);border-radius:10px;color:var(--ink);font-family:inherit;padding:10px 12px;font-size:14px;line-height:1.6;outline:none;resize:vertical;min-height:80px;box-sizing:border-box}
      .poz-edit-area textarea:focus{border-color:rgba(232,146,26,.7);box-shadow:0 0 0 3px rgba(232,146,26,.1)}
      .poz-edit-btns{display:flex;gap:8px;margin-top:8px;justify-content:flex-end}
      .poz-edit-save{background:linear-gradient(135deg,rgba(232,146,26,.8),rgba(250,170,40,.7));border:none;color:#fff;border-radius:8px;padding:7px 16px;font:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s}
      .poz-edit-save:hover{opacity:.85}
      .poz-edit-cancel{background:rgba(255,255,255,.06);border:1px solid var(--b2);color:var(--ink2);border-radius:8px;padding:7px 14px;font:inherit;font-size:12px;font-weight:700;cursor:pointer}
      .poz-empty{padding:48px 24px;text-align:center;color:var(--ink2);font-size:14px;border:2px dashed var(--b);border-radius:var(--r-lg)}
      .card-s{background:linear-gradient(145deg,rgba(17,35,56,.95),rgba(20,43,68,.9));border:1px solid var(--b2);border-radius:var(--r-lg);padding:20px;box-shadow:0 4px 24px rgba(0,0,0,.25),0 1px 0 rgba(255,255,255,.06) inset;margin-bottom:16px}
      .card-s-t{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
      .card-s-t::before{content:'';width:3px;height:14px;border-radius:2px;background:var(--blue);flex-shrink:0}
      .meta-g{display:grid;grid-template-columns:1fr 1fr;gap:10px}
      .meta-i{background:rgba(26,50,84,.6);border:1px solid var(--b2);border-radius:var(--r);padding:12px 14px;transition:all .18s}
      .meta-i:hover{border-color:rgba(74,150,250,.35);background:rgba(26,50,84,.85)}.meta-i b{display:block;color:var(--ink3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}.meta-i .val{font-size:14px;color:var(--ink);line-height:1.4}
      .ev-list{display:grid;gap:10px}.ev-item{display:grid;grid-template-columns:32px 1fr;gap:10px;align-items:start}
      .ev-dot{width:10px;height:10px;border-radius:50%;background:var(--blue);margin-top:4px;box-shadow:0 0 0 3px rgba(26,106,232,.14);justify-self:center}
      .ev-title{font-size:13px;font-weight:600}.ev-meta{font-size:12px;color:var(--ink2);margin-top:2px}
      .doc-list{display:grid;gap:8px}.doc-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--c);border:1px solid var(--b);border-radius:var(--r);padding:10px 14px}
      .doc-item-name{font-size:13px;font-weight:600}.doc-item-type{font-size:11px;color:var(--ink3)}
      .estimate-hero{background:linear-gradient(135deg,rgba(26,106,232,.18),rgba(10,27,48,.9));border:1px solid rgba(96,165,255,.24);border-radius:18px;padding:18px 20px;margin-bottom:16px;box-shadow:0 10px 34px rgba(0,0,0,.26)}
      .estimate-hero-top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap;margin-bottom:14px}
      .estimate-hero-title{font-size:18px;font-weight:800;letter-spacing:-.3px}
      .estimate-hero-sub{font-size:12px;color:#B7D2F1;margin-top:4px}
      .estimate-hero-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
      .estimate-box{background:rgba(7,22,38,.64);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 14px}
      .estimate-box b{display:block;font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
      .estimate-box .val{font-size:15px;font-weight:700}
      .estimate-actions{display:flex;gap:8px;flex-wrap:wrap}
      .inline-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
      .inline-form textarea,.inline-form input{background:rgba(7,22,38,.7);border:1px solid var(--b2);border-radius:10px;color:var(--ink);font-family:inherit;padding:10px 12px;font-size:13px;outline:none}
      .inline-form textarea{grid-column:1 / -1;min-height:96px;resize:vertical}
      .estimate-links{display:flex;gap:8px;flex-wrap:wrap}
      .fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
      .invoice-list{display:grid;gap:8px;margin-top:14px}
      .invoice-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--c);border:1px solid var(--b);border-radius:var(--r);padding:10px 14px}
      .fin-item{background:var(--c);border:1px solid var(--b);border-radius:var(--r);padding:12px 14px}
      .fin-item b{display:block;color:var(--ink3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
      .fin-item .val{font-size:16px;font-weight:700}
      .task-list{display:grid;gap:8px}.task-item{display:flex;align-items:center;gap:10px;background:var(--c);border:1px solid var(--b);border-radius:var(--r);padding:10px 14px}
      .task-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--b3);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:11px;color:transparent}
      .task-check.done{background:var(--green);border-color:var(--green);color:#fff}
      .task-title{font-size:13px;flex:1}.task-title.done{text-decoration:line-through;color:var(--ink3)}
      .task-due{font-size:11px;color:var(--ink3)}
      .empty{padding:24px;text-align:center;color:var(--ink2);border:1px dashed var(--b2);border-radius:var(--r-lg);font-size:13px}
      /* ── Communication timeline ── */
      #m-komunikace{display:none;flex-direction:column;height:calc(100vh - 210px)}
      #m-komunikace.show{display:flex}
      .komm-wrap{display:flex;flex-direction:column;gap:0;flex:1;overflow-y:auto;padding:20px 12px 12px;scroll-behavior:smooth;min-height:0}
      .komm-wrap::-webkit-scrollbar{width:4px}.komm-wrap::-webkit-scrollbar-track{background:transparent}.komm-wrap::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
      .komm-day{text-align:center;margin:22px 0 14px;font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;position:relative}
      .komm-day::before,.komm-day::after{content:'';position:absolute;top:50%;height:1px;width:calc(50% - 50px);background:var(--b)}
      .komm-day::before{left:0}.komm-day::after{right:0}
      .komm-msg{display:flex;gap:10px;margin-bottom:16px;align-items:flex-end;max-width:82%}
      .komm-msg.out{flex-direction:row-reverse;align-self:flex-end;margin-left:auto}
      .komm-msg.sys{align-self:center;max-width:100%;flex-direction:column;align-items:center;text-align:center;margin:2px 0 10px}
      .komm-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-bottom:2px}
      .komm-bubble{max-width:100%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.6;word-break:break-word;position:relative}
      .komm-bubble.in{background:rgba(20,201,138,.13);border:1px solid rgba(20,201,138,.25);border-bottom-left-radius:4px;color:var(--ink)}
      .komm-bubble.out{background:linear-gradient(135deg,rgba(26,106,232,.28),rgba(61,135,248,.22));border:1px solid rgba(61,135,248,.35);border-bottom-right-radius:4px;color:var(--ink)}
      .komm-bubble.wa{background:rgba(37,211,102,.13);border:1px solid rgba(37,211,102,.28);color:var(--ink)}
      .komm-bubble.sys-bubble{background:rgba(255,255,255,.04);border:1px solid var(--b);border-radius:8px;padding:5px 12px;font-size:11px;color:var(--ink2)}
      .komm-bubble.call-bubble{background:rgba(96,165,255,.1);border:1px solid rgba(96,165,255,.25);border-radius:14px;color:var(--ink)}
      .komm-bubble.meet-bubble{background:rgba(122,94,232,.1);border:1px solid rgba(122,94,232,.25);border-radius:14px;color:var(--ink)}
      .komm-bubble.doc{background:rgba(96,165,255,.1);border:1px solid rgba(96,165,255,.22);color:var(--ink)}
      .komm-meta{font-size:11px;color:var(--ink3);margin-top:5px;display:flex;align-items:center;gap:5px}
      .komm-msg.out .komm-meta{justify-content:flex-end}
      .komm-subj{font-size:12px;font-weight:700;color:var(--ink3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
      .komm-body{font-size:14px;color:var(--ink);white-space:pre-wrap;overflow:hidden;display:-webkit-box;-webkit-line-clamp:8;-webkit-box-orient:vertical}
      .komm-expand{display:inline-block;font-size:12px;color:var(--blue3);cursor:pointer;margin-top:5px}
      .komm-ev-header{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
      .komm-ev-text{font-size:14px;color:var(--ink);white-space:pre-wrap;line-height:1.6}
      /* Email compose modal */
      .email-compose-modal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);align-items:center;justify-content:center}
      .email-compose-modal.open{display:flex}
      .email-compose-box{background:var(--s);border:1px solid var(--b2);border-radius:18px;padding:28px;width:100%;max-width:560px;box-shadow:0 24px 64px rgba(0,0,0,.6)}
      .email-compose-box h3{font-size:17px;font-weight:800;margin-bottom:20px}
      .email-compose-box .field{margin-bottom:14px}
      .email-compose-box label{display:block;font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
      .email-compose-box input,.email-compose-box textarea{width:100%;background:var(--c);border:1px solid var(--b2);border-radius:9px;color:var(--ink);font:inherit;font-size:14px;padding:10px 13px;outline:none}
      .email-compose-box input:focus,.email-compose-box textarea:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(26,106,232,.12)}

      .email-compose-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
      .komm-expand{font-size:11px;color:var(--blue3);cursor:pointer;margin-top:4px;display:inline-block}
      .komm-attach{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
      .komm-attach-item{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.06);border:1px solid var(--b2);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--blue3);text-decoration:none;cursor:pointer}
      .komm-attach-item:hover{background:rgba(26,106,232,.14)}
      /* ── Komunikace input ── */
      .komm-input-area{border-top:1px solid var(--b2);padding:10px 14px 12px}
      .komm-input-shell{background:var(--c);border:1.5px solid var(--b2);border-radius:22px;display:flex;align-items:flex-end;gap:6px;padding:8px 8px 8px 16px;transition:border-color .2s,box-shadow .2s}
      .komm-input-shell:focus-within{border-color:rgba(61,135,248,.45);box-shadow:0 0 0 3px rgba(26,106,232,.09)}
      .komm-input-shell textarea{flex:1;background:transparent;border:none;color:var(--ink);font-family:inherit;font-size:14px;outline:none;resize:none;min-height:22px;max-height:160px;line-height:1.55;padding:5px 0;align-self:center}
      .komm-clip-btn{width:34px;height:34px;border-radius:50%;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--ink3);transition:all .15s}
      .komm-clip-btn:hover{color:var(--ink);background:rgba(255,255,255,.08)}
      .komm-clip-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
      .komm-send-btn{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1A6AE8,#3D87F8);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;box-shadow:0 3px 10px rgba(26,106,232,.35)}
      .komm-send-btn:hover{background:linear-gradient(135deg,#2070F0,#4A95FF);transform:scale(1.07)}
      .komm-send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
      .komm-send-btn svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
      .komm-attach-chips{display:flex;flex-wrap:wrap;gap:5px;padding:4px 14px 0}
      /* Email panel (accessible via header button, outside input) */
      .komm-email-panel{display:none;background:var(--c);border:1.5px solid var(--b2);border-radius:14px;padding:0;margin-bottom:10px;overflow:hidden}
      .komm-email-panel.show{display:block}
      .komm-email-field{display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.05);padding:10px 14px}
      .komm-email-field:last-child{border-bottom:none}
      .komm-email-label{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;width:48px;flex-shrink:0}
      .komm-email-field input,.komm-email-field textarea{flex:1;background:transparent;border:none;outline:none;color:var(--ink);font:inherit;font-size:14px;padding:0}
      .komm-email-field textarea{resize:none;min-height:80px;line-height:1.55}
      .komm-email-actions{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid rgba(255,255,255,.05)}
      .komm-attach-label-sm{font-size:12px;color:var(--ink3);display:flex;align-items:center;gap:5px;cursor:pointer}
      .komm-attach-label-sm:hover{color:var(--ink2)}
      .komm-attach-label-sm input{display:none}
      .loading{padding:32px;text-align:center;color:var(--ink2)}
      .add-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
      .add-row input,.add-row textarea{background:var(--c);border:1px solid var(--b2);border-radius:var(--r);color:var(--ink);font-family:inherit;padding:8px 12px;font-size:13px;outline:none;flex:1;min-width:200px}
      .add-row input:focus,.add-row textarea:focus{border-color:var(--blue2);box-shadow:0 0 0 2px rgba(26,106,232,.12)}
      select{background:var(--c);border:1px solid var(--b2);border-radius:var(--r);color:var(--ink);font-family:inherit;padding:8px 12px;font-size:13px;outline:none}
      .user-chip{display:flex;align-items:center;gap:8px;background:var(--c);border:1px solid var(--b2);border-radius:999px;padding:5px 12px 5px 8px;font-size:12px;font-weight:600}
      .user-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#1A6AE8,#14C98A);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
      .user-role{font-size:10px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
      .btn-logout{border:1px solid rgba(232,58,58,.25);background:rgba(232,58,58,.06);color:#F07070;border-radius:999px;padding:5px 12px;font:inherit;font-size:11px;font-weight:700;cursor:pointer}
      .btn-logout:hover{background:rgba(232,58,58,.14)}
      @media(max-width:1100px){.ctrl{grid-template-columns:repeat(3,1fr)}.meta-g,.fin-grid,.estimate-hero-grid,.inline-form{grid-template-columns:1fr}}
      @media(max-width:700px){.ctrl{grid-template-columns:1fr}.job-top{grid-template-columns:1fr}.wrap{padding-left:14px;padding-right:14px}}
    </style>
    <script src="./crm-utils.js"></script>
  </head>
  <body>
    <header class="hdr"><div class="hdr-in">
      <div class="logo"><div class="logo-m"><img src="./logo1.jpg" alt="O&L Master Dom logo" /></div><div><div class="logo-n">O&amp;L Master Dom</div><div class="logo-s">Detail zakázky</div></div></div>
      <div class="hdr-acts">
        <div class="lang-switch">
          <button class="lang-btn" data-lang="cs">CZ</button>
          <button class="lang-btn" data-lang="uk">UA</button>
        </div>
        <a class="btn" id="backPipeline" href="./index.html">← Do pipeline</a>
        <button class="btn btn-p" id="moveBtn" title="Posunout zakázku na následující etapu v pipeline">Další etapa →</button>
        <button id="archiveHdrBtn" class="btn" style="display:none;background:rgba(20,201,138,.1);border-color:rgba(20,201,138,.35);color:var(--green);font-weight:800">📦 Archivovat</button>
        <div class="user-chip">
          <div class="user-avatar" id="userAvatar">?</div>
          <div><div id="userName" style="line-height:1.2">—</div><div class="user-role" id="userRole">—</div></div>
        </div>
        <button class="btn-logout" id="logoutBtn">↩</button>
      </div>
    </div></header>

    <div class="wrap">
      <div class="job-top">
        <div>
          <div class="job-num" id="jobNum">—</div>
          <div class="job-title" id="jobTitle">Načítání...</div>
          <div class="job-sub" id="jobSub"></div>
        </div>
        <div class="job-actions">
          <a class="btn" id="goEstimate" href="./estimate-builder.html">Otevřít kalkulaci</a>
          <button class="btn" id="buildEstimateDocsTop">Excel / PDF</button>
          <button class="btn btn-p" id="sendEstimateTop">Odeslat klientovi</button>
        </div>
      </div>

      <div class="stage-bar" id="stageBar"></div>

      <div class="ctrl" id="ctrlPanel"></div>

      <div class="tabs">
        <button class="mtab active" data-m="prehled">Přehled</button>
        <button class="mtab" data-m="komunikace">Komunikace</button>
        <button class="mtab" data-m="poznamky">📝 Poznámky</button>
        <button class="mtab" data-m="dokumenty">Dokumenty</button>
        <button class="mtab" data-m="finance">Finance</button>
        <button class="mtab" data-m="realizace">Realizace</button>
      </div>

      <div class="module show" id="m-prehled"></div>
      <div class="module" id="m-komunikace"></div>
      <div class="module" id="m-poznamky"></div>
      <div class="module" id="m-dokumenty"></div>
      <div class="module" id="m-finance"></div>
      <div class="module" id="m-realizace"></div>
    </div>

    <script>
      // base, api, crmToken, apiFetch, uploadFile, esc, fmt, fmtFull, fmtMoney, j — from crm-utils.js
      const params = new URLSearchParams(location.search)
      const jobId = Number(params.get('jobId') || 0)

      const STAGES = ['nova_poptavka','podklady','zpracovani_nabidky','nabidka_odeslana','schvaleni_objednavka','zaloha_priprava','realizace','predani_fakturace','dokonceno']
      const SL = {nova_poptavka:'Nová poptávka',podklady:'Podklady od klienta',zpracovani_nabidky:'Zpracování nabídky',nabidka_odeslana:'Nabídka odeslána',schvaleni_objednavka:'Schválení / objednávka',zaloha_priprava:'Záloha / příprava',realizace:'Realizace zakázky',predani_fakturace:'Předání / fakturace',dokonceno:'Dokončeno / uzavřeno'}
      const WAITING = {client:'Klient',internal_sales:'Obchodník',accountant:'Účetní',realization_team:'Realizace',signature:'Podpis',payment:'Platba',none:'Nikdo'}
      const BLOCKING = {missing_form:'Chybí formulář',waiting_offer_response:'Bez reakce na nabídku',waiting_signature:'Čeká na podpis',waiting_advance_payment:'Čeká na zálohu',missing_contract:'Chybí objednávka',missing_material:'Chybí materiál',missing_protocol:'Chybí protokol',overdue_invoice:'Faktura po splatnosti',none:'Bez blokace'}
      const UI_TEXT = {
        cs: {
          backPipeline: '← Pipeline',
          moveBtn: 'Změnit etapu',
          goEstimate: 'Otevřít kalkulaci',
          buildDocs: 'Excel / PDF',
          sendClient: 'Odeslat klientovi',
          tabs: ['Přehled','Komunikace','Dokumenty','Finance','Realizace'],
          moved: 'Etapa byla změněna',
          moveError: 'Etapu se nepodařilo změnit' },
        uk: {
          backPipeline: '← До pipeline',
          moveBtn: 'Змінити етап',
          goEstimate: 'Відкрити кошторис',
          buildDocs: 'Excel / PDF',
          sendClient: 'Надіслати клієнту',
          tabs: ['Огляд','Комунікація','Документи','Фінанси','Реалізація'],
          moved: 'Етап змінено',
          moveError: 'Не вдалося змінити етап' } }

      let data = null
      let activeEstimate = null
      let uiLang = localStorage.getItem('crmUiLang') || 'cs'

      function applyUiLang() {
        const t = UI_TEXT[uiLang] || UI_TEXT.cs
        document.querySelectorAll('.lang-btn').forEach((btn) => btn.classList.toggle('active', btn.getAttribute('data-lang') === uiLang))
        document.getElementById('backPipeline').textContent = t.backPipeline
        document.getElementById('goEstimate').textContent = t.goEstimate
        document.getElementById('buildEstimateDocsTop').textContent = t.buildDocs
        document.getElementById('sendEstimateTop').textContent = t.sendClient
        // Update only data-m tabs that match i18n labels (skip Poznámky tab which is always cs/icon)
        const tabBtns = document.querySelectorAll('.mtab[data-m]')
        const tabKeys = ['prehled','komunikace','dokumenty','finance','realizace']
        tabBtns.forEach(btn => {
          const m = btn.getAttribute('data-m')
          const idx = tabKeys.indexOf(m)
          if (idx >= 0 && t.tabs[idx]) btn.textContent = t.tabs[idx]
        })
      }

      document.querySelectorAll('.mtab').forEach(b => {
        b.addEventListener('click', () => {
          document.querySelectorAll('.mtab').forEach(x => x.classList.remove('active')); b.classList.add('active')
          document.querySelectorAll('.module').forEach(m => m.classList.remove('show'))
          const m = b.getAttribute('data-m')
          document.getElementById(`m-${m}`)?.classList.add('show')
          if (m === 'poznamky') renderPoznamky()
        })
      })

      function renderStageBar(stage) {
        const idx = STAGES.indexOf(stage)
        document.getElementById('stageBar').innerHTML = STAGES.map((s, i) => {
          const cls = i < idx ? 'done' : i === idx ? 'current' : 'future'
          return `<div class="stage-step ${cls}">${esc(SL[s] || s)}</div>`
        }).join('')
      }

      function renderCtrl(job) {
        const items = [
          { k: 'Pipeline stage', v: SL[job.pipelineStage || job.stage] || job.pipelineStage || job.stage, cls: 'blue' },
          { k: 'Čekáme na', v: WAITING[job.waitingFor] || job.waitingFor || 'Nikdo', cls: job.waitingFor && job.waitingFor !== 'none' ? 'orange' : 'green' },
          { k: 'Blokující faktor', v: BLOCKING[job.computedBlocking || job.blockingFactor] || job.computedBlocking || job.blockingFactor || 'Bez blokace', cls: (job.computedBlocking || job.blockingFactor) && (job.computedBlocking || job.blockingFactor) !== 'none' ? 'red' : 'green' },
          { k: 'Riziko', v: job.computedRisk === 'none' ? 'Bez rizika' : job.computedRisk === 'approaching' ? 'Blíží se termín' : job.computedRisk === 'overdue' ? 'Po termínu' : 'Faktura po splatnosti', cls: job.computedRisk === 'none' ? 'green' : 'red' },
          { k: 'Další krok', v: job.nextAction || '—', cls: 'purple' },
          { k: 'Termín další akce', v: job.nextActionDueAt ? fmtFull(job.nextActionDueAt) : '—', cls: 'blue' },
        ]
        document.getElementById('ctrlPanel').innerHTML = items.map(x => `<div class="ctrl-card ${x.cls}"><div class="k">${esc(x.k)}</div><div class="v">${esc(x.v)}</div></div>`).join('')
      }

      function renderPrehled(job, customer, lead) {
        const c = customer || {}
        const brief = lead?.brief || {}
        const isFirma = c.clientType === 'firma' || !!c.ico
        const typeBadge = isFirma
          ? `<span class="badge b-blue" style="margin-left:8px">Firma</span>`
          : `<span class="badge b-green" style="margin-left:8px">Fyzická osoba</span>`

        const contactFields = [
          ['Jméno / Název', c.name || c.companyName || '—'],
          ['Email', c.email || '—'],
          ['Telefon', c.phone || '—'],
          ['Adresa / Sídlo', c.address || '—'],
        ].filter(([,v]) => v && v !== '—')

        const icoBlock = isFirma ? `
          <div class="card-s" style="border-left:3px solid var(--blue)">
            <div class="card-s-t">Firemní údaje (IČO)
              ${c.ico ? `<button class="btn" id="fetchAresBtn" style="margin-left:auto;font-size:11px;padding:5px 12px">↻ Aktualizovat z ARES</button>` : ''}
            </div>
            <div class="meta-g">
              <div class="meta-i"><b>IČO</b><div class="val" style="font-size:18px;font-weight:800">${esc(c.ico || '—')}</div></div>
              <div class="meta-i"><b>DIČ</b><div class="val">${esc(c.dic || '—')}</div></div>
              <div class="meta-i"><b>Název firmy</b><div class="val">${esc(c.companyName || c.name || '—')}</div></div>
              <div class="meta-i"><b>Sídlo</b><div class="val">${esc(c.address || '—')}</div></div>
            </div>
          </div>` : ''

        const briefFields = []
        // Show client's initial inquiry comment (lead.comment or job.clientComment) as first item
        const clientInitComment = lead?.comment || job?.clientComment || ''
        if (clientInitComment) briefFields.push(['💬 Popis poptávky (klient)', clientInitComment])
        if (brief.objectType) briefFields.push(['Typ objektu', brief.objectType])
        if (brief.realizationAddress) briefFields.push(['Adresa realizace', brief.realizationAddress])
        if ((brief.requestTypes || []).length) briefFields.push(['Požadované práce', brief.requestTypes.join(', ')])
        if (brief.requestOther) briefFields.push(['Jiné práce', brief.requestOther])
        if (brief.scopeType) briefFields.push(['Rozsah zakázky', brief.scopeType])
        if (brief.area) briefFields.push(['Plocha / rozsah (m²)', brief.area])
        if (brief.budgetAmount) briefFields.push(['Orientační rozpočet', brief.budgetAmount])
        if (brief.requestedTerm) briefFields.push(['Požadovaný termín', brief.requestedTerm])
        if ((brief.documents || []).length) briefFields.push(['Podklady k dispozici', brief.documents.join(', ')])
        if ((brief.sourceChannels || []).length) briefFields.push(['Jak nás našli', brief.sourceChannels.join(', ')])
        if (brief.sourceOther) briefFields.push(['Zdroj (jiné)', brief.sourceOther])
        if (brief.note) briefFields.push(['Poznámka z formuláře', brief.note])

        const jobFields = [
          ['Typ zakázky', job.jobType === 'elektro' ? 'Elektro' : job.jobType === 'stavebni' ? 'Stavební' : 'Kombinovaná'],
          ['Priorita', job.priority || 'normal'],
          ['Odpovědná osoba', job.responsiblePerson || '—'],
          ['Datum přijetí', fmt(job.receivedAt)],
          ['Plánované zahájení', job.plannedStart ? fmt(job.plannedStart) : '—'],
          ['Plánované dokončení', job.plannedEnd ? fmt(job.plannedEnd) : '—'],
          ['Poslední kontakt', job.lastClientContactAt ? fmtFull(job.lastClientContactAt) : '—'],
        ].filter(([,v]) => v && v !== '—')

        document.getElementById('m-prehled').innerHTML = `
          <div class="card-s">
            <div class="card-s-t">Klient ${typeBadge}</div>
            <div class="meta-g">${contactFields.map(([k,v]) => `<div class="meta-i"><b>${esc(k)}</b><div class="val">${esc(v)}</div></div>`).join('')}</div>
          </div>
          ${icoBlock}
          ${briefFields.length ? `
          <div class="card-s">
            <div class="card-s-t">Formulář klienta — plné údaje</div>
            <div class="meta-g">${briefFields.map(([k,v]) => `<div class="meta-i"><b>${esc(k)}</b><div class="val">${esc(v)}</div></div>`).join('')}</div>
          </div>` : ''}
          <div class="card-s">
            <div class="card-s-t">Informace o zakázce</div>
            <div class="meta-g">${jobFields.map(([k,v]) => `<div class="meta-i"><b>${esc(k)}</b><div class="val">${esc(v)}</div></div>`).join('')}</div>
            <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--b)">
              <div style="font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Číslo zakázky — změnit</div>
              <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                <input id="editJobNum" style="background:var(--c);border:1px solid var(--b2);border-radius:var(--r);color:var(--ink);padding:8px 12px;font:inherit;font-size:14px;max-width:280px;outline:none" value="${esc(job.internalNumber || '')}" placeholder="Číslo zakázky" />
                <button class="btn btn-p" id="saveJobNum">Uložit číslo</button>
              </div>
            </div>
          </div>
          ${brief.summaryText ? `<div class="card-s"><div class="card-s-t">AI shrnutí formuláře</div><div style="font-size:12px;color:var(--ink3);line-height:1.65;white-space:pre-wrap">${esc(brief.summaryText)}</div></div>` : ''}
        `

        // ── Save job number ─────────────────────────────────────────
        document.getElementById('saveJobNum')?.addEventListener('click', async () => {
          const newNum = document.getElementById('editJobNum').value.trim()
          if (!newNum) return
          const r = await apiFetch(api(`/api/crm/jobs/${jobId}`), { method: 'PATCH', body: JSON.stringify({ internalNumber: newNum }) })
          if (r.ok) { document.getElementById('jobNum').textContent = newNum; alert('Číslo zakázky uloženo: ' + newNum) }
          else alert('Nepodařilo se uložit číslo zakázky')
        })
        document.getElementById('fetchAresBtn')?.addEventListener('click', async () => {
          const ico = c.ico; if (!ico) return
          const r = await apiFetch(api(`/api/ares?ico=${encodeURIComponent(ico)}`))
          const d = await j(r)
          if (!r.ok || !d?.ok) { alert('ARES: firma nenalezena nebo služba nedostupná'); return }
          alert(`ARES: ${d.companyName || ''}\n${d.address || ''}`)
          loadJob()
        })
      }

      async function renderKomunikace(events) {
        const el = document.getElementById('m-komunikace')
        let emails = []
        try {
          const er = await apiFetch(api(`/api/crm/jobs/${jobId}/emails`))
          const ed = await er.json()
          if (er.ok && ed?.ok) emails = ed.emails || []
        } catch {}

        // Merge all messages into a single unified timeline
        const EV_ICONS = { note:'📝', stage_change:'🔄', email_sent:'✉️', document_added:'📄', brief_received:'📋', finance_update:'💰', inbound_email_linked:'📨', whatsapp_sent:'📱' }
        const timeline = []
        for (const em of emails) {
          timeline.push({ _type: 'email', at: em.sentAt || em.createdAt, direction: em.direction || 'outbound', subject: em.subject, from: em.fromAddr, to: em.toAddr, body: em.body, status: em.status, attachments: em.attachments || [] })
        }
        for (const ev of events) {
          timeline.push({ _type: 'event', at: ev.createdAt, eventType: ev.eventType, title: ev.title, message: ev.message, description: ev.description, actor: ev.actor, metadata: ev.metadata })
        }
        timeline.sort((a, b) => new Date(a.at) - new Date(b.at))

        function dayLabel(iso) {
          if (!iso) return ''
          const d = new Date(iso)
          const today = new Date(); const yesterday = new Date(today - 86400000)
          if (d.toDateString() === today.toDateString()) return 'Dnes'
          if (d.toDateString() === yesterday.toDateString()) return 'Včera'
          return d.toLocaleDateString('cs-CZ', { day:'numeric', month:'long', year:'numeric' })
        }
        function timeLabel(iso) {
          if (!iso) return ''
          return new Date(iso).toLocaleTimeString('cs-CZ', { hour:'2-digit', minute:'2-digit' })
        }

        // Keep only real communication — no notes, no stage changes, no standalone doc uploads
        const KOMM_SYS_SKIP = new Set(['stage_change','brief_received','finance_update','note','document_added','email_sent'])
        const kommTimeline = timeline.filter(item => {
          if (item._type === 'email') return true
          if (KOMM_SYS_SKIP.has(item.eventType)) return false
          return true
        })

        let lastDay = ''
        let html = `<div class="komm-wrap" id="kommScroll">`
        for (const item of kommTimeline) {
          const day = dayLabel(item.at)
          if (day !== lastDay) {
            html += `<div class="komm-day">${esc(day)}</div>`
            lastDay = day
          }
          const t = timeLabel(item.at)

          if (item._type === 'email') {
            const isIn = item.direction === 'inbound'
            const side = isIn ? 'in' : 'out'
            const icon = isIn ? '📨' : '📤'
            const addrLabel = isIn ? `Od: ${esc(item.from||'?')}` : `Komu: ${esc(item.to||'?')}`
            const bodyTrunc = item.body ? item.body.slice(0, 500) : ''
            const hasMore = item.body && item.body.length > 500
            const uid = 'em' + Math.random().toString(36).slice(2)
            const statusBadge = isIn
              ? `<span class="badge b-green" style="padding:1px 6px;font-size:9px">📨 Příchozí</span>`
              : `<span class="badge b-blue" style="padding:1px 6px;font-size:9px">📤 Odesláno</span>`
            // Attachments — from server-stored raw_payload or email_sent event metadata
            const attachList = Array.isArray(item.attachments) ? item.attachments : []
            const attachHtml = attachList.length ? `<div class="komm-attach" style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08)">${
              attachList.map(a => {
                const url = a.url ? api(a.url) : '#'
                return `<a href="${url}" target="_blank" class="komm-attach-item">📎 ${esc(a.filename||'soubor')}</a>`
              }).join('')
            }</div>` : ''
            html += `<div class="komm-msg ${side}" style="max-width:90%">
              <div class="komm-avatar" style="background:${isIn?'rgba(20,201,138,.18)':'rgba(26,106,232,.18)'}">${icon}</div>
              <div style="min-width:0;flex:1">
                <div class="komm-bubble ${side}" style="max-width:100%">
                  <div class="komm-subj">✉️ ${esc(item.subject||'(bez předmětu)')}</div>
                  <div style="font-size:11px;color:var(--ink3);margin-bottom:8px">${addrLabel}</div>
                  ${bodyTrunc ? `<div class="komm-body" id="${uid}">${esc(bodyTrunc)}</div>${hasMore ? `<span class="komm-expand" onclick="document.getElementById('${uid}').style.cssText='white-space:pre-wrap';this.style.display='none'">Zobrazit celý email ▾</span>` : ''}` : '<span style="font-size:12px;color:var(--ink3)">(prázdný obsah)</span>'}
                  ${attachHtml}
                </div>
                <div class="komm-meta">${esc(t)} · ${statusBadge}</div>
              </div>
            </div>`
          } else {
            const evType = item.eventType || ''
            const isWa  = evType === 'whatsapp_sent'
            const isDoc = evType === 'document_added'
            const isCall = evType === 'call'
            const isMeet = evType === 'meeting'
            const actorShort = item.actor ? item.actor.split('@')[0] : ''

            if (isCall || isMeet) {
              const msgText = item.message || item.description || ''
              const attachments = item.metadata?.attachments || []
              const attachHtml = attachments.map(a => {
                const ext = (a.filename||'').split('.').pop().toLowerCase()
                const isImg = ['jpg','jpeg','png','gif','webp'].includes(ext)
                const url = a.url ? api(a.url) : '#'
                return isImg
                  ? `<a href="${url}" target="_blank" style="display:block;margin-top:8px"><img src="${url}" style="max-width:240px;border-radius:10px;display:block" /></a>`
                  : `<a href="${url}" target="_blank" class="komm-attach-item" style="margin-top:8px;display:inline-flex">📎 ${esc(a.filename||'soubor')}</a>`
              }).join('')

              if (isMeet) {
                // Meeting — show with label
                html += `<div class="komm-msg out" style="max-width:75%">
                  <div class="komm-avatar" style="background:rgba(122,94,232,.15)">🤝</div>
                  <div style="min-width:0;flex:1">
                    <div class="komm-bubble meet-bubble">
                      <div class="komm-ev-header" style="color:#B89CFF">🤝 Schůzka</div>
                      ${msgText ? `<div class="komm-ev-text">${esc(msgText)}</div>` : ''}
                      ${attachHtml}
                    </div>
                    <div class="komm-meta">${esc(t)}${actorShort ? ' · ' + esc(actorShort) : ''}</div>
                  </div>
                </div>`
              } else {
                // Call / plain message — simple bubble, no label
                html += `<div class="komm-msg out" style="max-width:78%">
                  <div style="min-width:0;flex:1">
                    <div class="komm-bubble out">
                      ${msgText ? `<div style="white-space:pre-wrap;line-height:1.6">${esc(msgText)}</div>` : ''}
                      ${attachHtml}
                    </div>
                    <div class="komm-meta">${esc(t)}${actorShort ? ' · ' + esc(actorShort) : ''}</div>
                  </div>
                </div>`
              }
            } else if (isWa) {
              html += `<div class="komm-msg sys">
                <div class="komm-bubble wa" style="max-width:420px">
                  <div style="font-size:11px;font-weight:700;color:rgba(37,211,102,.8);margin-bottom:5px">📱 WhatsApp → Tým</div>
                  <div style="font-size:14px;line-height:1.55">${esc(item.message||item.title)}</div>
                </div>
                <div class="komm-meta" style="justify-content:center">${esc(t)}${actorShort ? ' · '+esc(actorShort) : ' · systém'}</div>
              </div>`
            } else if (isDoc) {
              html += `<div class="komm-msg sys">
                <div class="komm-bubble doc" style="max-width:360px">
                  <div style="font-size:11px;font-weight:700;color:rgba(96,165,255,.8);margin-bottom:4px">📄 Dokument</div>
                  <div style="font-size:14px">${esc(item.title)}</div>
                </div>
                <div class="komm-meta" style="justify-content:center">${esc(t)}</div>
              </div>`
            } else if (evType === 'inbound_email_linked') {
              // handled as email in timeline usually, but fallback
              html += `<div class="komm-msg sys">
                <div class="komm-bubble sys-bubble">📨 ${esc(item.title)}</div>
                <div class="komm-meta" style="justify-content:center">${esc(t)}</div>
              </div>`
            } else {
              // Unknown/other — skip or show minimal
            }
          }
        }
        if (!kommTimeline.length) {
          html += `<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--ink2);font-size:13px;padding:40px">Žádná komunikace zatím</div>`
        }
        html += `</div>`

        // Input — dead simple: textarea + clip + send
        const clientEmailPrefill = data?.customer?.email || data?.lead?.email || ''
        const jobNumPrefill = data?.job?.internalNumber || ''
        html += `<div class="komm-input-area">
          <div class="komm-attach-chips" id="compFilesList"></div>
          <div class="komm-input-shell">
            <textarea id="kommText" placeholder="Napište zprávu…" onkeydown="if(event.ctrlKey&&event.key==='Enter'){document.getElementById('kommSend').click()}"></textarea>
            <label class="komm-clip-btn" title="Přiložit soubor">
              <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              <input type="file" id="compFiles" multiple accept="*/*" style="display:none" />
            </label>
            <button class="komm-send-btn" id="kommSend" title="Odeslat">
              <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
          </div>
        </div>`

        el.innerHTML = html

        // Scroll to bottom
        const scroll = document.getElementById('kommScroll')
        if (scroll) scroll.scrollTop = scroll.scrollHeight

        // Email always exists — every client enters CRM with email
        const clientEmail = data?.customer?.email || data?.lead?.email || ''
        const jobNum = data?.job?.internalNumber || ''
        const sendBtn = document.getElementById('kommSend')

        document.getElementById('compFiles')?.addEventListener('change', () => {
          const files = document.getElementById('compFiles').files
          const list  = document.getElementById('compFilesList')
          list.innerHTML = Array.from(files).map(f => `<span class="komm-attach-item">📎 ${esc(f.name)}</span>`).join('')
        })

        sendBtn?.addEventListener('click', async () => {
          const text = document.getElementById('kommText').value.trim()
          const filesInput = document.getElementById('compFiles')
          if (!text && !filesInput?.files?.length) return

          const origSvg = sendBtn.innerHTML
          sendBtn.disabled = true
          sendBtn.innerHTML = '<span style="font-size:10px;color:#fff">⏳</span>'

          // Upload attachments first
          let attachments = []
          if (filesInput?.files?.length) {
            for (const file of filesInput.files) {
              const ud = await uploadFile(jobId, file)
              if (ud.ok) attachments.push({ filename: ud.filename, url: ud.url })
            }
          }

          const msgText = text || attachments.map(a => a.filename).join(', ')
          const subject = jobNum ? `Zakázka ${jobNum} — zpráva od manažera` : 'Zpráva od manažera'

          const r = await apiFetch(api(`/api/crm/jobs/${jobId}/emails`), {
            method: 'POST',
            body: JSON.stringify({ to: clientEmail, subject, text: msgText, attachments })
          })
          const d = await r.json().catch(() => null)
          if (!r.ok || !d?.ok) {
            alert('Chyba: ' + (d?.error || d?.details || 'neznámá chyba'))
          }

          document.getElementById('kommText').value = ''
          if (filesInput) { filesInput.value = ''; document.getElementById('compFilesList').innerHTML = '' }
          sendBtn.disabled = false
          sendBtn.innerHTML = origSvg
          loadJob()
        })
      }

      function estimateFileUrl(id, kind) {
        return api(`/api/crm/estimates/${id}/file/${kind}`)
      }

      async function ensureEstimateForJob() {
        if (activeEstimate?.id) return activeEstimate
        const r = await apiFetch(api(`/api/crm/estimates/from-job`), { method: 'POST', body: JSON.stringify({ jobId }) })
        const d = await j(r)
        if (!r.ok || !d?.ok) throw new Error(d?.error || 'Nelze vytvořit rozpočet')
        activeEstimate = d.estimate
        return activeEstimate
      }

      async function buildEstimateDocs() {
        const estimate = await ensureEstimateForJob()
        const r = await apiFetch(api(`/api/crm/estimates/${estimate.id}/build-documents`), { method: 'POST', body: JSON.stringify({}) })
        const d = await j(r)
        if (!r.ok || !d?.ok) throw new Error(d?.error || 'Nelze vygenerovat dokumenty')
        alert(d?.pdf?.ok ? 'Excel i PDF byly vygenerovány' : 'Excel byl vygenerován, ale PDF se nepodařilo vytvořit')
        await loadJob()
      }

      async function sendEstimateToClient() {
        const estimate = await ensureEstimateForJob()
        const email = (document.getElementById('estimateEmail')?.value || data?.customer?.email || '').trim()
        const subject = (document.getElementById('estimateSubject')?.value || '').trim()
        const text = (document.getElementById('estimateText')?.value || '').trim()
        const r = await apiFetch(api(`/api/crm/estimates/${estimate.id}/send-to-client`), {
          method: 'POST',
          body: JSON.stringify({ email, subject, text }) })
        const d = await j(r)
        if (!r.ok || !d?.ok) throw new Error(d?.error || 'Nelze odeslat email')
        alert(`Rozpočet byl odeslán na ${email}`)
        await loadJob()
      }

                  <input id="fileUploadInput" type="file" style="background:var(--c);border:1px solid var(--b2);border-radius:8px;color:var(--ink);padding:8px;font-size:12px;cursor:pointer" />
                </label>
                <label style="flex:1;min-width:140px;display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--ink2)">

                  <select id="docTypeUpload" style="background:var(--c);border:1px solid var(--b2);border-radius:8px;color:var(--ink);padding:10px;font:inherit">

        document.getElementById('uploadFileBtn')?.addEventListener('click', async () => {

          const btn = document.getElementById('uploadFileBtn')
          const prog = document.getElementById('uploadProgress')
          btn.disabled = true; btn.textContent = 'Nahrávám...'
          prog.style.display = 'block'; prog.textContent = `Nahrávám ${file.name} (${Math.round(file.size/1024)} kB)...`
          try {
            const fd = new FormData()
            fd.append('file', file)
            fd.append('documentType', document.getElementById('docTypeUpload').value)

        })
        document.getElementById('sendEstimateBtn')?.addEventListener('click', async () => {
          try { await sendEstimateToClient() } catch (e) { alert(String(e?.message || e)) }

      async function loadJob() {
        if (!jobId) { document.getElementById('jobTitle').textContent = 'jobId chybí'; return }
        const [r, er] = await Promise.all([
          apiFetch(api(`/api/crm/jobs/${jobId}`)),
          apiFetch(api(`/api/crm/estimates?jobId=${jobId}`)),
        ])
        const d = await j(r)
        const ed = await j(er)
        if (!r.ok || !d?.ok) { document.getElementById('jobTitle').textContent = 'Chyba načítání'; return }
        data = d
        window._jobData = d
        d.estimates = er.ok && ed?.ok ? (ed.estimates || []) : []
        const job = d.job; const customer = d.customer; const lead = d.lead
        document.getElementById('jobNum').textContent = job.internalNumber || '—'
        document.getElementById('jobTitle').textContent = job.title || 'Zakázka'
        document.getElementById('jobSub').textContent = `${customer?.name || '—'} · ${SL[job.stage] || job.stage} · Priorita: ${job.priority}`
        document.getElementById('goEstimate').href = `./estimate-builder.html?jobId=${job.id}`
        // Update "Další etapa" button label
        const nextIdx = STAGES.indexOf(job.pipelineStage || job.stage) + 1
        const moveBtn = document.getElementById('moveBtn')
        if (moveBtn) {
          if (nextIdx > 0 && nextIdx < STAGES.length) {
            moveBtn.textContent = `→ ${SL[STAGES[nextIdx]]}`
            moveBtn.disabled = false
          } else {
            moveBtn.textContent = '✅ Hotovo'
            moveBtn.disabled = true
          }
        }
        renderStageBar(job.stage)
        renderCtrl(job)
        try { renderPrehled(job, customer, lead) } catch(e) { document.getElementById('m-prehled').innerHTML = `<div class="card-s"><div style="color:var(--red);padding:16px">Chyba renderPrehled: ${esc(String(e?.message||e))}</div></div>` }
        // Archive header button: show only when NOT yet in dokonceno
        const archHdrBtn = document.getElementById('archiveHdrBtn')
        if (archHdrBtn) {
          const isArchived = (job.pipelineStage || job.stage) === 'dokonceno'
          archHdrBtn.style.display = isArchived ? 'none' : ''
          archHdrBtn.textContent = isArchived ? '✅ V archivu' : '📦 Archivovat'
          archHdrBtn.onclick = isArchived ? null : async () => {
            if (!await crmConfirm('Zakázka bude označena jako dokončená a přesunuta do archivu.', { title: 'Archivovat zakázku?', okLabel: 'Archivovat', danger: true })) return
            archHdrBtn.disabled = true; archHdrBtn.textContent = '⏳...'
            try {
              const rr = await apiFetch(api(`/api/crm/jobs/${jobId}/move`), { method: 'POST', body: JSON.stringify({ stage: 'dokonceno', note: 'Zakázka uzavřena a přesunuta do archivu.' }) })
              const dd = await rr.json()
              if (!rr.ok || !dd?.ok) throw new Error(dd?.error || 'Chyba')
              loadJob()
            } catch (e) {
              alert('Chyba: ' + String(e?.message || e))
              archHdrBtn.disabled = false; archHdrBtn.textContent = '📦 Archivovat'
            }
          }
        }
        // Fetch events separately to ensure we always have up-to-date events
        let jobEvents = d.events || []
        try {
          const evR = await apiFetch(api(`/api/crm/jobs/${jobId}/events`))
          const evD = await evR.json()
          if (evR.ok && evD?.ok) jobEvents = evD.events || []
        } catch {}
        await renderKomunikace(jobEvents)
        renderDokumenty(d.documents || [], d.estimates || [], customer, job)

        renderRealizace(job, d.tasks || [])
      }

      async function renderPoznamky() {
        const el = document.getElementById('m-poznamky')
        if (!el) return
        el.innerHTML = '<div class="loading">Načítám…</div>'
        try {
          const r = await apiFetch(api(`/api/crm/jobs/${jobId}/events`))
          const d = await r.json()
          const notes = (d?.events || []).filter(e => e.eventType === 'note' || e.eventCode === 'manager_note')
          const job = window._jobData?.job
          const currentStage = job?.pipelineStage || job?.stage || ''

          // Helper: format date like iPhone Notes (e.g. "Dnes 14:32" or "19. 3. · 14:32")
          function fmtNoteDate(iso) {
            if (!iso) return ''
            const d = new Date(iso)
            const now = new Date()
            const isToday = d.toDateString() === now.toDateString()
            const yesterday = new Date(now); yesterday.setDate(now.getDate()-1)
            const isYesterday = d.toDateString() === yesterday.toDateString()
            const timeStr = d.toLocaleTimeString('cs-CZ', { hour:'2-digit', minute:'2-digit' })
            if (isToday) return { main: 'Dnes', sub: timeStr }
            if (isYesterday) return { main: 'Včera', sub: timeStr }
            return { main: d.toLocaleDateString('cs-CZ', { day:'numeric', month:'long' }), sub: `${d.toLocaleDateString('cs-CZ',{year:'numeric'})} · ${timeStr}` }
          }

          function initials(name) {
            if (!name) return '?'
            return name.split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase()
          }

          const sorted = [...notes].sort((a,b) => new Date(b.createdAt||0) - new Date(a.createdAt||0))

          let noteCards = ''
          if (!sorted.length) {
            noteCards = `<div class="poz-empty">
              <div style="font-size:32px;margin-bottom:12px">📝</div>
              <div style="font-weight:700;margin-bottom:6px;color:var(--ink)">Zatím žádné poznámky</div>
              <div style="font-size:13px">Napište první poznámku k této zakázce</div>
            </div>`
          } else {
            noteCards = sorted.map((ev, idx) => {
              const dt = fmtNoteDate(ev.createdAt)
              const text = ev.message || ev.description || ev.title || ''
              const stageLabel = ev.metadata?.stage ? (SL[ev.metadata.stage] || ev.metadata.stage) : ''
              const evIdSafe = ev.id ?? ''
              return `<div class="poz-note" data-ev-id="${evIdSafe}">
                <div class="poz-note-header">
                  <div class="poz-note-meta">
                    <div class="poz-note-date">${esc(dt.main)}${stageLabel ? ' · 📌 ' + esc(stageLabel) : ''}</div>
                    <div class="poz-note-time">${esc(dt.sub)}</div>
                  </div>
                  <div class="poz-note-right">
                    <div class="poz-note-actions">
                      <button class="poz-note-edit" title="Upravit" data-edit-ev="${evIdSafe}">✏️</button>
                      <button class="poz-note-del" title="Smazat" data-del-ev="${evIdSafe}">✕</button>
                    </div>
                    <div class="poz-note-author">
                      <div class="poz-note-avatar">${esc(initials(ev.actor || 'M'))}</div>
                      <span>${esc((ev.actor||'Manažer').split('@')[0])}</span>
                    </div>
                  </div>
                </div>
                <div class="poz-note-text">${esc(text)}</div>
                <div class="poz-edit-area">
                  <textarea class="poz-edit-input">${esc(text)}</textarea>
                  <div class="poz-edit-btns">
                    <button class="poz-edit-cancel">Zrušit</button>
                    <button class="poz-edit-save" data-save-ev="${evIdSafe}">✓ Uložit</button>
                  </div>
                </div>
              </div>`
            }).join('')
          }

          el.innerHTML = `
            <div class="poz-shell">
              <div class="poz-compose">
                <div class="poz-compose-top">
                  <div class="poz-compose-icon">📝</div>
                  <div>
                    <div class="poz-compose-label">Nová poznámka</div>
                    <div class="poz-compose-sub">Zakázka: ${esc(job?.internalNumber || '#'+jobId)}</div>
                  </div>
                </div>
                <textarea id="pozNoteInput" placeholder="Co se řešilo, co se dohodlo, co je potřeba udělat…" rows="3"></textarea>
                <div class="poz-compose-footer">
                  <span id="pozSaveMsg" style="font-size:12px;color:var(--green);display:none;align-self:center">✓ Uloženo</span>
                  <button class="btn btn-p" id="pozNoteSave" style="gap:7px">💾 Uložit poznámku</button>
                </div>
              </div>
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
                <div style="font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px">Uložené poznámky · ${sorted.length}</div>
              </div>
              <div class="poz-list">${noteCards}</div>
            </div>`

          // Save note — read stage dynamically so it's always current
          document.getElementById('pozNoteSave')?.addEventListener('click', async () => {
            const ta = document.getElementById('pozNoteInput')
            const text = ta.value.trim()
            if (!text) { ta.focus(); return }
            const btn = document.getElementById('pozNoteSave')
            btn.disabled = true; btn.innerHTML = '⏳ Ukládám…'
            const liveStage = window._jobData?.job?.pipelineStage || window._jobData?.job?.stage || currentStage
            await apiFetch(api(`/api/crm/jobs/${jobId}/events`), {
              method: 'POST',
              body: JSON.stringify({ eventType: 'note', title: 'Poznámka manažera', message: text, description: text, metadata: { stage: liveStage } })
            })
            await renderPoznamky()
          })

          // Delete note
          el.querySelectorAll('[data-del-ev]').forEach(btn => {
            btn.addEventListener('click', async (e) => {
              e.stopPropagation()
              if (!await crmConfirm('Tuto poznámku nelze obnovit.', { title: 'Smazat poznámku?', okLabel: 'Smazat', danger: true })) return
              const evId = btn.getAttribute('data-del-ev')
              if (!evId || evId === 'undefined') return
              await apiFetch(api(`/api/crm/jobs/${jobId}/events/${evId}`), { method: 'DELETE' })
              await renderPoznamky()
            })
          })

          // Edit note — enter inline edit mode
          el.querySelectorAll('[data-edit-ev]').forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.stopPropagation()
              const card = btn.closest('.poz-note')
              if (!card) return
              card.classList.add('editing')
              const ta = card.querySelector('.poz-edit-input')
              if (ta) { ta.focus(); ta.select() }
            })
          })

          // Edit cancel
          el.querySelectorAll('.poz-edit-cancel').forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.stopPropagation()
              btn.closest('.poz-note')?.classList.remove('editing')
            })
          })

          // Edit save
          el.querySelectorAll('[data-save-ev]').forEach(btn => {
            btn.addEventListener('click', async (e) => {
              e.stopPropagation()
              const card = btn.closest('.poz-note')
              const ta = card?.querySelector('.poz-edit-input')
              const newText = ta?.value.trim()
              if (!newText) return
              const evId = btn.getAttribute('data-save-ev')
              if (!evId || evId === 'undefined') return
              btn.disabled = true; btn.textContent = '⏳'
              await apiFetch(api(`/api/crm/jobs/${jobId}/events/${evId}`), {
                method: 'PATCH',
                body: JSON.stringify({ message: newText, description: newText })
              })
              await renderPoznamky()
            })
          })

        } catch(e) {
          el.innerHTML = `<div class="empty">Chyba: ${esc(String(e?.message||e))}</div>`
        }
      }

      // ── Auto-refresh ─────────────────────────────────────────────
      // Full page refresh every 5 minutes
      setInterval(loadJob, 5 * 60 * 1000)
      // Komunikace auto-poll every 30 seconds when that tab is active
      setInterval(async () => {
        const kommEl = document.getElementById('m-komunikace')
        if (kommEl && kommEl.classList.contains('show')) {
          try {
            const r = await apiFetch(api(`/api/crm/jobs/${jobId}/events`))
            const d = await r.json()
            if (r.ok && d?.ok) await renderKomunikace(d.events || [])
          } catch {}
        }
      }, 30 * 1000)

      applyUiLang()
      loadJob()

      // User display + logout
      ;(function(){
        try {
          const u = JSON.parse(localStorage.getItem('crmUser') || '{}')
          const roleMap = { owner: 'Vlastník', manager: 'Manažer', pm: 'Proj. manažer', viewer: 'Zobrazení' }
          document.getElementById('userName').textContent = u.name || u.email || '—'
          document.getElementById('userRole').textContent = roleMap[u.role] || u.role || '—'
          const initials = (u.name || u.email || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase()
          document.getElementById('userAvatar').textContent = initials
        } catch {}
      })()
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('crmToken'); localStorage.removeItem('crmUser')
        location.replace('./login.html')
      })
    </script>
  </body>
</html>
