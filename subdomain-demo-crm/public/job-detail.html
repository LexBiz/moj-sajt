<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>O&L Master Dom · Zakázka</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root{--bg:#020C18;--s:#071626;--s2:#091B30;--c:#0C1E38;--c2:#0F2442;--b:rgba(255,255,255,.06);--b2:rgba(255,255,255,.11);--b3:rgba(255,255,255,.18);--ink:#E6F0FF;--ink2:#7AA2C4;--ink3:#3D618A;--blue:#1A6AE8;--blue2:#3D87F8;--blue3:#60A5FF;--green:#14C98A;--orange:#E8921A;--red:#E83A3A;--purple:#7A5EE8;--r:10px;--r-md:14px;--r-lg:18px;--sh:0 8px 32px rgba(0,0,0,.45)}
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
      body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.55;background-image:radial-gradient(ellipse 160% 40% at 50% -4%,rgba(26,106,232,.12) 0%,transparent 55%)}
      .hdr{position:sticky;top:0;z-index:40;background:rgba(2,12,24,.94);border-bottom:1px solid var(--b2);backdrop-filter:blur(16px)}
      .hdr-in{max-width:1600px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:16px}
      .logo{display:flex;align-items:center;gap:10px}
      .logo-m{height:44px;min-width:44px;border-radius:10px;overflow:hidden;border:1px solid rgba(61,135,248,.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 10px rgba(26,106,232,.3);background:#0B1730}
      .logo-m img{height:44px;width:auto;max-width:160px;object-fit:contain;display:block}
      .logo-n{font-size:15px;font-weight:800;letter-spacing:-.3px}.logo-s{font-size:10px;color:var(--ink3);letter-spacing:.4px;text-transform:uppercase;margin-top:2px}
      .hdr-acts{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
      .lang-switch{display:flex;gap:6px;align-items:center;margin-right:4px}
      .lang-btn{border:1px solid var(--b2);background:var(--c);color:var(--ink2);padding:7px 10px;border-radius:999px;font:inherit;font-size:11px;font-weight:800;cursor:pointer}
      .lang-btn.active{background:rgba(26,106,232,.18);color:var(--blue3);border-color:rgba(61,135,248,.35)}
      .btn{border:1px solid var(--b2);border-radius:var(--r);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;padding:9px 16px;transition:all .15s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;background:var(--c);color:var(--ink);text-decoration:none}
      .btn:hover{background:var(--c2)}.btn-p{background:linear-gradient(135deg,#1A6AE8,#2D80F8);color:#fff;border:none;box-shadow:0 3px 14px rgba(26,106,232,.4)}.btn-p:hover{background:linear-gradient(135deg,#2070F0,#3A8CFF)}
      .badge{display:inline-flex;align-items:center;border-radius:999px;padding:3px 9px;font-size:10px;font-weight:700;letter-spacing:.2px;border:1px solid}
      .b-blue{color:#80B8F8;border-color:rgba(80,184,248,.25);background:rgba(80,184,248,.1)}.b-green{color:#50D8A0;border-color:rgba(80,216,160,.25);background:rgba(80,216,160,.1)}.b-orange{color:#F0A850;border-color:rgba(240,168,80,.25);background:rgba(240,168,80,.1)}.b-red{color:#F07070;border-color:rgba(240,112,112,.25);background:rgba(240,112,112,.1)}.b-purple{color:#A080F0;border-color:rgba(160,128,240,.25);background:rgba(160,128,240,.1)}.b-cyan{color:#60D8EC;border-color:rgba(96,216,236,.25);background:rgba(96,216,236,.1)}.b-grey{color:var(--ink2);border-color:var(--b2);background:rgba(255,255,255,.04)}
      .wrap{max-width:1600px;margin:0 auto;padding:24px 24px 60px}
      .job-top{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--b2)}
      .job-num{font-size:12px;color:var(--ink3);margin-bottom:4px;font-weight:600;letter-spacing:.4px}
      .job-title{font-size:24px;font-weight:800;letter-spacing:-.4px;margin-bottom:4px}
      .job-sub{font-size:13px;color:var(--ink2)}
      .job-actions{display:flex;gap:8px;flex-wrap:wrap}
      .ctrl{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px}
      .ctrl-card{background:var(--c);border:1px solid var(--b);border-top:2px solid transparent;border-radius:var(--r-md);padding:14px 16px;transition:all .15s}
      .ctrl-card:hover{border-color:var(--b2)}.ctrl-card .k{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}.ctrl-card .v{font-size:16px;font-weight:700}
      .ctrl-card.blue{border-top-color:var(--blue2)}.ctrl-card.blue .v{color:var(--blue3)}
      .ctrl-card.green{border-top-color:var(--green)}.ctrl-card.green .v{color:var(--green)}
      .ctrl-card.orange{border-top-color:var(--orange)}.ctrl-card.orange .v{color:var(--orange)}
      .ctrl-card.red{border-top-color:var(--red)}.ctrl-card.red .v{color:var(--red)}
      .stage-bar{display:flex;gap:0;margin-bottom:24px;overflow-x:auto}
      .stage-step{flex:1;min-width:0;padding:10px 8px;text-align:center;font-size:11px;font-weight:600;color:var(--ink3);border-bottom:3px solid var(--b);white-space:nowrap;transition:all .15s}
      .stage-step.done{color:var(--green);border-bottom-color:var(--green);background:rgba(20,201,138,.04)}
      .stage-step.current{color:var(--blue3);border-bottom-color:var(--blue);background:rgba(26,106,232,.06);font-weight:800}
      .stage-step.future{color:var(--ink3)}
      .tabs{display:flex;gap:0;border-bottom:1px solid var(--b);margin-bottom:20px}
      .mtab{border:none;background:transparent;color:var(--ink3);border-bottom:2px solid transparent;padding:11px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;margin-bottom:-1px}
      .mtab:hover{color:var(--ink2)}.mtab.active{color:var(--blue3);border-bottom-color:var(--blue)}
      .module{display:none}.module.show{display:block}
      .card-s{background:var(--s);border:1px solid var(--b2);border-radius:var(--r-lg);padding:20px;box-shadow:var(--sh);margin-bottom:16px}
      .card-s-t{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
      .card-s-t::before{content:'';width:3px;height:14px;border-radius:2px;background:var(--blue);flex-shrink:0}
      .meta-g{display:grid;grid-template-columns:1fr 1fr;gap:10px}
      .meta-i{background:var(--c);border:1px solid var(--b);border-radius:var(--r);padding:12px 14px;transition:border-color .15s}
      .meta-i:hover{border-color:var(--b2)}.meta-i b{display:block;color:var(--ink3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}.meta-i .val{font-size:14px;color:var(--ink);line-height:1.4}
      .ev-list{display:grid;gap:10px}.ev-item{display:grid;grid-template-columns:32px 1fr;gap:10px;align-items:start}
      .ev-dot{width:10px;height:10px;border-radius:50%;background:var(--blue);margin-top:4px;box-shadow:0 0 0 3px rgba(26,106,232,.14);justify-self:center}
      .ev-title{font-size:13px;font-weight:600}.ev-meta{font-size:12px;color:var(--ink2);margin-top:2px}
      .doc-list{display:grid;gap:8px}.doc-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--c);border:1px solid var(--b);border-radius:var(--r);padding:10px 14px}
      .doc-item-name{font-size:13px;font-weight:600}.doc-item-type{font-size:11px;color:var(--ink3)}
      .estimate-hero{background:linear-gradient(135deg,rgba(26,106,232,.18),rgba(10,27,48,.9));border:1px solid rgba(96,165,255,.24);border-radius:18px;padding:18px 20px;margin-bottom:16px;box-shadow:0 10px 34px rgba(0,0,0,.26)}
      .estimate-hero-top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap;margin-bottom:14px}
      .estimate-hero-title{font-size:18px;font-weight:800;letter-spacing:-.3px}
      .estimate-hero-sub{font-size:12px;color:#B7D2F1;margin-top:4px}
      .estimate-hero-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
      .estimate-box{background:rgba(7,22,38,.64);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 14px}
      .estimate-box b{display:block;font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
      .estimate-box .val{font-size:15px;font-weight:700}
      .estimate-actions{display:flex;gap:8px;flex-wrap:wrap}
      .inline-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
      .inline-form textarea,.inline-form input{background:rgba(7,22,38,.7);border:1px solid var(--b2);border-radius:10px;color:var(--ink);font-family:inherit;padding:10px 12px;font-size:13px;outline:none}
      .inline-form textarea{grid-column:1 / -1;min-height:96px;resize:vertical}
      .estimate-links{display:flex;gap:8px;flex-wrap:wrap}
      .fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
      .invoice-list{display:grid;gap:8px;margin-top:14px}
      .invoice-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--c);border:1px solid var(--b);border-radius:var(--r);padding:10px 14px}
      .fin-item{background:var(--c);border:1px solid var(--b);border-radius:var(--r);padding:12px 14px}
      .fin-item b{display:block;color:var(--ink3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
      .fin-item .val{font-size:16px;font-weight:700}
      .task-list{display:grid;gap:8px}.task-item{display:flex;align-items:center;gap:10px;background:var(--c);border:1px solid var(--b);border-radius:var(--r);padding:10px 14px}
      .task-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--b3);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:11px;color:transparent}
      .task-check.done{background:var(--green);border-color:var(--green);color:#fff}
      .task-title{font-size:13px;flex:1}.task-title.done{text-decoration:line-through;color:var(--ink3)}
      .task-due{font-size:11px;color:var(--ink3)}
      .empty{padding:24px;text-align:center;color:var(--ink2);border:1px dashed var(--b2);border-radius:var(--r-lg);font-size:13px}
      .loading{padding:32px;text-align:center;color:var(--ink2)}
      .add-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
      .add-row input,.add-row textarea{background:var(--c);border:1px solid var(--b2);border-radius:var(--r);color:var(--ink);font-family:inherit;padding:8px 12px;font-size:13px;outline:none;flex:1;min-width:200px}
      .add-row input:focus,.add-row textarea:focus{border-color:var(--blue2);box-shadow:0 0 0 2px rgba(26,106,232,.12)}
      select{background:var(--c);border:1px solid var(--b2);border-radius:var(--r);color:var(--ink);font-family:inherit;padding:8px 12px;font-size:13px;outline:none}
      .user-chip{display:flex;align-items:center;gap:8px;background:var(--c);border:1px solid var(--b2);border-radius:999px;padding:5px 12px 5px 8px;font-size:12px;font-weight:600}
      .user-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#1A6AE8,#14C98A);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
      .user-role{font-size:10px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
      .btn-logout{border:1px solid rgba(232,58,58,.25);background:rgba(232,58,58,.06);color:#F07070;border-radius:999px;padding:5px 12px;font:inherit;font-size:11px;font-weight:700;cursor:pointer}
      .btn-logout:hover{background:rgba(232,58,58,.14)}
      @media(max-width:1100px){.ctrl{grid-template-columns:repeat(3,1fr)}.meta-g,.fin-grid,.estimate-hero-grid,.inline-form{grid-template-columns:1fr}}
      @media(max-width:700px){.ctrl{grid-template-columns:1fr}.job-top{grid-template-columns:1fr}.wrap{padding-left:14px;padding-right:14px}}
    </style>
    <script>
      ;(function(){
        const tok = localStorage.getItem('crmToken')
        if (!tok) { location.replace('./login.html?next=' + encodeURIComponent(location.href)); return }
        try {
          const p = JSON.parse(atob(tok.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')))
          if (p.exp && Date.now() / 1000 > p.exp) { localStorage.removeItem('crmToken'); location.replace('./login.html?next=' + encodeURIComponent(location.href)) }
        } catch { localStorage.removeItem('crmToken'); location.replace('./login.html') }
      })()
    </script>
  </head>
  <body>
    <header class="hdr"><div class="hdr-in">
      <div class="logo"><div class="logo-m"><img src="./logo1.jpg" alt="O&L Master Dom logo" /></div><div><div class="logo-n">O&amp;L Master Dom</div><div class="logo-s">Detail zakázky</div></div></div>
      <div class="hdr-acts">
        <div class="lang-switch">
          <button class="lang-btn" data-lang="cs">CZ</button>
          <button class="lang-btn" data-lang="uk">UA</button>
        </div>
        <a class="btn" id="backPipeline" href="./index.html">← Pipeline</a>
        <select id="moveStage" style="min-width:180px;padding:8px 10px"></select>
        <button class="btn btn-p" id="moveBtn">Změnit etapu</button>
        <div class="user-chip">
          <div class="user-avatar" id="userAvatar">?</div>
          <div><div id="userName" style="line-height:1.2">—</div><div class="user-role" id="userRole">—</div></div>
        </div>
        <button class="btn-logout" id="logoutBtn">↩</button>
      </div>
    </div></header>

    <div class="wrap">
      <div class="job-top">
        <div>
          <div class="job-num" id="jobNum">—</div>
          <div class="job-title" id="jobTitle">Načítání...</div>
          <div class="job-sub" id="jobSub"></div>
        </div>
        <div class="job-actions">
          <a class="btn" id="goEstimate" href="./estimate-builder.html">Otevřít kalkulaci</a>
          <button class="btn" id="buildEstimateDocsTop">Excel / PDF</button>
          <button class="btn btn-p" id="sendEstimateTop">Odeslat klientovi</button>
        </div>
      </div>

      <div class="stage-bar" id="stageBar"></div>

      <div class="ctrl" id="ctrlPanel"></div>

      <div class="tabs">
        <button class="mtab active" data-m="prehled">Přehled</button>
        <button class="mtab" data-m="komunikace">Komunikace</button>
        <button class="mtab" data-m="dokumenty">Dokumenty</button>
        <button class="mtab" data-m="finance">Finance</button>
        <button class="mtab" data-m="realizace">Realizace</button>
      </div>

      <div class="module show" id="m-prehled"></div>
      <div class="module" id="m-komunikace"></div>
      <div class="module" id="m-dokumenty"></div>
      <div class="module" id="m-finance"></div>
      <div class="module" id="m-realizace"></div>
    </div>

    <script>
      const params = new URLSearchParams(location.search)
      const jobId = Number(params.get('jobId') || 0)
      const base = location.pathname.startsWith('/demo-crm') ? '/demo-crm' : ''
      const api = (p) => `${base}${p}`
      const crmToken = () => localStorage.getItem('crmToken') || ''
      const apiFetch = async (url, opts = {}) => {
        const h = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + crmToken(), ...(opts.headers || {}) }
        const resp = await fetch(url, { ...opts, headers: h })
        if (resp.status === 401) { localStorage.removeItem('crmToken'); localStorage.removeItem('crmUser'); location.href = `${base}/login.html`; }
        return resp
      }
      const esc = (s) => String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
      async function j(r) { try { return await r.json() } catch { return null } }
      const fmt = (iso) => { try { return new Date(iso).toLocaleDateString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric'}) } catch { return '—' } }
      const fmtFull = (iso) => { try { return new Date(iso).toLocaleString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) } catch { return '—' } }
      const fmtMoney = (n) => `${Number(n || 0).toLocaleString('cs-CZ', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} Kč`

      const STAGES = ['nova_poptavka','podklady','zpracovani_nabidky','nabidka_odeslana','schvaleni_objednavka','zaloha_priprava','realizace','predani_fakturace','dokonceno']
      const SL = {nova_poptavka:'Nová poptávka',podklady:'Podklady od klienta',zpracovani_nabidky:'Zpracování nabídky',nabidka_odeslana:'Nabídka odeslána',schvaleni_objednavka:'Schválení / objednávka',zaloha_priprava:'Záloha / příprava',realizace:'Realizace zakázky',predani_fakturace:'Předání / fakturace',dokonceno:'Dokončeno / uzavřeno'}
      const WAITING = {client:'Klient',internal_sales:'Obchodník',accountant:'Účetní',realization_team:'Realizace',signature:'Podpis',payment:'Platba',none:'Nikdo'}
      const BLOCKING = {missing_form:'Chybí formulář',waiting_offer_response:'Bez reakce na nabídku',waiting_signature:'Čeká na podpis',waiting_advance_payment:'Čeká na zálohu',missing_contract:'Chybí objednávka',missing_material:'Chybí materiál',missing_protocol:'Chybí protokol',overdue_invoice:'Faktura po splatnosti',none:'Bez blokace'}
      const UI_TEXT = {
        cs: {
          backPipeline: '← Pipeline',
          moveBtn: 'Změnit etapu',
          goEstimate: 'Otevřít kalkulaci',
          buildDocs: 'Excel / PDF',
          sendClient: 'Odeslat klientovi',
          tabs: ['Přehled','Komunikace','Dokumenty','Finance','Realizace'],
          moved: 'Etapa byla změněna',
          moveError: 'Etapu se nepodařilo změnit' },
        uk: {
          backPipeline: '← До pipeline',
          moveBtn: 'Змінити етап',
          goEstimate: 'Відкрити кошторис',
          buildDocs: 'Excel / PDF',
          sendClient: 'Надіслати клієнту',
          tabs: ['Огляд','Комунікація','Документи','Фінанси','Реалізація'],
          moved: 'Етап змінено',
          moveError: 'Не вдалося змінити етап' } }

      let data = null
      let activeEstimate = null
      let uiLang = localStorage.getItem('crmUiLang') || 'uk'

      function applyUiLang() {
        const t = UI_TEXT[uiLang] || UI_TEXT.cs
        document.querySelectorAll('.lang-btn').forEach((btn) => btn.classList.toggle('active', btn.getAttribute('data-lang') === uiLang))
        document.getElementById('backPipeline').textContent = t.backPipeline
        document.getElementById('moveBtn').textContent = t.moveBtn
        document.getElementById('goEstimate').textContent = t.goEstimate
        document.getElementById('buildEstimateDocsTop').textContent = t.buildDocs
        document.getElementById('sendEstimateTop').textContent = t.sendClient
        document.querySelectorAll('.mtab').forEach((btn, idx) => { btn.textContent = t.tabs[idx] || btn.textContent })
      }

      document.querySelectorAll('.mtab').forEach(b => {
        b.addEventListener('click', () => {
          document.querySelectorAll('.mtab').forEach(x => x.classList.remove('active')); b.classList.add('active')
          document.querySelectorAll('.module').forEach(m => m.classList.remove('show'))
          document.getElementById(`m-${b.getAttribute('data-m')}`).classList.add('show')
        })
      })

      function renderStageBar(stage) {
        const idx = STAGES.indexOf(stage)
        document.getElementById('stageBar').innerHTML = STAGES.map((s, i) => {
          const cls = i < idx ? 'done' : i === idx ? 'current' : 'future'
          return `<div class="stage-step ${cls}">${esc(SL[s] || s)}</div>`
        }).join('')
      }

      function renderCtrl(job) {
        const items = [
          { k: 'Pipeline stage', v: SL[job.pipelineStage || job.stage] || job.pipelineStage || job.stage, cls: 'blue' },
          { k: 'Čekáme na', v: WAITING[job.waitingFor] || job.waitingFor || 'Nikdo', cls: job.waitingFor && job.waitingFor !== 'none' ? 'orange' : 'green' },
          { k: 'Blokující faktor', v: BLOCKING[job.computedBlocking || job.blockingFactor] || job.computedBlocking || job.blockingFactor || 'Bez blokace', cls: (job.computedBlocking || job.blockingFactor) && (job.computedBlocking || job.blockingFactor) !== 'none' ? 'red' : 'green' },
          { k: 'Riziko', v: job.computedRisk === 'none' ? 'Bez rizika' : job.computedRisk === 'approaching' ? 'Blíží se termín' : job.computedRisk === 'overdue' ? 'Po termínu' : 'Faktura po splatnosti', cls: job.computedRisk === 'none' ? 'green' : 'red' },
          { k: 'Další krok', v: job.nextAction || '—', cls: 'purple' },
          { k: 'Termín další akce', v: job.nextActionDueAt ? fmtFull(job.nextActionDueAt) : '—', cls: 'blue' },
        ]
        document.getElementById('ctrlPanel').innerHTML = items.map(x => `<div class="ctrl-card ${x.cls}"><div class="k">${esc(x.k)}</div><div class="v">${esc(x.v)}</div></div>`).join('')
      }

      function renderPrehled(job, customer, lead) {
        const c = customer || {}
        const brief = lead?.brief || {}
        const isFirma = c.clientType === 'firma' || !!c.ico
        const typeBadge = isFirma
          ? `<span class="badge b-blue" style="margin-left:8px">Firma</span>`
          : `<span class="badge b-green" style="margin-left:8px">Fyzická osoba</span>`

        const contactFields = [
          ['Jméno / Název', c.name || c.companyName || '—'],
          ['Email', c.email || '—'],
          ['Telefon', c.phone || '—'],
          ['Adresa / Sídlo', c.address || '—'],
        ].filter(([,v]) => v && v !== '—')

        const icoBlock = isFirma ? `
          <div class="card-s" style="border-left:3px solid var(--blue)">
            <div class="card-s-t">Firemní údaje (IČO)

              <div class="meta-i"><b>DIČ</b><div class="val">${esc(c.dic || '—')}</div></div>
              <div class="meta-i"><b>Název firmy</b><div class="val">${esc(c.companyName || c.name || '—')}</div></div>
              <div class="meta-i"><b>Sídlo</b><div class="val">${esc(c.address || '—')}</div></div>
            </div>
          </div>` : ''

        const briefFields = []
        if (brief.objectType) briefFields.push(['Typ objektu', brief.objectType])
        if (brief.realizationAddress) briefFields.push(['Adresa realizace', brief.realizationAddress])
        if ((brief.requestTypes || []).length) briefFields.push(['Požadované práce', brief.requestTypes.join(', ')])
        if (brief.requestOther) briefFields.push(['Jiné práce', brief.requestOther])
        if (brief.scopeType) briefFields.push(['Rozsah zakázky', brief.scopeType])
        if (brief.area) briefFields.push(['Plocha / rozsah (m²)', brief.area])
        if (brief.budgetAmount) briefFields.push(['Orientační rozpočet', brief.budgetAmount])
        if (brief.requestedTerm) briefFields.push(['Požadovaný termín', brief.requestedTerm])
        if ((brief.documents || []).length) briefFields.push(['Podklady k dispozici', brief.documents.join(', ')])
        if ((brief.sourceChannels || []).length) briefFields.push(['Jak nás našli', brief.sourceChannels.join(', ')])
        if (brief.sourceOther) briefFields.push(['Zdroj (jiné)', brief.sourceOther])
        if (brief.note) briefFields.push(['Poznámka klienta', brief.note])

        const jobFields = [
          ['Typ zakázky', job.jobType === 'elektro' ? 'Elektro' : job.jobType === 'stavebni' ? 'Stavební' : 'Kombinovaná'],
          ['Priorita', job.priority || 'normal'],
          ['Odpovědná osoba', job.responsiblePerson || '—'],
          ['Datum přijetí', fmt(job.receivedAt)],
          ['Plánované zahájení', job.plannedStart ? fmt(job.plannedStart) : '—'],
          ['Plánované dokončení', job.plannedEnd ? fmt(job.plannedEnd) : '—'],
          ['Poslední kontakt', job.lastClientContactAt ? fmtFull(job.lastClientContactAt) : '—'],
        ].filter(([,v]) => v && v !== '—')

        document.getElementById('m-prehled').innerHTML = `
          <div class="card-s">
            <div class="card-s-t">Klient ${typeBadge}</div>
            <div class="meta-g">${contactFields.map(([k,v]) => `<div class="meta-i"><b>${esc(k)}</b><div class="val">${esc(v)}</div></div>`).join('')}</div>
          </div>
          ${icoBlock}
          ${briefFields.length ? `
          <div class="card-s">
            <div class="card-s-t">Formulář klienta — plné údaje</div>
            <div class="meta-g">${briefFields.map(([k,v]) => `<div class="meta-i"><b>${esc(k)}</b><div class="val">${esc(v)}</div></div>`).join('')}</div>
          </div>` : ''}
          <div class="card-s">
            <div class="card-s-t">Informace o zakázce</div>
            <div class="meta-g">${jobFields.map(([k,v]) => `<div class="meta-i"><b>${esc(k)}</b><div class="val">${esc(v)}</div></div>`).join('')}</div>
            <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--b)">
              <div style="font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Číslo zakázky — změnit</div>
              <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                <input id="editJobNum" style="background:var(--c);border:1px solid var(--b2);border-radius:var(--r);color:var(--ink);padding:8px 12px;font:inherit;font-size:14px;max-width:280px;outline:none" value="${esc(job.internalNumber || '')}" placeholder="Číslo zakázky" />
                <button class="btn btn-p" id="saveJobNum">Uložit číslo</button>
              </div>
            </div>
          </div>
          ${job.notes || brief.summaryText ? `<div class="card-s"><div class="card-s-t">Poznámky</div>
            ${job.notes ? `<div style="font-size:14px;color:var(--ink2);line-height:1.6;white-space:pre-wrap;margin-bottom:12px">${esc(job.notes)}</div>` : ''}
            ${brief.summaryText ? `<details><summary style="cursor:pointer;font-size:13px;color:var(--ink3);font-weight:600;margin-bottom:6px">AI shrnutí formuláře ▾</summary><div style="font-size:12px;color:var(--ink3);line-height:1.65;white-space:pre-wrap;margin-top:8px;padding:12px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid var(--b)">${esc(brief.summaryText)}</div></details>` : ''}
          </div>` : ''}
        `

        document.getElementById('saveJobNum')?.addEventListener('click', async () => {
          const newNum = document.getElementById('editJobNum').value.trim()
          if (!newNum) return
          const r = await apiFetch(api(`/api/crm/jobs/${jobId}`), { method: 'PATCH', body: JSON.stringify({ internalNumber: newNum }) })
          if (r.ok) { document.getElementById('jobNum').textContent = newNum; alert('Číslo zakázky uloženo: ' + newNum) }
          else alert('Nepodařilo se uložit číslo zakázky')
        })
        document.getElementById('fetchAresBtn')?.addEventListener('click', async () => {
          const ico = c.ico; if (!ico) return
          const r = await apiFetch(api(`/api/ares?ico=${encodeURIComponent(ico)}`))
          const d = await j(r)
          if (!r.ok || !d?.ok) { alert('ARES: firma nenalezena nebo služba nedostupná'); return }
          alert(`ARES: ${d.companyName || ''}\n${d.address || ''}`)
          loadJob()
        })
      }

          </div>
          <div class="card-s">

            <div class="add-row">
              <input id="noteTitle" placeholder="Název poznámky" style="flex:2" />
              <input id="noteDesc" placeholder="Popis (volitelné)" style="flex:3" />
              <button class="btn btn-p" id="addNote">Přidat</button>
            </div>
          </div>

        document.getElementById('addNote')?.addEventListener('click', async () => {
          const title = document.getElementById('noteTitle').value.trim()
          if (!title) return

      function estimateFileUrl(id, kind) {
        return api(`/api/crm/estimates/${id}/file/${kind}`)
      }

      async function ensureEstimateForJob() {
        if (activeEstimate?.id) return activeEstimate
        const r = await apiFetch(api(`/api/crm/estimates/from-job`), { method: 'POST', body: JSON.stringify({ jobId }) })
        const d = await j(r)
        if (!r.ok || !d?.ok) throw new Error(d?.error || 'Nelze vytvořit rozpočet')
        activeEstimate = d.estimate
        return activeEstimate
      }

      async function buildEstimateDocs() {
        const estimate = await ensureEstimateForJob()
        const r = await apiFetch(api(`/api/crm/estimates/${estimate.id}/build-documents`), { method: 'POST', body: JSON.stringify({}) })
        const d = await j(r)
        if (!r.ok || !d?.ok) throw new Error(d?.error || 'Nelze vygenerovat dokumenty')
        alert(d?.pdf?.ok ? 'Excel i PDF byly vygenerovány' : 'Excel byl vygenerován, ale PDF se nepodařilo vytvořit')
        await loadJob()
      }

      async function sendEstimateToClient() {
        const estimate = await ensureEstimateForJob()
        const email = (document.getElementById('estimateEmail')?.value || data?.customer?.email || '').trim()
        const subject = (document.getElementById('estimateSubject')?.value || '').trim()
        const text = (document.getElementById('estimateText')?.value || '').trim()
        const r = await apiFetch(api(`/api/crm/estimates/${estimate.id}/send-to-client`), {
          method: 'POST',
          body: JSON.stringify({ email, subject, text }) })
        const d = await j(r)
        if (!r.ok || !d?.ok) throw new Error(d?.error || 'Nelze odeslat email')
        alert(`Rozpočet byl odeslán na ${email}`)
        await loadJob()
      }

          <div class="estimate-hero">

              <div>
                <div class="estimate-hero-title">Klientský rozpočet</div>

              </div>
              <div class="estimate-actions">
                <a class="btn" href="./estimate-builder.html?jobId=${jobId}">Upravit rozpočet</a>
                <button class="btn" id="buildEstimateDocs">Vygenerovat Excel / PDF</button>
                <button class="btn btn-p" id="sendEstimateBtn">Odeslat klientovi</button>
              </div>
            </div>
            <div class="estimate-hero-grid">
              <div class="estimate-box"><b>Celkem s DPH</b><div class="val">${esc(fmtMoney(activeEstimate.totalWithVat))}</div></div>
              <div class="estimate-box"><b>Bez DPH</b><div class="val">${esc(fmtMoney(activeEstimate.totalNoVat))}</div></div>
              <div class="estimate-box"><b>Zakázka</b><div class="val">${esc(job.internalNumber || '—')}</div></div>
              <div class="estimate-box"><b>Klient</b><div class="val">${esc(customer?.name || activeEstimate.clientNameSnapshot || '—')}</div></div>
            </div>
            <div class="estimate-links">
              ${hasXlsx ? `<a class="btn" href="${estimateFileUrl(activeEstimate.id, 'xlsx')}" target="_blank" rel="noopener">Stáhnout Excel</a>` : '<span class="badge b-grey">Excel zatím není vygenerován</span>'}
              ${hasPdf ? `<a class="btn" href="${estimateFileUrl(activeEstimate.id, 'pdf')}" target="_blank" rel="noopener">Stáhnout PDF</a>` : '<span class="badge b-grey">PDF zatím není vygenerováno</span>'}

            <div class="inline-form">
              <input id="estimateEmail" type="email" placeholder="Email klienta" value="${esc(defaultEmail)}" />
              <input id="estimateSubject" placeholder="Předmět emailu" value="${esc(`Rozpočet ${activeEstimate.estimateNo || ''}`)}" />

      function renderDokumenty(docs, estimates, customer, job) {
        const el = document.getElementById('m-dokumenty')
        const DOC_TYPE_LABELS = { formular:'Formulář', kalkulace:'Kalkulace', nabidka:'Nabídka', objednavka:'Objednávka', faktura:'Faktura', protokol:'Protokol', foto:'Fotografie', plan:'Plán', smlouva:'Smlouva', akt:'Akt o dílo', other:'Jiné' }
        const STATUS_COLORS = { uploaded:'#14C98A', created:'#7AA2C4', sent:'#F59E0B', signed_client:'#A78BFA', signed_both:'#34D399', received:'#60A5FF' }
        el.innerHTML = `
          ${renderEstimateHero(job, customer, estimates, docs)}
          <div class="card-s">
            <div class="card-s-t">Dokumenty zakázky <span style="color:var(--ink2);font-weight:400;font-size:12px">(${docs.length})</span></div>
            ${docs.length ? `<div class="doc-list">${docs.map(d => `
              <div class="doc-item">
                <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
                  <div style="font-size:20px">${d.documentType==='foto'?'🖼️':d.documentType==='faktura'?'🧾':d.documentType==='smlouva'?'📝':d.documentType==='akt'?'✍️':'📄'}</div>
                  <div style="min-width:0">
                    <div class="doc-item-name">${esc(d.fileName)}</div>
                    <div class="doc-item-type" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px">
                      <span>${esc(DOC_TYPE_LABELS[d.documentType] || d.docType || '—')}</span>
                      <span style="display:inline-block;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:700;background:${STATUS_COLORS[d.status]||'#3D618A'}22;color:${STATUS_COLORS[d.status]||'#7AA2C4'}">${esc(d.status||'created')}</span>
                      ${d.sentAt?`<span>odesláno ${esc(fmt(d.sentAt))}</span>`:''}
                      ${d.signedAt?`<span>✍ podepsáno ${esc(fmt(d.signedAt))}</span>`:''}
                    </div>
                  </div>
                </div>
                ${d.fileUrl ? `<a class="btn" href="${esc(d.fileUrl)}" target="_blank" rel="noopener" style="flex-shrink:0;padding:6px 12px;font-size:12px">⬇ Otevřít</a>` : ''}
              </div>
            `).join('')}</div>` : '<div class="empty">Žádné dokumenty</div>'}
          </div>
          <div class="card-s">
            <div class="card-s-t">📤 Nahrát soubor</div>
            <div style="display:flex;flex-direction:column;gap:10px">
              <div class="add-row" style="flex-wrap:wrap">
                <label style="flex:1;min-width:200px;display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--ink2)">
                  Soubor (max 20 MB)
                  <input id="fileUploadInput" type="file" style="background:var(--c);border:1px solid var(--b2);border-radius:8px;color:var(--ink);padding:8px;font-size:12px;cursor:pointer" />
                </label>
                <label style="flex:1;min-width:140px;display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--ink2)">
                  Typ dokumentu
                  <select id="docTypeUpload" style="background:var(--c);border:1px solid var(--b2);border-radius:8px;color:var(--ink);padding:10px;font:inherit">
                    <option value="other">Jiné</option><option value="smlouva">Smlouva</option><option value="formular">Formulář</option><option value="kalkulace">Kalkulace</option><option value="nabidka">Nabídka</option><option value="faktura">Faktura</option><option value="protokol">Protokol</option><option value="akt">Akt o dílo</option><option value="foto">Fotografie</option><option value="plan">Plán</option>
                  </select>
                </label>
                <div style="align-self:flex-end"><button class="btn btn-p" id="uploadFileBtn">📤 Nahrát</button></div>
              </div>
              <div id="uploadProgress" style="display:none;font-size:12px;color:var(--green)"></div>
            </div>
          </div>
        `
        document.getElementById('uploadFileBtn')?.addEventListener('click', async () => {
          const file = document.getElementById('fileUploadInput').files?.[0]
          if (!file) { alert('Vyberte soubor'); return }
          const btn = document.getElementById('uploadFileBtn')
          const prog = document.getElementById('uploadProgress')
          btn.disabled = true; btn.textContent = 'Nahrávám...'
          prog.style.display = 'block'; prog.textContent = `Nahrávám ${file.name} (${Math.round(file.size/1024)} kB)...`
          try {
            const fd = new FormData()
            fd.append('file', file)
            fd.append('documentType', document.getElementById('docTypeUpload').value)
            const r = await fetch(api(`/api/crm/jobs/${jobId}/documents/upload`), { method: 'POST', headers: { 'Authorization': 'Bearer ' + crmToken() }, body: fd })
            const d = await r.json()
            if (!r.ok || !d?.ok) throw new Error(d?.error || 'Chyba nahrávání')
            prog.textContent = `✓ Soubor ${file.name} nahrán úspěšně`
            setTimeout(() => { prog.style.display='none'; loadJob() }, 1500)
          } catch (e) { prog.style.color='#EF4444'; prog.textContent = 'Chyba: ' + String(e?.message || e) }
          finally { btn.disabled = false; btn.textContent = '📤 Nahrát' }
        })
        document.getElementById('buildEstimateDocs')?.addEventListener('click', async () => {
          try { await buildEstimateDocs() } catch (e) { alert(String(e?.message || e)) }
        })
        document.getElementById('sendEstimateBtn')?.addEventListener('click', async () => {
          try { await sendEstimateToClient() } catch (e) { alert(String(e?.message || e)) }
        })
      }

          <div class="card-s-t" style="display:flex;justify-content:space-between;align-items:center">
            <span>🧾 Faktury <span style="color:var(--ink2);font-weight:400;font-size:12px">(${invoices.length})</span></span>
            <button class="btn" id="btnFakturoid" style="font-size:12px;padding:6px 12px;background:rgba(20,201,138,.12);border-color:rgba(20,201,138,.3);color:#14C98A">⚡ Vytvořit zálohu (Fakturoid)</button>
          </div>
          ${Array.isArray(invoices) && invoices.length ? `<div class="invoice-list">${invoices.map(inv => `
            <div class="invoice-item" style="align-items:flex-start">
              <div style="flex:1">
                <div class="doc-item-name">${esc(inv.invoiceNumber || '—')} <span style="color:var(--ink2);font-weight:400;font-size:11px">${esc(INV_TYPE_LABEL[inv.invoiceType]||inv.invoiceType)}</span></div>
                <div class="doc-item-type" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:3px">
                  <span style="display:inline-block;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700;background:${INV_STATUS_COLOR[inv.status]||'#3D618A'}22;color:${INV_STATUS_COLOR[inv.status]||'#7AA2C4'}">${esc(inv.status)}</span>
                  ${inv.dueAt?`<span>splatnost ${esc(fmt(inv.dueAt))}</span>`:''}
                  ${inv.paidAt?`<span style="color:#14C98A">💚 uhrazeno ${esc(fmt(inv.paidAt))}</span>`:''}
                </div>
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div style="font-weight:800;font-size:15px">${(Number(inv.amount||0)).toLocaleString('cs-CZ')} ${esc(inv.currency||'CZK')}</div>
                ${inv.status === 'issued' ? `<button class="btn" data-mark-paid="${inv.id}" style="font-size:11px;padding:4px 8px;margin-top:4px;color:#14C98A;border-color:rgba(20,201,138,.3)">✓ Uhrazeno</button>` : ''}
              </div>
            </div>
          `).join('')}</div>` : '<div class="empty" style="margin-top:12px">Žádné faktury</div>'}
        </div>
        <div class="card-s"><div class="card-s-t">✏️ Upravit finance</div>
          <div class="add-row">
            <input id="finPrice" type="number" placeholder="Cena zakázky" value="${job.totalPrice||0}" />
            <input id="finDeposit" type="number" placeholder="Výše zálohy" value="${job.depositAmount||0}" />
            <input id="finCosts" type="number" placeholder="Náklady" value="${job.costs||0}" />
            <button class="btn btn-p" id="saveFin">Uložit</button>
          </div>
          <div class="add-row" style="margin-top:10px">
            <select id="invType"><option value="advance">Záloha</option><option value="final">Finální</option><option value="credit_note">Dobropis</option></select>
            <input id="invAmount" type="number" placeholder="Částka (Kč)" />
            <input id="invNumber" placeholder="Číslo faktury" />
            <input id="invDueDate" type="date" title="Splatnost" />
            <button class="btn" id="addInv">Přidat fakturu</button>
          </div>
        </div>`
        document.getElementById('saveFin')?.addEventListener('click', async () => {
          const totalPrice = Number(document.getElementById('finPrice').value || 0)
          const depositAmount = Number(document.getElementById('finDeposit').value || 0)
          const costs = Number(document.getElementById('finCosts').value || 0)
          const profit = totalPrice - costs
          await apiFetch(api(`/api/crm/jobs/${jobId}`), { method: 'PATCH', body: JSON.stringify({ totalPrice, depositAmount, costs, profit }) })
          loadJob()
        })
        document.getElementById('addInv')?.addEventListener('click', async () => {
          const dueDate = document.getElementById('invDueDate').value
          await apiFetch(api(`/api/crm/jobs/${jobId}/invoices`), { method: 'POST', body: JSON.stringify({ invoiceType: document.getElementById('invType').value, amount: Number(document.getElementById('invAmount').value || 0), invoiceNumber: document.getElementById('invNumber').value.trim(), status: 'issued', issuedAt: new Date().toISOString(), dueAt: dueDate ? new Date(dueDate).toISOString() : null }) })
          loadJob()
        })
        document.getElementById('btnFakturoid')?.addEventListener('click', async () => {
          const btn = document.getElementById('btnFakturoid')
          btn.disabled = true; btn.textContent = '⏳ Odesílám...'
          try {
            const r = await apiFetch(api(`/api/crm/fakturoid/invoices/create-and-send`), { method: 'POST', body: JSON.stringify({ jobId, invoiceType: 'advance', amount: job.depositAmount || job.totalPrice || 0, clientEmail: job.clientEmail || customer?.email || '' }) })
            const d = await r.json()
            if (!r.ok || !d?.ok) throw new Error(d?.error || 'Chyba Fakturoid')
            alert(`✓ Faktura vytvořena a odeslána přes Fakturoid\nID: ${d.invoice?.fakturoid_id || d.fakturoidId || '—'}`)
            loadJob()
          } catch (e) { alert('Fakturoid chyba: ' + String(e?.message || e)) }
          finally { btn.disabled = false; btn.textContent = '⚡ Vytvořit zálohu (Fakturoid)' }
        })
        el.querySelectorAll('[data-mark-paid]').forEach(btn => {
          btn.addEventListener('click', async () => {
            const invId = btn.getAttribute('data-mark-paid')
            await apiFetch(api(`/api/crm/jobs/${jobId}/invoices/${invId}/paid`), { method: 'POST' })
            loadJob()
          })
        })
      }

      function renderRealizace(job, tasks) {
        const el = document.getElementById('m-realizace')
        // 5-day start warning
        const daysToStart = job.plannedStart ? Math.ceil((new Date(job.plannedStart) - new Date()) / 86400000) : null
        const showUrgent = daysToStart !== null && daysToStart <= 5 && daysToStart >= 0
        const showOverdue = daysToStart !== null && daysToStart < 0

        const stage = job.pipelineStage || job.stage
        const isPriprava = stage === 'zaloha_priprava'
        const isRealizace = stage === 'realizace'
        const isDone = ['predani_fakturace','dokonceno'].includes(stage)

        el.innerHTML = `
          ${showUrgent ? `<div style="background:rgba(232,58,58,.15);border:1.5px solid rgba(232,58,58,.5);border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;gap:12px;align-items:center">
            <span style="font-size:24px">⚠️</span>
            <div><div style="font-size:15px;font-weight:800;color:#EF4444">Termín zahájení za ${daysToStart} ${daysToStart === 1 ? 'den' : daysToStart <= 4 ? 'dny' : 'dní'}!</div><div style="font-size:13px;color:var(--ink2);margin-top:3px">Plánované zahájení: ${esc(fmt(job.plannedStart))} — Je potřeba akce!</div></div>
          </div>` : ''}
          ${showOverdue ? `<div style="background:rgba(239,68,68,.18);border:2px solid #EF4444;border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;gap:12px;align-items:center">
            <span style="font-size:24px">🚨</span>
            <div><div style="font-size:15px;font-weight:800;color:#EF4444">Termín zahájení prošel o ${Math.abs(daysToStart)} dní!</div><div style="font-size:13px;color:var(--ink2);margin-top:3px">Plánované zahájení bylo: ${esc(fmt(job.plannedStart))}</div></div>
          </div>` : ''}

          <div class="card-s">
            <div class="card-s-t">🏗️ Etapy realizace</div>
            <div style="display:flex;gap:0;margin-bottom:18px;border-radius:12px;overflow:hidden;border:1px solid var(--b2)">
              ${[
                { key:'zaloha_priprava', label:'1. Příprava', icon:'📋', desc:'Klient potvrdil, čekáme na zálohu a přípravu' },
                { key:'realizace', label:'2. Realizace', icon:'🔧', desc:'Práce probíhají' },
                { key:'predani_fakturace', label:'3. Předání', icon:'✅', desc:'Předání zakázky klientovi' },
              ].map((s, idx) => {
                const active = stage === s.key
                const done = ['realizace','predani_fakturace','dokonceno'].includes(stage) && idx === 0
                  || ['predani_fakturace','dokonceno'].includes(stage) && idx <= 1
                return `<div style="flex:1;padding:14px 16px;background:${active?'rgba(26,106,232,.18)':done?'rgba(20,201,138,.08)':'rgba(255,255,255,.02)'};border-right:1px solid var(--b2);cursor:pointer;transition:background .15s" data-move-stage="${s.key}" title="${esc(s.desc)}">
                  <div style="font-size:18px;margin-bottom:4px">${s.icon}${active?' 📍':done?' ✓':''}</div>
                  <div style="font-size:12px;font-weight:800;color:${active?'var(--blue3)':done?'var(--green)':'var(--ink2)'}">${s.label}</div>
                  <div style="font-size:10px;color:var(--ink3);margin-top:2px">${s.desc}</div>
                </div>`
              }).join('')}
            </div>

            <div class="meta-g">
              <div class="meta-i">
                <b>📅 Plánované zahájení</b>
                <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
                  <input id="plannedStartInput" type="date" style="background:var(--c);border:1px solid var(--b2);border-radius:8px;color:var(--ink);padding:6px 10px;font:inherit;font-size:13px" value="${job.plannedStart ? job.plannedStart.slice(0,10) : ''}" />
                  <button class="btn" id="savePlannedStart" style="padding:6px 12px;font-size:12px">Uložit</button>
                </div>
              </div>
              <div class="meta-i"><b>Plánované dokončení</b>
                <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
                  <input id="plannedEndInput" type="date" style="background:var(--c);border:1px solid var(--b2);border-radius:8px;color:var(--ink);padding:6px 10px;font:inherit;font-size:13px" value="${job.plannedEnd ? job.plannedEnd.slice(0,10) : ''}" />
                  <button class="btn" id="savePlannedEnd" style="padding:6px 12px;font-size:12px">Uložit</button>
                </div>
              </div>
              <div class="meta-i"><b>Skutečné zahájení</b><div class="val">${job.actualStart ? fmt(job.actualStart) : '—'}</div></div>
              <div class="meta-i"><b>Skutečné dokončení</b><div class="val">${job.actualEnd ? fmt(job.actualEnd) : '—'}</div></div>
            </div>
          </div>

          <div class="card-s"><div class="card-s-t">✅ Úkoly <span style="color:var(--ink2);font-weight:400;font-size:12px">(${tasks.filter(t=>t.status==='done').length}/${tasks.length})</span></div>
            ${tasks.length ? `<div class="task-list">${tasks.map(t => `
              <div class="task-item">
                <div class="task-check ${t.status === 'done' ? 'done' : ''}" data-task="${t.id}">${t.status === 'done' ? '✓' : ''}</div>
                <div style="flex:1"><div class="task-title ${t.status === 'done' ? 'done' : ''}">${esc(t.title)}</div><div class="task-due">${esc(t.taskType||'manual')} · ${esc(t.priority||'normal')}${t.dueDate ? ' · 📅 ' + esc(fmt(t.dueDate)) : ''}</div></div>
              </div>
            `).join('')}</div>` : '<div class="empty">Žádné úkoly</div>'}
            <div class="add-row" style="margin-top:12px">
              <input id="taskTitle" placeholder="Nový úkol" style="flex:2" />
              <select id="taskType"><option value="manual">Manuální</option><option value="reminder_client">Upomínka klienta</option><option value="invoice">Faktura</option><option value="schedule">Plán</option><option value="handover_protocol">Předávací protokol</option></select>
              <select id="taskPriority"><option value="normal">Normální</option><option value="high">Vysoká</option><option value="urgent">Urgentní</option></select>
              <button class="btn btn-p" id="addTask">Přidat</button>
            </div>
          </div>
          <div class="card-s">
            <div class="card-s-t">🏁 Dokončení zakázky</div>
            <div style="display:flex;flex-direction:column;gap:10px">
              <button id="btnSendAct" class="btn btn-p" style="justify-content:center;padding:12px">✍️ Odeslat akt o dílo klientovi</button>
              <button id="btnSendReview" class="btn" style="justify-content:center;padding:12px;background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3);color:#F59E0B">⭐ Odeslat žádost o recenzi (Google Maps)</button>
            </div>
          </div>
        `
        el.querySelectorAll('[data-move-stage]').forEach(btn => {
          btn.addEventListener('click', async () => {
            const newStage = btn.getAttribute('data-move-stage')
            if (newStage === stage) return
            if (!confirm(`Posunout zakázku do etapy "${newStage}"?`)) return
            await apiFetch(api(`/api/crm/jobs/${jobId}/move`), { method: 'POST', body: JSON.stringify({ stage: newStage }) })
            loadJob()
          })
        })
        document.getElementById('savePlannedStart')?.addEventListener('click', async () => {
          const v = document.getElementById('plannedStartInput').value
          await apiFetch(api(`/api/crm/jobs/${jobId}`), { method: 'PATCH', body: JSON.stringify({ plannedStart: v ? new Date(v).toISOString() : null }) })
          loadJob()
        })
        document.getElementById('savePlannedEnd')?.addEventListener('click', async () => {
          const v = document.getElementById('plannedEndInput').value
          await apiFetch(api(`/api/crm/jobs/${jobId}`), { method: 'PATCH', body: JSON.stringify({ plannedEnd: v ? new Date(v).toISOString() : null }) })
          loadJob()
        })
        el.querySelectorAll('[data-task]').forEach(btn => {
          btn.addEventListener('click', async () => {
            const tid = Number(btn.getAttribute('data-task'))
            const isDone = btn.classList.contains('done')
            await apiFetch(api(`/api/crm/jobs/${jobId}/tasks/${tid}`), { method: 'PATCH', body: JSON.stringify({ status: isDone ? 'pending' : 'done', completedAt: isDone ? null : new Date().toISOString() }) })
            loadJob()
          })
        })
        document.getElementById('addTask')?.addEventListener('click', async () => {
          const title = document.getElementById('taskTitle').value.trim()
          if (!title) return
          await apiFetch(api(`/api/crm/jobs/${jobId}/tasks`), { method: 'POST', body: JSON.stringify({ title, taskType: document.getElementById('taskType').value, priority: document.getElementById('taskPriority').value }) })
          document.getElementById('taskTitle').value = ''; loadJob()
        })

        // Completion act + review buttons
        const actBtn = el.querySelector('#btnSendAct')
        if (actBtn) {
          actBtn.addEventListener('click', async () => {
            const email = prompt('Email klienta pro odeslání aktu:', data?.customer?.email || '')
            if (!email) return
            actBtn.disabled = true; actBtn.textContent = '⏳...'
            try {
              const r = await apiFetch(api(`/api/crm/jobs/${jobId}/completion-act/prepare`), { method: 'POST', body: JSON.stringify({ clientEmail: email }) })
              const d = await r.json()
              if (!r.ok || !d?.ok) throw new Error(d?.error || 'Chyba')
              alert(`✓ Akt odeslán!\nOdkaz: ${d.actUrl}`)
            } catch (e) { alert('Chyba: ' + String(e?.message || e)) }
            finally { actBtn.disabled = false; actBtn.textContent = '✍️ Odeslat akt o dílo klientovi' }
          })
        }
        const reviewBtn = el.querySelector('#btnSendReview')
        if (reviewBtn) {
          reviewBtn.addEventListener('click', async () => {
            const email = prompt('Email klienta pro žádost o hodnocení:', data?.customer?.email || '')
            if (!email) return
            reviewBtn.disabled = true; reviewBtn.textContent = '⏳...'
            try {
              const r = await apiFetch(api(`/api/crm/jobs/${jobId}/send-review-request`), { method: 'POST', body: JSON.stringify({ clientEmail: email }) })
              const d = await r.json()
              if (!r.ok || !d?.ok) throw new Error(d?.error || 'Chyba')
              alert('✓ Žádost o hodnocení odeslána!')
            } catch (e) { alert('Chyba: ' + String(e?.message || e)) }
            finally { reviewBtn.disabled = false; reviewBtn.textContent = '⭐ Odeslat žádost o recenzi (Google Maps)' }
          })
        }
      }

      async function loadJob() {
        if (!jobId) { document.getElementById('jobTitle').textContent = 'jobId chybí'; return }
        const [r, er] = await Promise.all([
          apiFetch(api(`/api/crm/jobs/${jobId}`)),
          apiFetch(api(`/api/crm/estimates?jobId=${jobId}`)),
        ])
        const d = await j(r)
        const ed = await j(er)
        if (!r.ok || !d?.ok) { document.getElementById('jobTitle').textContent = 'Chyba načítání'; return }
        data = d
        d.estimates = er.ok && ed?.ok ? (ed.estimates || []) : []
        const job = d.job; const customer = d.customer; const lead = d.lead
        document.getElementById('jobNum').textContent = job.internalNumber || '—'
        document.getElementById('jobTitle').textContent = job.title || 'Zakázka'
        document.getElementById('jobSub').textContent = `${customer?.name || '—'} · ${SL[job.stage] || job.stage} · Priorita: ${job.priority}`
        document.getElementById('goEstimate').href = `./estimate-builder.html?jobId=${job.id}`
        const sel = document.getElementById('moveStage')
        sel.innerHTML = STAGES.map(s => `<option value="${s}" ${s === job.stage ? 'selected' : ''}>${esc(SL[s])}</option>`).join('')
        renderStageBar(job.stage)
        renderCtrl(job)
        renderPrehled(job, customer, lead)
        await renderKomunikace(d.events || [])
        renderDokumenty(d.documents || [], d.estimates || [], customer, job)
        renderFinance(job, d.invoices || [])
        renderRealizace(job, d.tasks || [])
      }

      document.getElementById('moveBtn').addEventListener('click', async () => {
        const stage = document.getElementById('moveStage').value
        const r = await apiFetch(api(`/api/crm/jobs/${jobId}/move`), { method: 'POST', body: JSON.stringify({ stage }) })
        const d = await j(r)
        if (r.ok && d?.ok) { alert((UI_TEXT[uiLang] || UI_TEXT.cs).moved); loadJob() }
        else alert(d?.error || (UI_TEXT[uiLang] || UI_TEXT.cs).moveError)
      })

      document.querySelectorAll('.lang-btn').forEach((btn) => btn.addEventListener('click', () => {
        uiLang = btn.getAttribute('data-lang') || 'cs'
        localStorage.setItem('crmUiLang', uiLang)
        applyUiLang()
      }))

      document.getElementById('buildEstimateDocsTop').addEventListener('click', async () => {
        try { await buildEstimateDocs() } catch (e) { alert(String(e?.message || e)) }
      })

      document.getElementById('sendEstimateTop').addEventListener('click', async () => {
        try { await sendEstimateToClient() } catch (e) { alert(String(e?.message || e)) }
      })

      applyUiLang()
      loadJob()

      // User display + logout
      ;(function(){
        try {
          const u = JSON.parse(localStorage.getItem('crmUser') || '{}')
          const roleMap = { owner: 'Vlastník', manager: 'Manažer', pm: 'Proj. manažer', viewer: 'Zobrazení' }
          document.getElementById('userName').textContent = u.name || u.email || '—'
          document.getElementById('userRole').textContent = roleMap[u.role] || u.role || '—'
          const initials = (u.name || u.email || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase()
          document.getElementById('userAvatar').textContent = initials
        } catch {}
      })()
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('crmToken'); localStorage.removeItem('crmUser')
        location.replace('./login.html')
      })
    </script>
  </body>
</html>
